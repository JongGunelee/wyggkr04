    function handleCurrentRangeChange(event) {
      const isChecked = event.target.checked;
      const currentSysMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const displayedYear = window.currentDisplayedYear;
      const currentYearMonths = chartMonths;

      document.querySelectorAll(".month-filter-checkbox").forEach((cb) => {
        const monthIndex = parseInt(cb.dataset.monthIndex, 10);
        if (displayedYear <= currentYear) {
          // [SIAV v40.0] N-1 전월까지 체크/해제 적용
          if (monthIndex < currentSysMonth) { // [SIAV v40.0] N-1 Range Logic
            cb.checked = isChecked;
          }
        } else {
          // For past years, check/uncheck all months up to the available data
          if (monthIndex < currentYearMonths.length) {
            cb.checked = isChecked;
          }
        }
      });
      updateSelectAllCheckboxState();
      updateDisplay();
    }

    function updateSelectAllCheckboxState() {
      const selectAllCheckbox = document.getElementById(
        "select-all-months-checkbox",
      );
      if (!selectAllCheckbox) return;

      const monthCheckboxes = document.querySelectorAll(
        ".month-filter-checkbox",
      );
      if (monthCheckboxes.length === 0) {
        selectAllCheckbox.checked = false;
        selectAllCheckbox.indeterminate = false;
        return;
      }

      const totalMonths = monthCheckboxes.length;
      const checkedMonths = Array.from(monthCheckboxes).filter(
        (cb) => cb.checked,
      ).length;

      if (checkedMonths === totalMonths && totalMonths > 0) {
        selectAllCheckbox.checked = true;
        selectAllCheckbox.indeterminate = false;
      } else if (checkedMonths === 0) {
        selectAllCheckbox.checked = false;
        selectAllCheckbox.indeterminate = false;
      } else {
        selectAllCheckbox.checked = false;
        selectAllCheckbox.indeterminate = true;
      }
    }

    function updateCurrentRangeCheckboxState() {
      const currentRangeCheckbox = document.getElementById(
        "select-current-range-checkbox",
      );
      if (!currentRangeCheckbox) return;

      const monthCheckboxes = document.querySelectorAll(
        ".month-filter-checkbox",
      );
      const currentYearMonths = chartMonths;
      if (currentYearMonths.length === 0) {
        currentRangeCheckbox.checked = false;
        currentRangeCheckbox.indeterminate = false;
        return;
      }

      const currentSysMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const displayedYear = window.currentDisplayedYear;

      let checkedInCurrentRangeCount = 0;
      let totalInCurrentRange = 0;

      monthCheckboxes.forEach((checkbox) => {
        const monthIndex = parseInt(checkbox.dataset.monthIndex, 10);
        if (displayedYear <= currentYear) {
          // [SIAV v40.0] N-1 전월까지 range로 계산
          if (monthIndex < currentSysMonth) { // [SIAV v40.0] N-1 Range Logic
            totalInCurrentRange++;
            if (checkbox.checked) {
              checkedInCurrentRangeCount++;
            }
          }
        } else {
          // For past years, range is all available months
          if (monthIndex < currentYearMonths.length) {
            totalInCurrentRange++;
            if (checkbox.checked) {
              checkedInCurrentRangeCount++;
            }
          }
        }
      });

      if (totalInCurrentRange === 0) {
        currentRangeCheckbox.checked = false;
        currentRangeCheckbox.indeterminate = false;
      } else if (checkedInCurrentRangeCount === totalInCurrentRange) {
        currentRangeCheckbox.checked = true;
        currentRangeCheckbox.indeterminate = false;
      } else if (checkedInCurrentRangeCount === 0) {
        currentRangeCheckbox.checked = false;
        currentRangeCheckbox.indeterminate = false;
      } else {
        currentRangeCheckbox.checked = false;
        currentRangeCheckbox.indeterminate = true;
      }
    }

    function handleIndividualMonthChange() {
      updateSelectAllCheckboxState();
      updateCurrentRangeCheckboxState();
      updateDisplay();
    }

    function getActiveMonthIndexesInitially(monthsForYear) {
      const activeIndexes = [];
      const currentSysMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const displayedYear = window.currentDisplayedYear;

      if (monthsForYear && monthsForYear.length > 0) {
        monthsForYear.forEach((m, idx) => {
          if (displayedYear <= currentYear) {
            // [SIAV v40.0] 초기 로드 시 N-1 전월까지 (idx <= currentSysMonth)
            if (idx < currentSysMonth) activeIndexes.push(idx); // [SIAV v40.0] N-1 Initial Indexes
          } else {
            activeIndexes.push(idx);
          }
        });
      }
      return activeIndexes;
    }

    function getActiveMonthIndexesFromDOM() {
      const activeIndexes = [];
      document
        .querySelectorAll("#data-table .month-filter-checkbox:checked")
        .forEach((cb) => {
          activeIndexes.push(parseInt(cb.dataset.monthIndex, 10));
        });
      return activeIndexes;
    }

    function updateDisplay(isYearChange = false) {
      const yearToDisplay = window.currentDisplayedYear;
      const yearData = window.allYearsData[yearToDisplay];

      if (
        !yearData ||
        !yearData.originalDatasetsData ||
        yearData.originalDatasetsData.length === 0
      ) {
        if (budgetChart) {
          budgetChart.data.labels = [];
          budgetChart.data.datasets = [];
          budgetChart.update();
          
        }
        const container = document.getElementById("data-table");
        if (container)
          container.innerHTML = `<p style="text-align:center; padding:20px;">${yearToDisplay}년 데이터가 없습니다.</p><div id="table-resize-handle"></div>`;
        const selectAllCb = document.getElementById(
          "select-all-months-checkbox",
        );
        if (selectAllCb) {
          selectAllCb.checked = false;
          selectAllCb.indeterminate = false;
          selectAllCb.disabled = true;
        }
        const selectCurrentRangeCb = document.getElementById(
          "select-current-range-checkbox",
        );
        if (selectCurrentRangeCb) {
          selectCurrentRangeCb.checked = false;
          selectCurrentRangeCb.indeterminate = false;
          selectCurrentRangeCb.disabled = true;
        }
        return;
      }

      originalDatasetsData = yearData.originalDatasetsData;
      chartMonths = yearData.months;
      window.tableRowsData = yearData.tableRowsData;
      originalJiphangBData = yearData.originalJiphangBData || {};
      currentXAxisLabels = isXAxisReversed
        ? chartMonths.slice().reverse()
        : chartMonths.slice();

      function toDisplayIndex(originalIndex) {
        if (
          !Array.isArray(currentXAxisLabels) ||
          currentXAxisLabels.length === 0
        )
          return originalIndex;
        return isXAxisReversed
          ? currentXAxisLabels.length - 1 - originalIndex
          : originalIndex;
      }

      let activeMonthIndexes;
      if (isYearChange) {
        const initialActiveMonthIndexes =
          getActiveMonthIndexesInitially(chartMonths);
        renderTable(
          chartMonths,
          window.tableRowsData,
          initialActiveMonthIndexes,
        );
        setInitialCheckboxStatesAndListeners();
        activeMonthIndexes = getActiveMonthIndexesFromDOM();
      } else {
        activeMonthIndexes = getActiveMonthIndexesFromDOM();
        renderTable(chartMonths, window.tableRowsData, activeMonthIndexes);
        reAttachCheckboxListeners();
      }


      const getComparisonYearColor = (year) => {
        const colors = [
          '#28a745', '#fd7e14', '#6f42c1', '#e83e8c', '#20c997', '#ffc107', '#17a2b8'
        ];
        const yr = parseInt(year, 10);
        return colors[yr % colors.length];
      };
    
      let datasetsToRender = [];
      const currentYY = String(yearToDisplay).slice(-2);
      const isComparingModeActive = (window.selectedCompYears && window.selectedCompYears.size > 0);

      // 1. 통합 비교 대상 연도(고스트) 추가
      if (isComparingModeActive) {
        window.selectedCompYears.forEach(compYear => {
          if (String(compYear) === String(yearToDisplay)) return;
          const yearData = window.allYearsData[compYear];
          if (yearData) {
            // [무결성 리팩토링] 현재 기준 연도의 데이터 표시 월 수(N)를 확인하여 N-1 시점까지 표시
            // 오늘이 4월이면 activeMonthIndexes.length가 4이며, slice(0, 3)으로 3월까지만 비교 출력
            const actualActiveCount = (typeof activeMonthIndexes !== 'undefined' && activeMonthIndexes) ? activeMonthIndexes.length : 0;
            const ghostSets = yearData.originalDatasetsData.filter(ds => ds.label.includes("집행B")).map(ds => {
              const ghost = JSON.parse(JSON.stringify(ds));
              if (Array.isArray(ghost.data)) {
                  ghost.data = ghost.data.slice(0, Math.max(0, actualActiveCount)); // [SIAV v40.0] Sync with N-1 Checkboxes
              }
              const yy = String(compYear).slice(-2);
              const yearColor = getComparisonYearColor(compYear);
              ghost.label = `[${yy}년] ${ghost.label}`;
              ghost.isGhost = true;
              ghost.prevYearRows = yearData.tableRowsData;
              ghost.borderColor = yearColor;
              ghost.backgroundColor = yearColor;
              ghost.pointBorderColor = yearColor;
              ghost.pointBackgroundColor = yearColor;
              if (ghost.label.includes("평균")) {
                ghost.pointStyle = 'cross';
                ghost.pointRadius = 7;
                ghost.borderWidth = 3.5;
                ghost.borderDash = [5, 5];
              } else {
                ghost.pointStyle = 'circle';
                ghost.pointRadius = 5;
                ghost.borderWidth = 4.0;
              }
              return ghost;
            });
            datasetsToRender = datasetsToRender.concat(ghostSets);
          }
        });
      }

      // 2. 현재 연도 데이터 추가 (통합 모드 시 주요 지표 보존)
      let currentDatasets = [...originalDatasetsData];
                  if (isComparingModeActive) {
          // [SIAV Fix] 연도 비교 시 현재 메인 연도의 '실적C'(이전 연도 분) 및 관련 지표만 임시 숨김 처리
          // '집행B', '목표A' 및 금년의 '평균선'은 분석의 연속성을 위해 보충 보존 (사용자 요청 반영)
          currentDatasets = currentDatasets.filter(ds => {
              const label = ds.label || "";
              const isPreviousYearIndicator = label.includes("실적C") || label.includes("전년");
              
              // 이전 연도 분(실적C)은 통합 비교 데이터와 중복되므로 숨김 처리
              if (isPreviousYearIndicator) return false;
              
              // 금년의 주요 지표(집행B, 목표A) 및 그 평균선들은 가시성 유지
              return label.includes("집행B") || label.includes("목표A");
          });
      }
      
      // [무결성 리팩토링] 현재 연도 데이터 및 전수 평균선에 대해서 N-1(전월) 기준 시계열 절단
      currentDatasets = currentDatasets.map(ds => {
          const newDs = JSON.parse(JSON.stringify(ds));
          if (Array.isArray(newDs.data)) {
              const count = (typeof activeMonthIndexes !== 'undefined' && activeMonthIndexes) ? activeMonthIndexes.length : 0;
              newDs.data = newDs.data.slice(0, Math.max(0, count)); // [SIAV v40.0] Sync with N-1 Checkboxes
          }
          return newDs;
      });
      
      datasetsToRender = datasetsToRender.concat(currentDatasets);
      const filteredDatasets = datasetsToRender.map((originalDs) => {
        const newDs = JSON.parse(JSON.stringify(originalDs));
        const isAverageLine = newDs.label.includes("\ud3c9\uade0");

        const isExecutionB = newDs.label.includes("집행B");
        const isExecutionBAvg = isExecutionB && newDs.label.includes("평균");

        if (newDs.isGhost) {
          const yrMatch = newDs.label.match(/\[(\d+)년\]/);
          const color = yrMatch ? getComparisonYearColor(yrMatch[1]) : "#6c757d";
          newDs.borderColor = color;
          newDs.backgroundColor = color;
          newDs.pointBorderColor = color;
          newDs.pointBackgroundColor = color;
          newDs.borderWidth = 3.5;
          newDs.borderDash = isExecutionBAvg ? [5, 5] : [];
          newDs.pointStyle = isExecutionBAvg ? "cross" : "circle";
          newDs.pointRadius = isExecutionBAvg ? 7 : 5;
        } else {
          if (!newDs.label.startsWith("[")) {
            let labelPrefixYear = yearToDisplay;
            if (newDs.label.includes("실적") || newDs.label.includes("전년")) {
              labelPrefixYear = yearToDisplay - 1;
            }
            newDs.label = `[${String(labelPrefixYear).slice(-2)}년] ${newDs.label}`;
          }
          if (isExecutionB) {
            newDs.pointStyle = isExecutionBAvg ? "cross" : "circle";
            if (isExecutionBAvg) {
              newDs.borderWidth = 3.0;
              newDs.pointRadius = 9;
              newDs.borderDash = [3, 2];
            } else {
              newDs.borderWidth = 7.0;
              newDs.pointRadius = 11.0;
            }
          }
        }
        if (isAverageLine) {
          // prefix [YY\ub144] \uc640 \ub4 a4\uc758 " \ud3c9\uade0"\uc744 \ubaa8\ub410 \uc0ad\uc81c\ud558\uc5ec \ud14c\uc774\ube14 \ub85c\uc6b0 \ub9e4\uce6d
          const labelClean = originalDs.label.replace(/^\[\d+\ub144\] /, "").replace(" \ud3c9\uade0", "");
          const rowsSource = newDs.isGhost ? newDs.prevYearRows : window.tableRowsData;
          const baseRow = (rowsSource || []).find(r => r.label === labelClean && !r.isAvg);
          let periodAvg = null;
          if (baseRow && baseRow.vals) {
            let sum = 0;
            activeMonthIndexes.forEach(mIdx => {
              if (mIdx < baseRow.vals.length) sum += (parseFloat(baseRow.vals[mIdx]) || 0);
            });
            if (activeMonthIndexes.length > 0) periodAvg = sum / activeMonthIndexes.length;
          }
          newDs.data = activeMonthIndexes.map(mIdx => ({
            x: toDisplayIndex(mIdx),
            y: periodAvg
          }));
        } else {
          newDs.data = newDs.data
            .filter(p => activeMonthIndexes.includes(p.x) && p.y !== null)
            .map(p => ({ x: toDisplayIndex(p.x), y: p.y }));
        }
        
        // [SIAV Patch] 평균만 숨기기 물리적 상태 연동
        const isAvgBtnActive = document.getElementById("toggle-average")?.classList.contains("active");
        if (newDs.label.includes("평균")) {
          newDs.hidden = isAvgBtnActive;
        }

        return newDs;
      });

      if (budgetChart && !isYearChange) {
        budgetChart.data.datasets = [];
        budgetChart.data.datasets = []; budgetChart.data.datasets = filteredDatasets; // Clear explicitly for reliability
        budgetChart.options.scales.y.max = calculateMaxY(filteredDatasets);
        if (budgetChart.options.scales && budgetChart.options.scales.x) {
          budgetChart.options.scales.x.max =
            currentXAxisLabels.length > 0 ? currentXAxisLabels.length - 1 : 0;
        }
        // 반전 상태 변경 시 '현재 월' 세로선의 X 위치도 함께 갱신
        try {
          const ann = budgetChart.options?.plugins?.annotation?.annotations;
          if (
            ann &&
            ann.currentMonthLineMarker &&
            Array.isArray(currentXAxisLabels) &&
            currentXAxisLabels.length > 0
          ) {
            const currentMonthIndex = new Date().getMonth();
            const toDisplayIndexLocal = (idx) =>
              isXAxisReversed ? currentXAxisLabels.length - 1 - idx : idx;
            if (
              currentMonthIndex >= 0 &&
              currentMonthIndex < currentXAxisLabels.length
            ) {
              ann.currentMonthLineMarker.xMin =
                toDisplayIndexLocal(currentMonthIndex);
              ann.currentMonthLineMarker.xMax =
                toDisplayIndexLocal(currentMonthIndex);
            }
          }
        } catch (e) {
          /* no-op */
        }
        budgetChart.update();
          
      } else {
        renderChart(currentXAxisLabels, filteredDatasets);
      }

      updateLegendButtonStates();
      showDeviationAnnotation();
                
    }

    function calculateMaxY(datasets) {
      let maxY = 0;
      datasets.forEach((dataset) => {
        if (!dataset.hidden) {
          dataset.data.forEach((point) => {
            if (point.y !== null && point.y > maxY) {
              maxY = point.y;
            }
          });
        }
      });
      if (maxY === 0) return 180000000;
      return Math.ceil((maxY * 1.1) / 10000000) * 10000000;
    }

    function renderChart(labels, datasets) {
      const ctx = document.getElementById("budgetChart").getContext("2d");
      if (budgetChart) {
        budgetChart.destroy();
        if (currentMonthLineAnimationFrameId)
          cancelAnimationFrame(currentMonthLineAnimationFrameId);
        currentMonthLineAnimationFrameId = null;
        if (jiphangBLineAnimationFrameId)
          clearTimeout(jiphangBLineAnimationFrameId);
        jiphangBLineAnimationFrameId = null;
        jiphangBAnimationCount = 0;
      }

      const currentMonthIndex = new Date().getMonth();
      const toDisplayIndex = (idx) => {
        if (
          !Array.isArray(currentXAxisLabels) ||
          currentXAxisLabels.length === 0
        )
          return idx;
        return isXAxisReversed ? currentXAxisLabels.length - 1 - idx : idx;
      };
      const annotations = {};
      const yAxisMinValForOptions = 0;
      const yAxisMaxValForOptions = calculateMaxY(datasets);
      // --- [핵심 수정] "현재 월" 표시선의 고정 최대 높이 값 ---
      const CURRENT_MONTH_MARKER_Y_MAX = 180000000;

      if (
        currentMonthIndex < labels.length &&
        window.currentDisplayedYear <= new Date().getFullYear()
      ) {
        annotations.currentMonthLineMarker = {
          id: "currentMonthLineMarker",
          type: "line",
          xScaleID: "x",
          yScaleID: "y",
          xMin: toDisplayIndex(currentMonthIndex),
          xMax: toDisplayIndex(currentMonthIndex),
          yMin: yAxisMinValForOptions,
          yMax: yAxisMinValForOptions,
          borderColor: "rgba(255, 99, 132, 0.8)",
          borderWidth: 5,
          borderDash: [6, 6],
          label: {
            content: "현재 월",
            enabled: true,
            position: "start",
            yAdjust: -25,
            backgroundColor: "rgba(255, 255, 255, 0.75)",
            font: { size: 20, weight: "bold" },
            color: "rgba(255, 99, 132, 1)",
          },
        };
      }

      budgetChart = new Chart(ctx, {
        type: "line",
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 0 },
          hover: { animationDuration: 0 },
          plugins: {
            legend: {
              position: "bottom",
              labels: {
                // [SIAV Patch] 범례 가시성 동기화: 숨김 처리된 시리즈는 범례에서 완전히 제거
                filter: (legendItem, chartData) => {
                  return !chartData.datasets[legendItem.datasetIndex].hidden;
                },
                usePointStyle: true,
                font: { size: 14 },
                boxWidth: 15,
                padding: 20,
                // [SIAV Patch] 범례 일시적으로 연도 말머리 추가
                generateLabels: function(chart) {
                  const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                  const currentSysYear = new Date().getFullYear();
                  const dispYear = window.currentDisplayedYear;
                  
                  original.forEach(item => {
                    // [SIAV Patch] dataset label에 이미 접두사가 있으므로 중복 추가 방지
                    // item.text는 원본 그대로 유지 (updateDisplay에서 [xx년] 처리 완료됨)
                  });
                  return original;
                }
              },
              onClick: function (e, legendItem, legend) {
                Chart.defaults.plugins.legend.onClick.call(
                  this,
                  e,
                  legendItem,
                  legend,
                );
                const clickedDataset = legend.chart.data.datasets.find(
                  (ds) => {
                    // [SIAV Patch] 어떤 형식의 [XX년] 말머리든 제거 후 비교 (정합성 보장)
                    const cleanLabel = legendItem.text.replace(/^\[\d{2}\ub144\]\s*/, "");
                    return ds.label === cleanLabel;
                  },
                );
                if (clickedDataset && clickedDataset.hidden) window.selectionPoints = window.selectionPoints.filter(p => p.datasetLabel !== clickedDataset.label);
                if (budgetChart) {
                  budgetChart.options.scales.y.max = calculateMaxY(
                    budgetChart.data.datasets,
                  );
                  budgetChart.update();
          
                }
                showDeviationAnnotation();
                
              },
            },
            tooltip: {
              enabled: true,
              mode: "nearest",
              position: "nearest",
              caretPadding: 10,
              titleFont: { size: 18 },
              bodyFont: { size: 18 },
              padding: 12,
              filter: (tooltipItem) => tooltipItem.parsed.y !== null,
              callbacks: {
                title: function (tooltipItems) {
                  if (tooltipItems.length > 0) {
                    const xValue = tooltipItems[0].parsed.x;
                    if (
                      Number.isInteger(xValue) &&
                      xValue < currentXAxisLabels.length
                    ) {
                      return currentXAxisLabels[xValue];
                    }
                  }
                  return "";
                },
                // [Domain/Presentation Layer Integration] 무결성 보증: 평균 라인의 경우 소수점을 배제한 정수 단위 표시
                label: function (tooltipItem) {
                  let datasetLabel = tooltipItem.dataset.label || '';
                  let value = tooltipItem.parsed.y;

                  if (datasetLabel.includes('평균')) {
                    value = Math.round(value);
                  }

                  const currentSysYearTT = new Date().getFullYear();
                  const dispYearTT = window.currentDisplayedYear;
                  
                  // [Domain Logic] '실적' 또는 '전년' 포함 시 이전 연도로 표시
                  let targetYearTT = dispYearTT;
                  if (datasetLabel.includes("\uc2e4\uc801") || datasetLabel.includes("\uc804\ub144")) {
                    targetYearTT = dispYearTT - 1;
                  }
                  
                  const yearPrefix = (targetYearTT && targetYearTT !== currentSysYearTT) 
                    ? "[" + String(targetYearTT).slice(-2) + "\ub144] " 
                    : "";
                  return yearPrefix + datasetLabel + ": " + value.toLocaleString();
                }
              },
            },
            annotation: { annotations: annotations },
          },
          interaction: {
            mode: "nearest",
            axis: "xy",
            intersect: true,
          },
          scales: {
            x: {
              type: "linear",
              min: 0,
              max: labels.length > 0 ? labels.length - 1 : 0,
              ticks: {
                callback: function (value, index, ticks) {
                  if (
                    Number.isInteger(value) &&
                    value >= 0 &&
                    value < currentXAxisLabels.length
                  ) {
                    return currentXAxisLabels[value];
                  }
                  return null;
                },
                stepSize: 1,
                font: { size: 14 },
              },
              grid: { display: true },
            },
            y: {
              beginAtZero: true,
              min: yAxisMinValForOptions,
              max: yAxisMaxValForOptions,
              ticks: {
                callback: function (value) {
                  return formatKoreanCurrency(value);
                },
                font: { size: 13 },
              },
              grid: { display: true },
            },
          },
          elements: { line: { tension: 0.3 } },
        },
      });

      if (
        annotations.currentMonthLineMarker &&
        budgetChart.options.plugins.annotation.annotations
          .currentMonthLineMarker
      ) {
        let verticalAnimationCount = 0;
        const maxVerticalAnimations = 2;
        const animationDurationFrames = 50;
        let currentAnimatedYMax;

        // --- [핵심 수정] 애니메이션 목표 Y값을 고정값으로 설정 ---
        const targetYMax = CURRENT_MONTH_MARKER_Y_MAX;
        let animationStepValue;

        function animateVerticalLine() {
          if (
            !budgetChart ||
            !budgetChart.options?.plugins?.annotation?.annotations
              ?.currentMonthLineMarker
          ) {
            if (currentMonthLineAnimationFrameId)
              cancelAnimationFrame(currentMonthLineAnimationFrameId);
            currentMonthLineAnimationFrameId = null;
            return;
          }
          currentAnimatedYMax += animationStepValue;

          if (currentAnimatedYMax >= targetYMax) {
            currentAnimatedYMax = targetYMax;
            budgetChart.options.plugins.annotation.annotations.currentMonthLineMarker.yMax =
              currentAnimatedYMax;
            budgetChart.update("none");
            verticalAnimationCount++;
            if (verticalAnimationCount === 1) startJiphangBAnimation();

            if (verticalAnimationCount < maxVerticalAnimations) {
              setTimeout(() => {
                if (
                  !budgetChart ||
                  !budgetChart.options?.plugins?.annotation?.annotations
                    ?.currentMonthLineMarker
                ) {
                  if (currentMonthLineAnimationFrameId)
                    cancelAnimationFrame(currentMonthLineAnimationFrameId);
                  currentMonthLineAnimationFrameId = null;
                  return;
                }
                currentAnimatedYMax = 0;
                // 애니메이션 스텝 값도 고정된 목표에 맞춰 재계산
                animationStepValue = targetYMax / animationDurationFrames;

                budgetChart.options.plugins.annotation.annotations.currentMonthLineMarker.yMax =
                  currentAnimatedYMax;
                budgetChart.update("none");
                currentMonthLineAnimationFrameId =
                  requestAnimationFrame(animateVerticalLine);
              }, 300);
            } else {
              if (currentMonthLineAnimationFrameId)
                cancelAnimationFrame(currentMonthLineAnimationFrameId);
              currentMonthLineAnimationFrameId = null;
            }
          } else {
            budgetChart.options.plugins.annotation.annotations.currentMonthLineMarker.yMax =
              currentAnimatedYMax;
            budgetChart.update("none");
            currentMonthLineAnimationFrameId =
              requestAnimationFrame(animateVerticalLine);
          }
        }

        setTimeout(() => {
          if (budgetChart && budgetChart.scales && budgetChart.scales.y) {
            currentAnimatedYMax = 0;
            animationStepValue = targetYMax / animationDurationFrames;

            budgetChart.options.plugins.annotation.annotations.currentMonthLineMarker.yMin = 0;
            budgetChart.options.plugins.annotation.annotations.currentMonthLineMarker.yMax = 0;
            budgetChart.update("none");

            currentMonthLineAnimationFrameId =
              requestAnimationFrame(animateVerticalLine);
          }
        }, 100);
      } else {
        startJiphangBAnimation();
      }
      showDeviationAnnotation();
                
    }

    function startJiphangBAnimation() {
      const currentYearData =
        window.allYearsData[window.currentDisplayedYear];
      if (
        !budgetChart ||
        !budgetChart.data ||
        !budgetChart.data.datasets ||
        !currentYearData ||
        !currentYearData.originalJiphangBData
      )
        return;

            const datasetsToAnimate = budgetChart.data.datasets.filter(
        (ds) => {
          const label = ds.label || "";
          // [SIAV v5.38] 비교 연도 고스트 선은 현재 연도 원본 데이터로 덮어쓰지 않도록 애니메이션에서 제외
          return (label === "집행B" || label.includes("] 집행B")) &&
                 !label.endsWith(" 평균") &&
                 !ds.hidden &&
                 !ds.isGhost;
        }
      );

      if (datasetsToAnimate.length === 0) return;

      const activeMonthIndexes = getActiveMonthIndexesFromDOM();

      datasetsToAnimate.forEach((ds) => {
        // [SIAV Fix] 프리픽스 제거 후 순수 라벨(주로 '집행B')로 원본 데이터 조회
        const baseLabel = ds.label.includes("] ") ? ds.label.split("] ")[1] : ds.label;
        const fullOriginalDataForLabel =
          currentYearData.originalJiphangBData[baseLabel] ||
          currentYearData.originalDatasetsData.find(
            (ods) => ods.label === baseLabel,
          )?.data;

        if (!fullOriginalDataForLabel) {
          ds._animationFullData = [];
          ds.data = [];
          return;
        }
        const animationPathData = fullOriginalDataForLabel.filter((point) =>
          activeMonthIndexes.includes(point.x),
        );
        ds._animationFullData = animationPathData;

        ds.data = animationPathData.length > 0 ? [animationPathData[0]] : [];
      });
      budgetChart.update("none");

      let currentPointIndex = 0;
      const maxPointIndex = datasetsToAnimate.reduce(
        (max, ds) => Math.max(max, ds._animationFullData.length),
        0,
      );
      const pointRevealDelay = 350;
      const maxJiphangBAnimations = 2;
      jiphangBAnimationCount = 0;

      if (jiphangBLineAnimationFrameId)
        clearTimeout(jiphangBLineAnimationFrameId);

      function animateJiphangBLines() {
        if (!budgetChart) {
          if (jiphangBLineAnimationFrameId)
            clearTimeout(jiphangBLineAnimationFrameId);
          jiphangBLineAnimationFrameId = null;
          return;
        }
        currentPointIndex++;

        if (currentPointIndex >= maxPointIndex) {
          datasetsToAnimate.forEach((ds) => {
            if (ds._animationFullData) ds.data = [...ds._animationFullData];
          });
          budgetChart.update("none");
          jiphangBAnimationCount++;

          if (jiphangBAnimationCount < maxJiphangBAnimations) {
            currentPointIndex = 0;
            datasetsToAnimate.forEach((ds) => {
              if (ds._animationFullData && ds._animationFullData.length > 0) {
                ds.data = [ds._animationFullData[0]];
              } else {
                ds.data = [];
              }
            });
            budgetChart.update("none");
            jiphangBLineAnimationFrameId = setTimeout(
              animateJiphangBLines,
              100,
            );
          } else {
            datasetsToAnimate.forEach((ds) => delete ds._animationFullData);
            if (jiphangBLineAnimationFrameId)
              clearTimeout(jiphangBLineAnimationFrameId);
            jiphangBLineAnimationFrameId = null;
          }
          return;
        }

        datasetsToAnimate.forEach((ds) => {
          if (
            ds._animationFullData &&
            currentPointIndex < ds._animationFullData.length
          ) {
            ds.data.push(ds._animationFullData[currentPointIndex]);
          }
        });
        budgetChart.update({
          duration: pointRevealDelay - 50 > 0 ? pointRevealDelay - 50 : 0,
          easing: "linear",
        });
        jiphangBLineAnimationFrameId = setTimeout(
          animateJiphangBLines,
          pointRevealDelay,
        );
      }
      jiphangBLineAnimationFrameId = setTimeout(animateJiphangBLines, 50);
    }

    function attachTableExpansionListeners() {
      const dataTableDiv = document.getElementById("data-table");
      if (!dataTableDiv) return;
      const resizeHandle = document.getElementById("table-resize-handle");

      dataTableDiv.onmouseenter = function () {
        if (
          !isZoomed &&
          isTableVisibleUserSettings &&
          !isResizingTable &&
          !isDraggingTable
        ) {
          if (resizeHandle) resizeHandle.style.display = "block";
        }
      };
    }

    function makeTableDraggable() {
      const dataTable = document.getElementById("data-table");
      const dragHandle = document.getElementById("table-drag-handle");

      if (dragHandle) {
        dragHandle.onmousedown = function (event) {
          if (event.button !== 0 || isResizingTable) return;
          if (
            event.target.closest(
              'input[type="checkbox"], a, #table-resize-handle, .close-table-btn',
            )
          ) {
            return;
          }

          isDraggingTable = true;
          dataTable.classList.add("dragging");
          dataTable.dataset.dragged = "true";

          const rect = dataTable.getBoundingClientRect();
          dataTable.style.transformOrigin = "top left";

          let currentScale = 1;
          const transformStyle = window.getComputedStyle(dataTable).transform;
          if (
            transformStyle &&
            transformStyle !== "none" &&
            transformStyle.includes("scale")
          ) {
            try {
              const matrix = new DOMMatrix(transformStyle);
              currentScale = matrix.a;
            } catch (e) {
              console.warn(
                "DOMMatrix not supported for getting scale, using fallback.",
                e,
              );
              currentScale = dataTable.classList.contains("table-expanded")
                ? 1.08
                : 0.7;
            }
          } else if (dataTable.classList.contains("table-expanded")) {
            currentScale = 1.08;
          } else {
            currentScale = 0.7;
          }
          if (currentScale === 0 || isNaN(currentScale)) currentScale = 1;

          tableDragOffsetX = event.clientX - rect.left;
          tableDragOffsetY = event.clientY - rect.top;

          dataTable.style.left = `${rect.left}px`;
          dataTable.style.top = `${rect.top}px`;
          dataTable.style.transform = `scale(${currentScale})`;

          document.addEventListener("mousemove", dragTableElement);
          document.addEventListener("mouseup", stopDragTableElement);
          event.preventDefault();
        };
      }
    }

    function dragTableElement(event) {
      if (isDraggingTable) {
        event.preventDefault();
        let newLeft = event.clientX - tableDragOffsetX;
        let newTop = event.clientY - tableDragOffsetY;

        const vpWidth = document.documentElement.clientWidth;
        const vpHeight = document.documentElement.clientHeight;
        const tableRect = dataTableDiv.getBoundingClientRect();

        newLeft = Math.max(0, Math.min(newLeft, vpWidth - tableRect.width));
        newTop = Math.max(0, Math.min(newTop, vpHeight - tableRect.height));

        dataTableDiv.style.left = newLeft + "px";
        dataTableDiv.style.top = newTop + "px";
      }
    }

    function stopDragTableElement() {
      if (isDraggingTable) {
        isDraggingTable = false;
        dataTableDiv.classList.remove("dragging");

        document.removeEventListener("mousemove", dragTableElement);
        document.removeEventListener("mouseup", stopDragTableElement);
      }
    }

    function makeTableResizable() {
      const tableDiv = document.getElementById("data-table");
      const resizeHandle = document.getElementById("table-resize-handle");
      if (!tableDiv || !resizeHandle) return;

      resizeHandle.onmousedown = function (e) {
        if (e.button !== 0 || isDraggingTable) return;
        e.preventDefault();
        e.stopPropagation();
        isResizingTable = true;
        tableDiv.classList.add("resizing");

        tableResizeStartX = e.clientX;
        tableResizeStartY = e.clientY;

        const computedStyle = window.getComputedStyle(tableDiv);
        tableInitialWidth = parseFloat(computedStyle.width);
        tableInitialHeight = parseFloat(computedStyle.height);

        let currentScale = 1;
        const transformStyle = computedStyle.transform;
        if (
          transformStyle &&
          transformStyle !== "none" &&
          transformStyle.includes("scale")
        ) {
          try {
            const matrix = new DOMMatrix(transformStyle);
            currentScale = matrix.a;
          } catch (err) {
            console.warn(
              "DOMMatrix not supported for getting scale in resize, using fallback.",
              err,
            );
            currentScale = tableDiv.classList.contains("table-expanded")
              ? 1.08
              : 0.7;
          }
        } else {
          currentScale = tableDiv.classList.contains("table-expanded")
            ? 1.08
            : tableDiv.style.transform.includes("scale(0.7)")
              ? 0.7
              : 1;
        }
        if (currentScale === 0 || isNaN(currentScale) || currentScale < 0.1)
          currentScale = 1;

        document.onmousemove = function (event) {
          if (!isResizingTable) return;
          event.preventDefault();

          const deltaX = event.clientX - tableResizeStartX;
          const deltaY = event.clientY - tableResizeStartY;

          let newWidth = tableInitialWidth + deltaX / currentScale;
          let newHeight = tableInitialHeight + deltaY / currentScale;

          const minWidth = 200;
          const minHeight = 100;
          newWidth = Math.max(newWidth, minWidth);
          newHeight = Math.max(newHeight, minHeight);

          tableDiv.style.width = newWidth + "px";
          tableDiv.style.height = newHeight + "px";
        };

        document.onmouseup = function () {
          isResizingTable = false;
          tableDiv.classList.remove("resizing");
          document.onmousemove = null;
          document.onmouseup = null;
        };
      };
    }

    function setupLegendControls() {
      const buttonIds = [
        "toggle-all",
        "toggle-jiphaeng",
        "toggle-mokpyo",
        "toggle-siljeok",
        "toggle-average",
      ];
      buttonIds.forEach((id) => {
        const oldBtn = document.getElementById(id);
        if (!oldBtn) return;

        const newBtn = oldBtn.cloneNode(true);
        newBtn.addEventListener("click", () => {
          if (!budgetChart || !budgetChart.data || !budgetChart.data.datasets)
            return;

          let mainLabelPattern = null,
            averageLabelPattern = null;
          let isToggleAll = false,
            isToggleAverageOnly = false;

          if (id === "toggle-jiphaeng") {
            mainLabelPattern = "집행B";
            averageLabelPattern = "집행B 평균";
          } else if (id === "toggle-mokpyo") {
            mainLabelPattern = "목표A";
            averageLabelPattern = "목표A 평균";
          } else if (id === "toggle-siljeok") {
            mainLabelPattern = "실적C";
            averageLabelPattern = "실적C 평균";
          } else if (id === "toggle-all") isToggleAll = true;
          else if (id === "toggle-average") isToggleAverageOnly = true;

          let datasetsWereModified = false;

          if (isToggleAll) {
            const allDatasets = budgetChart.data.datasets;
            const allHidden = allDatasets.every((ds) => ds.hidden);
            allDatasets.forEach((ds) => {
              if (ds.hidden !== !allHidden) {
                ds.hidden = !allHidden;
                datasetsWereModified = true;
                if (ds.hidden) window.selectionPoints = window.selectionPoints.filter(p => p.datasetLabel !== ds.label);
              }
            });
            if (datasetsWereModified && !allHidden) {
              window.selectionPoints = [];
    window.calculationMode = "diff";
            }
          } else if (isToggleAverageOnly) {
            const averageDatasets = budgetChart.data.datasets.filter((ds) =>
              ds.label.endsWith(" 평균"),
            );
            if (averageDatasets.length > 0) {
              const allHidden = averageDatasets.every((ds) => ds.hidden);
              averageDatasets.forEach((ds) => {
                if (ds.hidden !== !allHidden) {
                  ds.hidden = !allHidden;
                  datasetsWereModified = true;
                  if (ds.hidden) window.selectionPoints = window.selectionPoints.filter(p => p.datasetLabel !== ds.label);
                }
              });
            }
          } else if (mainLabelPattern) {
            // 4단계 토글 로직:
            // 단계 0: 둘 다 숨김 -> 클릭 -> 기준선만 표시
            // 단계 1: 기준선만 표시 -> 클릭 -> 기준선+평균 표시
            // 단계 2: 기준선+평균 표시 -> 클릭 -> 평균만 표시
            // 단계 3: 평균만 표시 -> 클릭 -> 둘 다 숨김
            const mainDs = budgetChart.data.datasets.find(
              (ds) => ds.label.includes(mainLabelPattern) && !ds.label.includes("평균")
            );
            const avgDs = budgetChart.data.datasets.find(
              (ds) => ds.label.includes(averageLabelPattern)
            );
            if (mainDs || avgDs) {
              const mainVisible = !!(mainDs && !mainDs.hidden);
              const avgVisible = !!(avgDs && !avgDs.hidden);
              // 현재 상태 결정
              // 0: none, 1: main only, 2: both, 3: avg only
              let currentState = 0;
              if (mainVisible && avgVisible) currentState = 2;
              else if (mainVisible && !avgVisible) currentState = 1;
              else if (!mainVisible && avgVisible) currentState = 3;
              else currentState = 0;
              // 다음 상태 계산
              const nextState = (currentState + 1) % 4;

              if (mainDs) {
                const shouldShowMain = nextState === 1 || nextState === 2;
                if (mainDs.hidden === shouldShowMain) {
                  mainDs.hidden = !shouldShowMain;
                  datasetsWereModified = true;
                }
                if (!shouldShowMain) window.selectionPoints = window.selectionPoints.filter(p => p.datasetLabel !== mainDs.label);
                
              }
              if (avgDs) {
                const shouldShowAvg = nextState === 2 || nextState === 3;
                if (avgDs.hidden === shouldShowAvg) {
                  avgDs.hidden = !shouldShowAvg;
                  datasetsWereModified = true;
                }
                if (!shouldShowAvg) window.selectionPoints = window.selectionPoints.filter(p => p.datasetLabel !== avgDs.label);
                
              }
            }
          }

          if (datasetsWereModified) {
            if (budgetChart) {
              budgetChart.options.scales.y.max = calculateMaxY(
                budgetChart.data.datasets,
              );
            }
            budgetChart.update();
          
            updateLegendButtonStates();
            showDeviationAnnotation();
                
          }
        });
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
      });
    }

    function updateLegendButtonStates() {

        return;

      const updateButtonState = (

        }
      };

        const button = document.getElementById("toggle-all");

        if (allDatasets.length > 0) {
          const allHidden = allDatasets.every((ds) => ds.hidden);
          button.textContent = `전체 ${allHidden ? "보이기" : "숨기기"}`;
          if (allHidden) button.classList.add("active"); else button.classList.remove("active");
        } else {
          button.textContent = `전체 전체`;
        }
      };

      updateButtonState("목표A", "목표A 평균", "toggle-mokpyo", "목표");
      updateButtonState("집행B", "집행B 평균", "toggle-jiphaeng", "집행");
      updateButtonState("실적C", "실적C 평균", "toggle-siljeok", "실적");
      updateAverageOnlyButtonState("toggle-average", "평균만");
      updateAllButtonState();

        function addMonthSelectionFeatureLogic(evt) {
      if (!budgetChart || isResizingTable) return;
      if (window.calcBadgeState && window.calcBadgeState.suppressNextClick) {
        window.calcBadgeState.suppressNextClick = false;
        return;
      }

      const points = budgetChart.getElementsAtEventForMode(evt, "nearest", { intersect: true }, true);
      
      // 배경 클릭은 선택 배지를 유지한다. 닫기는 각 배지의 X 버튼으로만 수행한다.
      if (points.length === 0) {
        return;
      }

      const point = points[0];
      const dataset = budgetChart.data.datasets[point.datasetIndex];
      const dataPoint = dataset.data[point.index];

      if (!dataPoint || dataset.hidden) return;

      const clickedPoint = {
        monthIndex: dataPoint.x,
        datasetLabel: dataset.label,
        value: dataPoint.y,
        color: dataset.borderColor || dataset.backgroundColor
      };

      if (!window.selectionPoints) window.selectionPoints = [];
      const existingIdx = window.selectionPoints.findIndex(p => 
        p.monthIndex === clickedPoint.monthIndex && p.datasetLabel === clickedPoint.datasetLabel
      );

      if (existingIdx > -1) {
        window.selectionPoints.splice(existingIdx, 1);
      } else {
        window.selectionPoints.push(clickedPoint);
      }
      if (window.calcBadgeState) {
        window.calcBadgeState.closedIds = new Set();
        window.calcBadgeState.customCenters = {};
        window.calcBadgeState.hoverId = null;
        window.calcBadgeState.drag = null;
      }

      showDeviationAnnotation();
                
    }

    function showDeviationAnnotation() {
      if (
        !budgetChart ||
        !budgetChart.options ||
        !budgetChart.options.plugins ||
        !budgetChart.options.plugins.annotation
      ) return;

      const ann = budgetChart.options.plugins.annotation.annotations;
      const selectPts = window.selectionPoints || [];
      const calcMode = window.calculationMode || "diff";

      Object.keys(ann).forEach(k => {
        if (!k.includes("currentMonthLineMarker") && !k.includes("zoomPreviewRect")) {
          delete ann[k];
        }
      });

      if (selectPts.length === 0) {
        budgetChart.update("none");
        return;
      }

      const layoutState = showDeviationAnnotation.createLayoutState(selectPts);
      const badgeState = showDeviationAnnotation.getBadgeState();
      badgeState.rects = {};
      const isDiffMode = calcMode === "diff";
      const basePoint = selectPts[0];
      let runningTotal = 0;

      selectPts.forEach((p, i) => {
        runningTotal += p.value;
        const isBase = i === 0;
        const diff = isBase ? 0 : p.value - basePoint.value;
        const orderToken = showDeviationAnnotation.circledNumber(i);
        const groupStyle = showDeviationAnnotation.getGroupStyle(i);
        const calloutColor = groupStyle.color;
        const borderColor = groupStyle.border;
        const bgColor = groupStyle.bg;

        ann[`selPtMark${i}`] = {
          type: "point",
          xValue: p.monthIndex,
          yValue: p.value,
          backgroundColor: p.color,
          borderColor,
          borderWidth: isBase ? 3.6 : 3,
          radius: isBase ? 10.5 : 9
        };

        ann[`selOrderBadge${i}`] = {
          enabled: true,
          display: true,
          type: "label",
          xValue: p.monthIndex,
          yValue: p.value,
          xAdjust: 0,
          yAdjust: 0,
          backgroundColor: calloutColor,
          borderColor: "#FFF",
          borderWidth: 1.8,
          color: "#FFF",
          font: { size: 13, weight: "900" },
          content: orderToken,
          padding: { top: 2, bottom: 2, left: 4, right: 4 },
          borderRadius: 8,
          shadowBlur: 2,
          shadowColor: "rgba(0,0,0,0.2)",
          position: "center"
        };

        if (isDiffMode && !isBase) {
          ann[`devConnectLine${i}`] = {
            type: "line",
            xMin: basePoint.monthIndex,
            yMin: basePoint.value,
            xMax: p.monthIndex,
            yMax: p.value,
            borderColor: showDeviationAnnotation.alphaColor(borderColor, 0.42),
            borderWidth: 2,
            borderDash: [5, 4]
          };
        }

        if (!isDiffMode && !isBase) {
          const prevPoint = selectPts[i - 1];
          ann[`sumPath${i}`] = {
            type: "line",
            xMin: prevPoint.monthIndex,
            yMin: prevPoint.value,
            xMax: p.monthIndex,
            yMax: p.value,
            borderColor: showDeviationAnnotation.alphaColor(borderColor, 0.42),
            borderWidth: 2,
            borderDash: [4, 4]
          };
        }

        const content = isDiffMode
          ? showDeviationAnnotation.diffCalloutContent(p, i, diff)
          : showDeviationAnnotation.sumCalloutContent(p, i, runningTotal);

        const badgeId = `calcResultLabel${i}`;
        if (!badgeState.closedIds.has(badgeId)) {
          showDeviationAnnotation.renderPointCallout(
            ann,
            badgeId,
            p,
            content,
            calloutColor,
            bgColor,
            borderColor,
            layoutState,
            { orderIndex: i, mode: calcMode, isBase }
          );
        }
      });

      budgetChart.update("none");
    }

    showDeviationAnnotation.getMonthLabel = function(p) {
      const idx = Number(p && p.monthIndex);
      if (Number.isInteger(idx)) {
        if (Array.isArray(currentXAxisLabels) && currentXAxisLabels[idx]) return currentXAxisLabels[idx];
        if (Array.isArray(chartMonths) && chartMonths[idx]) return chartMonths[idx];
        return `${idx + 1}월`;
      }
      return "";
    };

    showDeviationAnnotation.compactDatasetLabel = function(label) {
      return String(label || "")
        .replace(/^\[(\d+)\ub144\]\s*/, "$1년 ")
        .replace(" 평균", "Avg")
        .replace(/\s+/g, " ")
        .trim();
    };

    showDeviationAnnotation.circledNumber = function(index) {
      const tokens = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮"];
      return tokens[index] || `(${index + 1})`;
    };

    showDeviationAnnotation.getGroupStyle = function(index) {
      const palette = [
        { color: "#1A237E", bg: "rgba(232, 234, 246, 0.98)", border: "rgba(26, 35, 126, 0.9)" },
        { color: "#D84315", bg: "rgba(255, 243, 224, 0.98)", border: "rgba(216, 67, 21, 0.9)" },
        { color: "#2E7D32", bg: "rgba(232, 245, 233, 0.98)", border: "rgba(46, 125, 50, 0.9)" },
        { color: "#6A1B9A", bg: "rgba(243, 229, 245, 0.98)", border: "rgba(106, 27, 154, 0.9)" },
        { color: "#00695C", bg: "rgba(224, 242, 241, 0.98)", border: "rgba(0, 105, 92, 0.9)" },
        { color: "#AD1457", bg: "rgba(252, 228, 236, 0.98)", border: "rgba(173, 20, 87, 0.9)" },
        { color: "#5D4037", bg: "rgba(239, 235, 233, 0.98)", border: "rgba(93, 64, 55, 0.9)" }
      ];
      return palette[index % palette.length];
    };

    showDeviationAnnotation.alphaColor = function(color, alpha) {
      const rgba = String(color || "").match(/rgba?\(([^)]+)\)/);
      if (!rgba) return color;
      const parts = rgba[1].split(",").map((part) => part.trim());
      return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
    };

    showDeviationAnnotation.getBadgeState = function() {
      if (!window.calcBadgeState) {
        window.calcBadgeState = {
          rects: {},
          customCenters: {},
          closedIds: new Set(),
          hoverId: null,
          drag: null,
          suppressNextClick: false
        };
      }
      if (!(window.calcBadgeState.closedIds instanceof Set)) {
        window.calcBadgeState.closedIds = new Set(window.calcBadgeState.closedIds || []);
      }
      window.calcBadgeState.rects = window.calcBadgeState.rects || {};
      window.calcBadgeState.customCenters = window.calcBadgeState.customCenters || {};
      return window.calcBadgeState;
    };

    showDeviationAnnotation.pointLabel = function(p) {
      return `${showDeviationAnnotation.compactDatasetLabel(p.datasetLabel)} ${showDeviationAnnotation.getMonthLabel(p)}`;
    };

    showDeviationAnnotation.diffCalloutContent = function(p, index, diff) {
      const token = showDeviationAnnotation.circledNumber(index);
      const monthAmount = `해당월 ${showDeviationAnnotation.formatMoney(p.value, false)}`;
      if (index === 0) {
        return [`${token} 기준`, monthAmount, showDeviationAnnotation.pointLabel(p)];
      }
      return [`${token} 차액 ${showDeviationAnnotation.formatMoney(diff, true)}`, monthAmount, "① 기준 대비"];
    };

    showDeviationAnnotation.sumCalloutContent = function(p, index, runningTotal) {
      const token = showDeviationAnnotation.circledNumber(index);
      return [
        `${token} 누적 ${showDeviationAnnotation.formatMoney(runningTotal, false)}`,
        `해당월 ${showDeviationAnnotation.formatMoney(p.value, false)}`,
        showDeviationAnnotation.pointLabel(p)
      ];
    };

    showDeviationAnnotation.formatMoney = function(value, signed) {
      const prefix = signed && value > 0 ? "+" : "";
      return `${prefix}${(value / 1000000).toFixed(2)}백만`;
    };

    showDeviationAnnotation.createLayoutState = function(selectPts) {
      const chartArea = budgetChart.chartArea;
      const xScale = budgetChart.scales.x;
      const yScale = budgetChart.scales.y;
      const pointPixels = [];
      const occupied = [];

      if (chartArea && xScale && yScale) {
        selectPts.forEach((p) => {
          const x = xScale.getPixelForValue(p.monthIndex);
          const y = yScale.getPixelForValue(p.value);
          if (Number.isFinite(x) && Number.isFinite(y)) {
            pointPixels.push({ x, y });
            occupied.push({ left: x - 18, right: x + 18, top: y - 18, bottom: y + 18, role: "point" });
          }
        });
      }

      return { chartArea, xScale, yScale, occupied, pointPixels };
    };

    showDeviationAnnotation.estimateTextWidth = function(text, fontSize) {
      return Array.from(String(text || "")).reduce((sum, ch) => {
        if (ch === " ") return sum + fontSize * 0.34;
        return sum + fontSize * (ch.charCodeAt(0) > 255 ? 0.88 : 0.56);
      }, 0);
    };

    showDeviationAnnotation.wrapLineToWidth = function(line, fontSize, maxWidth) {
      const chars = Array.from(String(line || ""));
      if (chars.length === 0) return [""];

      const wrapped = [];
      let current = "";
      chars.forEach((ch) => {
        const next = current + ch;
        if (current && showDeviationAnnotation.estimateTextWidth(next, fontSize) > maxWidth) {
          wrapped.push(current);
          current = ch.trimStart();
        } else {
          current = next;
        }
      });
      if (current) wrapped.push(current);
      return wrapped;
    };

    showDeviationAnnotation.rectOverlapArea = function(a, b) {
      const width = Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
      const height = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
      return width * height;
    };

    showDeviationAnnotation.getCalloutMetrics = function(content, availableWidth, scale) {
      const isCompact = availableWidth < 520 || window.innerWidth <= 768;
      const zoomScale = scale || 1;
      const fontSize = (isCompact ? 11 : 12) * zoomScale;
      const padding = (isCompact ? 6 : 7) * zoomScale;
      const closeSize = Math.max(18, Math.min(34, fontSize * 2));
      const closeGap = Math.max(6, fontSize * 0.58);
      const closeReserve = closeSize + closeGap;
      const maxWidth = Math.max(102, Math.min((isCompact ? 156 : 182) * zoomScale, availableWidth));
      const maxContentWidth = Math.max(56, maxWidth - padding * 2 - closeReserve);
      const wrappedLines = [];

      content.forEach((line) => {
        showDeviationAnnotation.wrapLineToWidth(line, fontSize, maxContentWidth).forEach((part) => {
          wrappedLines.push(part);
        });
      });

      const textWidth = wrappedLines.reduce((max, line) => {
        return Math.max(max, showDeviationAnnotation.estimateTextWidth(line, fontSize));
      }, 0);
      const lineHeight = Math.ceil(fontSize * 1.24);
      const width = Math.min(maxWidth, Math.max(76, Math.ceil(textWidth + padding * 2 + closeReserve)));
      return {
        content: wrappedLines,
        fontSize,
        padding,
        paddingBox: {
          top: padding,
          bottom: padding,
          left: padding,
          right: padding + closeReserve
        },
        closeSize,
        closeReserve,
        width,
        height: Math.max(32, Math.ceil(wrappedLines.length * lineHeight + padding * 2))
      };
    };

    showDeviationAnnotation.findCalloutCenter = function(pointX, pointY, metrics, layoutState, orderIndex) {
      const chartArea = layoutState.chartArea;
      const occupied = layoutState.occupied;
      const margin = 8;
      const minX = chartArea.left + margin + metrics.width / 2;
      const maxX = chartArea.right - margin - metrics.width / 2;
      const minY = chartArea.top + margin + metrics.height / 2;
      const maxY = chartArea.bottom - margin - metrics.height / 2;
      const clamp = (value, min, max) => min > max ? (min + max) / 2 : Math.min(max, Math.max(min, value));
      const isCompact = (chartArea.right - chartArea.left) < 520 || window.innerWidth <= 768;
      const pointPixels = layoutState.pointPixels || [];
      const clusterRight = pointPixels.reduce((max, p) => Math.max(max, p.x), pointX);
      const clusterTop = pointPixels.reduce((min, p) => Math.min(min, p.y), pointY);

      const candidates = [];
      if (isCompact) {
        const stackX = clamp(clusterRight + metrics.width / 2 + 18, minX, maxX);
        const stackY = clamp(clusterTop - 28 - (pointPixels.length - 1 - orderIndex) * (metrics.height + 7), minY, maxY);
        candidates.push({ x: stackX, y: stackY, strong: true });
        candidates.push({ x: clamp(pointX + metrics.width / 2 + 18, minX, maxX), y: clamp(pointY - 22 - orderIndex * 4, minY, maxY) });
        candidates.push({ x: clamp(pointX, minX, maxX), y: clamp(pointY - metrics.height / 2 - 22, minY, maxY) });
      } else {
        const bandY = clamp(clusterTop - metrics.height / 2 - 62 - (orderIndex % 2) * (metrics.height + 8), minY, maxY);
        candidates.push({ x: clamp(pointX, minX, maxX), y: bandY, strong: true });
        candidates.push({ x: clamp(pointX + metrics.width / 2 + 28, minX, maxX), y: clamp(pointY - metrics.height / 2 - 38, minY, maxY) });
        candidates.push({ x: clamp(pointX - metrics.width / 2 - 28, minX, maxX), y: clamp(pointY - metrics.height / 2 - 38, minY, maxY) });
      }

      for (let row = 0; row < Math.max(2, pointPixels.length + 1); row += 1) {
        candidates.push({
          x: clamp(pointX + (row % 2 === 0 ? 1 : -1) * (metrics.width * 0.55 + row * 12), minX, maxX),
          y: clamp(clusterTop - 48 - row * (metrics.height + 8), minY, maxY)
        });
      }

      let best = null;
      candidates.forEach((candidate, priority) => {
        const rect = {
          left: candidate.x - metrics.width / 2,
          right: candidate.x + metrics.width / 2,
          top: candidate.y - metrics.height / 2,
          bottom: candidate.y + metrics.height / 2,
          role: "callout"
        };
        const overlap = occupied.reduce((sum, other) => sum + showDeviationAnnotation.rectOverlapArea(rect, other), 0);
        const distance = Math.hypot(candidate.x - pointX, candidate.y - pointY);
        const score = overlap * 6000 + distance * 0.42 + priority * 8 - (candidate.strong ? 16 : 0);
        if (!best || score < best.score) best = { score, centerX: candidate.x, centerY: candidate.y, rect };
      });

      return best;
    };

    showDeviationAnnotation.renderPointCallout = function(ann, id, point, content, color, bg, border, layoutState, options) {
      const chartArea = layoutState && layoutState.chartArea;
      const xScale = layoutState && layoutState.xScale;
      const yScale = layoutState && layoutState.yScale;
      if (!chartArea || !xScale || !yScale) return;

      const pointX = xScale.getPixelForValue(point.monthIndex);
      const pointY = yScale.getPixelForValue(point.value);
      if (!Number.isFinite(pointX) || !Number.isFinite(pointY)) return;

      const badgeState = showDeviationAnnotation.getBadgeState();
      const isDraggingThisBadge = !!(badgeState.drag && badgeState.drag.id === id);
      const isHovered = badgeState.hoverId === id && !isDraggingThisBadge;
      const availableWidth = Math.max(86, chartArea.right - chartArea.left - 16);
      const normalMetrics = showDeviationAnnotation.getCalloutMetrics(content, availableWidth, 1);
      const metrics = isHovered
        ? showDeviationAnnotation.getCalloutMetrics(content, availableWidth, 2)
        : normalMetrics;
      let basePlacement;
      const customCenter = badgeState.customCenters[id];
      if (customCenter) {
        const margin = 8;
        const clamp = (value, min, max) => min > max ? (min + max) / 2 : Math.min(max, Math.max(min, value));
        const centerX = clamp(
          customCenter.x,
          chartArea.left + margin + normalMetrics.width / 2,
          chartArea.right - margin - normalMetrics.width / 2
        );
        const centerY = clamp(
          customCenter.y,
          chartArea.top + margin + normalMetrics.height / 2,
          chartArea.bottom - margin - normalMetrics.height / 2
        );
        basePlacement = {
          centerX,
          centerY,
          rect: {
            left: centerX - normalMetrics.width / 2,
            right: centerX + normalMetrics.width / 2,
            top: centerY - normalMetrics.height / 2,
            bottom: centerY + normalMetrics.height / 2,
            role: "callout"
          }
        };
      } else {
        basePlacement = showDeviationAnnotation.findCalloutCenter(pointX, pointY, normalMetrics, layoutState, options.orderIndex || 0);
      }
      if (!basePlacement) return;

      let placement = basePlacement;
      if (isHovered) {
        const margin = 8;
        const clamp = (value, min, max) => min > max ? (min + max) / 2 : Math.min(max, Math.max(min, value));
        const centerX = clamp(
          basePlacement.centerX,
          chartArea.left + margin + metrics.width / 2,
          chartArea.right - margin - metrics.width / 2
        );
        const centerY = clamp(
          basePlacement.centerY,
          chartArea.top + margin + metrics.height / 2,
          chartArea.bottom - margin - metrics.height / 2
        );
        placement = {
          centerX,
          centerY,
          rect: {
            left: centerX - metrics.width / 2,
            right: centerX + metrics.width / 2,
            top: centerY - metrics.height / 2,
            bottom: centerY + metrics.height / 2,
            role: "callout"
          }
        };
      }

      layoutState.occupied.push(placement.rect);
      const closeSize = metrics.closeSize;
      const closeCenterX = placement.rect.right - metrics.padding - closeSize * 0.5;
      const closeCenterY = placement.rect.top + metrics.padding + closeSize * 0.5;
      const closeRect = {
        left: closeCenterX - closeSize * 0.85,
        right: closeCenterX + closeSize * 0.85,
        top: closeCenterY - closeSize * 0.85,
        bottom: closeCenterY + closeSize * 0.85
      };
      badgeState.rects[id] = {
        rect: placement.rect,
        closeRect,
        closeCenterX,
        closeCenterY,
        centerX: placement.centerX,
        centerY: placement.centerY,
        baseCenterX: basePlacement.centerX,
        baseCenterY: basePlacement.centerY,
        isHovered,
        isDragging: isDraggingThisBadge,
        pointX,
        pointY
      };
      const leaderX = xScale.getValueForPixel(placement.centerX);
      const leaderY = yScale.getValueForPixel(placement.centerY);
      ann[`${id}Leader`] = {
        type: "line",
        xMin: point.monthIndex,
        yMin: point.value,
        xMax: leaderX,
        yMax: leaderY,
        borderColor: border,
        borderWidth: options.isBase ? 1.2 : 1.6,
        borderDash: options.isBase ? [2, 4] : [4, 3]
      };

      ann[id] = {
        enabled: true,
        display: true,
        type: "label",
        xValue: point.monthIndex,
        yValue: point.value,
        xAdjust: placement.centerX - pointX,
        yAdjust: placement.centerY - pointY,
        backgroundColor: bg,
        borderColor: border,
        borderWidth: (options.isBase ? 1.6 : 2) * (isHovered ? 2 : 1),
        color,
        font: { size: metrics.fontSize, weight: "800" },
        content: metrics.content,
        padding: metrics.paddingBox,
        borderRadius: 7 * (isHovered ? 2 : 1),
        shadowBlur: isHovered ? 14 : 5,
        shadowColor: isHovered ? "rgba(0,0,0,0.32)" : "rgba(0,0,0,0.18)",
        textAlign: "center",
        position: "center"
      };
      ann[`${id}Close`] = {
        enabled: true,
        display: true,
        type: "label",
        xValue: point.monthIndex,
        yValue: point.value,
        xAdjust: closeCenterX - pointX,
        yAdjust: closeCenterY - pointY,
        backgroundColor: "rgba(255,255,255,0)",
        borderColor: "rgba(255,255,255,0)",
        borderWidth: 0,
        color: border,
        font: { size: Math.max(13, metrics.fontSize * 1.16), weight: "900" },
        content: ["X"],
        padding: 0,
        textAlign: "center",
        position: "center"
      };
    };

    showDeviationAnnotation.getCanvasPointer = function(evt) {
      const canvas = budgetChart && budgetChart.canvas;
      if (!canvas) return null;
      const source = evt.touches && evt.touches.length ? evt.touches[0] : evt.changedTouches && evt.changedTouches.length ? evt.changedTouches[0] : evt;
      const rect = canvas.getBoundingClientRect();
      return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
      };
    };

    showDeviationAnnotation.containsPoint = function(rect, point) {
      return !!rect &&
        point.x >= rect.left &&
        point.x <= rect.right &&
        point.y >= rect.top &&
        point.y <= rect.bottom;
    };

    showDeviationAnnotation.hitBadge = function(point) {
      const badgeState = showDeviationAnnotation.getBadgeState();
      const entries = Object.entries(badgeState.rects || {}).reverse();
      for (const [id, meta] of entries) {
        if (showDeviationAnnotation.containsPoint(meta.closeRect, point)) {
          return { id, meta, part: "close" };
        }
        if (showDeviationAnnotation.containsPoint(meta.rect, point)) {
          return { id, meta, part: "body" };
        }
      }
      return null;
    };

    showDeviationAnnotation.handleBadgePointerDown = function(evt) {
      if (!budgetChart) return false;
      const point = showDeviationAnnotation.getCanvasPointer(evt);
      if (!point) return false;
      const hit = showDeviationAnnotation.hitBadge(point);
      if (!hit) return false;

      const badgeState = showDeviationAnnotation.getBadgeState();
      badgeState.suppressNextClick = true;
      if (hit.part === "close") {
        badgeState.closedIds.add(hit.id);
        if (badgeState.hoverId === hit.id) badgeState.hoverId = null;
        delete badgeState.customCenters[hit.id];
        badgeState.drag = null;
        showDeviationAnnotation();
        return true;
      }

      badgeState.drag = {
        id: hit.id,
        offsetX: point.x - hit.meta.centerX,
        offsetY: point.y - hit.meta.centerY
      };
      badgeState.customCenters[hit.id] = {
        x: hit.meta.centerX,
        y: hit.meta.centerY
      };
      badgeState.hoverId = hit.id;
      const canvas = budgetChart.canvas;
      if (canvas) canvas.style.cursor = "grabbing";
      showDeviationAnnotation();
      return true;
    };

    showDeviationAnnotation.handleBadgePointerMove = function(evt) {
      if (!budgetChart) return false;
      const point = showDeviationAnnotation.getCanvasPointer(evt);
      if (!point) return false;
      const badgeState = showDeviationAnnotation.getBadgeState();

      if (badgeState.drag) {
        const chartArea = budgetChart.chartArea;
        const id = badgeState.drag.id;
        const meta = badgeState.rects[id];
        const width = meta ? (meta.rect.right - meta.rect.left) : 100;
        const height = meta ? (meta.rect.bottom - meta.rect.top) : 50;
        const margin = 8;
        const clamp = (value, min, max) => min > max ? (min + max) / 2 : Math.min(max, Math.max(min, value));
        badgeState.customCenters[id] = {
          x: clamp(point.x - badgeState.drag.offsetX, chartArea.left + margin + width / 2, chartArea.right - margin - width / 2),
          y: clamp(point.y - badgeState.drag.offsetY, chartArea.top + margin + height / 2, chartArea.bottom - margin - height / 2)
        };
        badgeState.hoverId = id;
        badgeState.suppressNextClick = true;
        showDeviationAnnotation();
        return true;
      }

      const hit = showDeviationAnnotation.hitBadge(point);
      const hoverId = hit && (hit.part === "body" || badgeState.hoverId === hit.id) ? hit.id : null;
      const canvas = budgetChart.canvas;
      if (canvas) {
        canvas.style.cursor = hit ? (hit.part === "close" ? "pointer" : "grab") : "";
      }
      if (badgeState.hoverId !== hoverId) {
        badgeState.hoverId = hoverId;
        showDeviationAnnotation();
      }
      return !!hit;
    };

    showDeviationAnnotation.handleBadgeClick = function(evt) {
      if (!budgetChart) return false;
      const badgeState = showDeviationAnnotation.getBadgeState();
      const point = showDeviationAnnotation.getCanvasPointer(evt);
      if (!point) return false;

      const hit = showDeviationAnnotation.hitBadge(point);
      if (hit && hit.part === "close") {
        badgeState.closedIds.add(hit.id);
        if (badgeState.hoverId === hit.id) badgeState.hoverId = null;
        delete badgeState.customCenters[hit.id];
        badgeState.drag = null;
        badgeState.suppressNextClick = true;
        showDeviationAnnotation();
        return true;
      }

      if (badgeState.suppressNextClick && hit) {
        badgeState.suppressNextClick = false;
        return true;
      }
      return false;
    };

    showDeviationAnnotation.closeAllBadges = function() {
      const badgeState = showDeviationAnnotation.getBadgeState();
      const hadSelection = !!(window.selectionPoints && window.selectionPoints.length);
      const hadRenderedBadges = !!(
        badgeState.rects &&
        Object.keys(badgeState.rects).length
      );
      if (!hadSelection && !hadRenderedBadges) return false;

      window.selectionPoints = [];
      badgeState.rects = {};
      badgeState.closedIds = new Set();
      badgeState.customCenters = {};
      badgeState.hoverId = null;
      badgeState.drag = null;
      badgeState.suppressNextClick = false;
      showDeviationAnnotation();
      return true;
    };

    showDeviationAnnotation.handleBadgePointerUp = function() {
      const badgeState = showDeviationAnnotation.getBadgeState();
      if (badgeState.drag) {
        badgeState.drag = null;
        badgeState.hoverId = null;
        if (budgetChart && budgetChart.canvas) budgetChart.canvas.style.cursor = "";
        showDeviationAnnotation();
        return true;
      }
      return false;
    };

    showDeviationAnnotation.handleBadgePointerLeave = function() {
      const badgeState = showDeviationAnnotation.getBadgeState();
      if (badgeState.drag) return;
      if (badgeState.hoverId) {
        badgeState.hoverId = null;
        if (budgetChart && budgetChart.canvas) budgetChart.canvas.style.cursor = "";
        showDeviationAnnotation();
      }
    };

    showDeviationAnnotation.renderSumLabel = function(ann, id, txt, x, y, color, bg) {
      const p = { monthIndex: x, value: y, datasetLabel: "", color };
      return showDeviationAnnotation.renderPointCallout(
        ann,
        id,
        p,
        Array.isArray(txt) ? txt : [String(txt)],
        color,
        bg,
        color,
        showDeviationAnnotation.createLayoutState(window.selectionPoints || []),
        { orderIndex: 0, mode: "sum", isBase: false }
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════════
    // GLOBAL INTERACTION HANDLERS (Custom Cursor Tracker)
    // ═══════════════════════════════════════════════════════════════════════════════
    document.addEventListener("mousedown", () => {
      document.body.classList.add("is-clicking");
    });

    document.addEventListener("mouseup", () => {
      document.body.classList.remove("is-clicking");
    });
  </script>
</body>
