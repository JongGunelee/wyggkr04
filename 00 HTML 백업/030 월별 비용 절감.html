      function ensureXlsxForWorkbookImport() {
        return new Promise((resolve, reject) => {
          if (typeof XLSX !== "undefined") {
            resolve();
            return;
          }
          const existing = Array.from(document.scripts).find((script) =>
            String(script.src || "").includes("xlsx.full.min.js"),
          );
          if (existing) {
            existing.addEventListener("load", () => resolve(), { once: true });
            existing.addEventListener("error", () => reject(new Error("SheetJS load failed")), {
              once: true,
            });
            return;
          }
          const script = document.createElement("script");
          script.src = "https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js";
          script.onload = () => resolve();
          script.onerror = () => reject(new Error("SheetJS load failed"));
          document.head.appendChild(script);
        });
      }

      function normalizeWorkbookHeader(value) {
        return String(value || "").replace(/\s+/g, "").trim();
      }

      function findWorkbookSheetName(workbook, baseName) {
        const target = normalizeWorkbookHeader(baseName);
        const names = workbook.SheetNames || [];
        return (
          names.find((name) => normalizeWorkbookHeader(name) === target) ||
          names.find((name) => normalizeWorkbookHeader(name).startsWith(target)) ||
          null
        );
      }

      function findWorkbookHeaderRow(rows, requiredHeaders) {
        const required = requiredHeaders.map(normalizeWorkbookHeader);
        return rows.findIndex((row) => {
          const headers = (row || []).map(normalizeWorkbookHeader);
          return required.every((header) => headers.includes(header));
        });
      }

      function workbookCellToText(value) {
        if (value === null || typeof value === "undefined") return "";
        if (value instanceof Date && !Number.isNaN(value.getTime())) {
          const yyyy = value.getFullYear();
          const mm = String(value.getMonth() + 1).padStart(2, "0");
          const dd = String(value.getDate()).padStart(2, "0");
          return `${yyyy}-${mm}-${dd}`;
        }
        return String(value).trim();
      }

      function workbookMonthToPeriod(value) {
        if (value instanceof Date && !Number.isNaN(value.getTime())) {
          const yyyy = value.getFullYear();
          const mm = String(value.getMonth() + 1).padStart(2, "0");
          return { year: String(yyyy), month: `${yyyy}-${mm}` };
        }
        const text = workbookCellToText(value);
        const serial = Number(text);
        if (Number.isFinite(serial) && serial > 20000 && typeof XLSX !== "undefined" && XLSX.SSF) {
          const parsed = XLSX.SSF.parse_date_code(serial);
          if (parsed && parsed.y && parsed.m) {
            const yyyy = String(parsed.y);
            const mm = String(parsed.m).padStart(2, "0");
            return { year: yyyy, month: `${yyyy}-${mm}` };
          }
        }
        const year = normalizeYearValue(text);
        const month = normalizeMonthValue(text, year);
        return { year, month: month || text };
      }

      function extractSavingRowsFromWorkbook(workbook) {
        const sheetName = findWorkbookSheetName(workbook, "절감목록");
        if (!sheetName) throw new Error("절감목록 워크시트를 찾을 수 없습니다.");
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
          header: 1,
          defval: "",
          raw: true,
        });
        const headerIndex = findWorkbookHeaderRow(rows, [
          "월",
          "작업유형",
          "절감항목",
          "A.집행비",
          "B.공사비 적용시",
          "절감비(A-B)",
          "비고",
        ]);
        if (headerIndex < 0) throw new Error("절감목록 헤더를 찾을 수 없습니다.");
        const headers = rows[headerIndex].map(normalizeWorkbookHeader);
        const headerMap = new Map(headers.map((header, index) => [header, index]));
        const getCell = (row, header) => row[headerMap.get(normalizeWorkbookHeader(header))];
        return rows
          .slice(headerIndex + 1)
          .map((row) => {
            const period = workbookMonthToPeriod(getCell(row, "월"));
            return {
              연도: period.year,
              월: period.month,
              작업유형: workbookCellToText(getCell(row, "작업유형")),
              절감항목: workbookCellToText(getCell(row, "절감항목")),
              "A.집행비": workbookCellToText(getCell(row, "A.집행비")),
              "B.공사비 적용시": workbookCellToText(getCell(row, "B.공사비 적용시")),
              "절감비(A-B)": workbookCellToText(getCell(row, "절감비(A-B)")),
              비고: workbookCellToText(getCell(row, "비고")),
            };
          })
          .filter((row) => row.월 && (row.작업유형 || row.절감항목));
      }

      function extractHyperlinkRulesFromWorkbook(workbook) {
        const sheetName = findWorkbookSheetName(workbook, "하이퍼링크");
        if (!sheetName) return [];
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
          header: 1,
          defval: "",
          raw: false,
        });
        const headerIndex = findWorkbookHeaderRow(rows, [
          "대상열",
          "검색텍스트",
          "링크URL",
          "링크유형",
        ]);
        if (headerIndex < 0) return [];
        const headers = rows[headerIndex].map(normalizeWorkbookHeader);
        const headerMap = new Map(headers.map((header, index) => [header, index]));
        const getCell = (row, header) => workbookCellToText(row[headerMap.get(normalizeWorkbookHeader(header))]);
        return rows
          .slice(headerIndex + 1)
          .map((row) => ({
            column: getCell(row, "대상열"),
            searchText: getCell(row, "검색텍스트"),
            linkUrl: getCell(row, "링크URL"),
            linkType: getCell(row, "링크유형") || "note",
            description: getCell(row, "설명"),
          }))
          .filter((rule) => rule.column && rule.searchText && rule.linkUrl);
      }

      function escapeWorkbookCsvField(value) {
        return `"${String(value ?? "").replace(/"/g, '""')}"`;
      }

      function loadSavingRowsThroughExistingCsvPipeline(rows, sourceLabel) {
        return new Promise((resolve, reject) => {
          const fileInput = document.getElementById("file-input");
          if (!fileInput) {
            reject(new Error("CSV 입력 컨트롤을 찾을 수 없습니다."));
            return;
          }
          const headers = [
            "연도",
            "월",
            "작업유형",
            "절감항목",
            "A.집행비",
            "B.공사비 적용시",
            "절감비(A-B)",
            "비고",
          ];
          const csvContent =
            "\uFEFF" +
            [
              headers.map(escapeWorkbookCsvField).join(","),
              ...rows.map((row) => headers.map((header) => escapeWorkbookCsvField(row[header])).join(",")),
            ].join("\n");
          const file = new File([csvContent], `${sourceLabel || "workbook"}.csv`, {
            type: "text/csv;charset=utf-8",
          });
          const transfer = new DataTransfer();
          transfer.items.add(file);
          fileInput.files = transfer.files;
          fileInput.dispatchEvent(new Event("change", { bubbles: true }));
          window.setTimeout(resolve, 900);
        });
      }

      async function loadDashboardWorkbookFromArrayBuffer(buffer, sourceLabel) {
        await ensureXlsxForWorkbookImport();
        const workbook = XLSX.read(buffer, { type: "array", cellDates: true });
        const savingRows = extractSavingRowsFromWorkbook(workbook);
        const workbookHyperlinkRules = extractHyperlinkRulesFromWorkbook(workbook);
        if (!savingRows.length) throw new Error("절감목록 워크시트에 로드할 데이터가 없습니다.");
        hyperlinkRules = workbookHyperlinkRules;
        await loadSavingRowsThroughExistingCsvPipeline(savingRows, sourceLabel);
        if (allData && allData.length > 0) {
          renderDashboardView();
          applyHyperlinkRules();
        }
        return {
          savingCount: savingRows.length,
          hyperlinkCount: workbookHyperlinkRules.length,
          sheets: workbook.SheetNames || [],
        };
      }

      async function loadDashboardWorkbookFromGithub() {
        setWorkbookLoadStatus("GitHub XLSX를 불러오는 중입니다.", true);
        try {
          await ensureXlsxForWorkbookImport();
          const response = await fetch(WEB_XLSX_SOURCE_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const buffer = await response.arrayBuffer();
          const result = await loadDashboardWorkbookFromArrayBuffer(buffer, "github-xlsx");
          setWorkbookLoadStatus(
            `GitHub XLSX 로드 완료: 절감목록 ${result.savingCount}건, 하이퍼링크 ${result.hyperlinkCount}건`,
            false,
          );
          console.log("[Workbook] GitHub XLSX loaded", result);
        } catch (error) {
          console.error("[Workbook] GitHub XLSX load failed", error);
          setWorkbookLoadStatus("GitHub XLSX 자동 로드 실패. XLSX Up으로 수동 업로드할 수 있습니다.", false);
        }
      }

      // === Table-specific XLS export button insertion ===
      (function tableXlsButtonHandler() {
        const ensureSheetJS = (cb) => {
          if (typeof XLSX !== "undefined") return cb();
          const s = document.createElement("script");
          s.src =
            "https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"; // 버전 고정
          s.onload = cb;
          s.onerror = () => console.warn("SheetJS load failed");
          document.head.appendChild(s);

        function createBtn() {
          const existing = document.getElementById("table-xls-btn");
          if (existing) return existing;
          const btn = document.createElement("button");
          btn.id = "table-xls-btn";
          btn.type = "button";
          btn.textContent = "xls";
          btn.title = "현재 테이블을 엑셀로 다운로드";
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const table = document.querySelector("#table-container table");
            if (!table || table.style.display === "none") {
              alert("테이블이 표시되지 않았습니다.");
              return;
            }
            ensureSheetJS(() => {
              try {
                const wb = XLSX.utils.book_new();
                // Clone full table and place in hidden container so table_to_sheet can read layout
                const clone = table.cloneNode(true);
                // Remove rows that are hidden in original
                const originalRows = Array.from(
                  document.querySelectorAll("#table-container table tr"),
                );
                const clonedRows = Array.from(clone.querySelectorAll("tr"));
                // Keep rows that correspond to visible original rows by index
                const visibleRowIndexes = originalRows
                  .map((r, i) => ({
                    i,
                    v: r.style.display !== "none" && r.offsetParent !== null,
                  }))
                  .filter((x) => x.v)
                  .map((x) => x.i);
                clonedRows.forEach((r, idx) => {
                  if (!visibleRowIndexes.includes(idx)) r.remove();
                });

                const holder = document.createElement("div");
                holder.style.cssText =
                  "position:fixed; left:-9999px; top:-9999px; visibility:hidden;";
                holder.appendChild(clone);
                document.body.appendChild(holder);
                const ws = XLSX.utils.table_to_sheet(clone);
                XLSX.utils.book_append_sheet(wb, ws, "Table");
                XLSX.writeFile(wb, "table_view.xlsx");
                holder.remove();
              } catch (err) {
                console.error(err);
                alert("엑셀로 변환 중 오류가 발생했습니다.");
              }
            });
          });
          return btn;
        }

        function insertBtnIfTableVisible() {
          const table = document.querySelector("#table-container table");
          if (!table) return;
          const thead = table.querySelector("thead");
          if (!thead || table.style.display === "none") {
            // remove btn if exists
            const existing = document.getElementById("table-xls-btn");
            if (existing) existing.remove();
            return;
          }
          // find '비고' header (Korean) by text
          const ths = Array.from(thead.querySelectorAll("th"));
          const remarkTh =
            ths.find((th) =>
              (th.textContent || "").trim().startsWith("비고"),
            ) || ths[ths.length - 1];
          if (!remarkTh) return;
          const btn = createBtn();
          // insert before remarkTh's text
          if (!remarkTh.querySelector("#table-xls-btn")) {
            remarkTh.insertBefore(btn, remarkTh.firstChild);
          }
        }

        // Observe display changes on table container
        const tableContainer = document.getElementById("table-container");
        if (tableContainer && window.MutationObserver) {
          const mo = new MutationObserver(() => {
            setTimeout(insertBtnIfTableVisible, 30);
          });
          mo.observe(tableContainer, {
            attributes: true,
            childList: true,
            subtree: true,
            attributeFilter: ["style"],
          });
        }
        // Also run on load and when render mode switches
        window.addEventListener("load", insertBtnIfTableVisible);
        window.addEventListener("resize", () => {
          setTimeout(insertBtnIfTableVisible, 30);
        });
        // Hook into renderDashboardView by wrapping the function if present
        if (typeof renderDashboardView === "function") {
          const orig = renderDashboardView;
          window.renderDashboardView = function () {
            orig();
            insertBtnIfTableVisible();
          };
        }
      })();

      // Note: The select-all-months UI was visually hidden earlier; keep visual removal but allow logic to run.

      // 개선 사항: 바탕화면 더블클릭으로 초기화 기능 추가
      document.body.addEventListener("dblclick", function (event) {
        const interactiveAreas = [
          "button",
          "a",
          "input",
          ".node",
          "#table-container",
          "#controls",
          "#select-all-container",
          "#year-filter-container",
          "#month-filter-container",
          ".note-popup",
        ];
        if (interactiveAreas.some((selector) => event.target.closest(selector))) {
          return;
        }
        if (allData.length === 0) return;
        enterBackgroundViewPreservingDateFilters();
      });

      // GLOBAL INTERACTION HANDLERS (Custom Cursor Tracker)
      // ═══════════════════════════════════════════════════════════════════════════════
      document.addEventListener("mousedown", () => {
        document.body.classList.add("is-clicking");
      });

      document.addEventListener("mouseup", () => {
        document.body.classList.remove("is-clicking");
      });
    </script>
  </body>
</html>
