      function applyResponsiveTableLabels() {
        const headers = [
          "연도",
          "월",
          "작업유형",
          "절감항목",
          "A.집행비",
          "B.공사비 적용시",
          "절감비(A-B)",
          "비고",
        ];
        document
          .querySelectorAll("#table-container tbody tr")
          .forEach((row) => {
            Array.from(row.children).forEach((cell, index) => {
              cell.dataset.label = headers[index] || "";
            });
          });
      }

      function syncMobileStickyLayout() {
        const tableContainer = document.getElementById("table-container");
        const chartElement = document.getElementById("chart");
        const filterBar = document.getElementById("filter-bar");
        const topbar = document.getElementById("topbar");
        if (!tableContainer || !chartElement || !filterBar) return;

        const isPortraitMobile = window.matchMedia(
          "(max-width: 768px) and (orientation: portrait)",
        ).matches;

        const isCollapsed = topbar && topbar.classList.contains("collapsed");
        const topbarRect = topbar ? topbar.getBoundingClientRect() : null;
        const filterTop = isCollapsed
          ? isPortraitMobile
            ? 22
            : 25
          : Math.max(
              isPortraitMobile ? 64 : 70,
              Math.ceil(topbarRect ? topbarRect.bottom : 72),
            );
        document.documentElement.style.setProperty(
          "--sticky-filter-top",
          `${filterTop}px`,
        );
        document.documentElement.style.setProperty(
          "--mobile-filter-top",
          `${filterTop}px`,
        );

        const filterHeight = Math.ceil(filterBar.getBoundingClientRect().height);
        const chartTop = filterTop + filterHeight + (isPortraitMobile ? 6 : 12);
        document.documentElement.style.setProperty(
          "--sticky-chart-top",
          `${chartTop}px`,
        );
        document.documentElement.style.setProperty(
          "--mobile-chart-top",
          `${chartTop}px`,
        );

        const chartHeight = Math.ceil(chartElement.getBoundingClientRect().height);
        const totalTop = Math.max(88, chartTop + chartHeight + 8);
        if (isPortraitMobile) {
          tableContainer.style.setProperty("--mobile-total-top", `${totalTop}px`);
        } else {
          tableContainer.style.removeProperty("--mobile-total-top");
        }
      }

      function requestMobileStickyLayoutSync() {
        if (mobileLayoutFrame) return;
        mobileLayoutFrame = requestAnimationFrame(() => {
          mobileLayoutFrame = 0;
          syncMobileStickyLayout();
        });
      }

      function ensureMobileLayoutSync() {
        if (mobileLayoutBound) return;
        window.addEventListener("resize", () => {
          requestMobileStickyLayoutSync();
        });
        window.addEventListener("orientationchange", () => {
          requestMobileStickyLayoutSync();
        });
        mobileLayoutBound = true;
      }

      function bindDetailTableRowFocus() {
        const tbody = document.querySelector("#table-container table tbody");
        if (!tbody || tbody.dataset.detailRowFocusBound === "1") return;
        tbody.dataset.detailRowFocusBound = "1";
        tbody.addEventListener(
          "click",
          function (event) {
            const row = event.target.closest("tr");
            if (
              !row ||
              !tbody.contains(row) ||
              row.classList.contains("sticky-total-row")
            ) {
              return;
            }
            tbody
              .querySelectorAll("tr.detail-row-focused")
              .forEach((focusedRow) => {
                if (focusedRow !== row) {
                  focusedRow.classList.remove("detail-row-focused");
                }
              });
            row.classList.toggle("detail-row-focused");
          },
          true,
        );
      }

      // Function to update the dashboard title with selected year(s)
      // 선택된 연도로 대시보드 제목 업데이트 기능
      function updateDashboardTitle() {
        const titleSuffixElement = document.getElementById(
          "dashboard-title-year-suffix",
        );
        if (!titleSuffixElement) return;

        const allAvailableYears = [...new Set(allData.map((d) => d.year))]
          .filter((y) => y)
          .sort((a, b) => a - b);

        if (
          allData.length > 0 &&
          selectedYears.size === 0 &&
          allAvailableYears.length > 0
        ) {
          titleSuffixElement.textContent = "(선택 되지 않음)"; // Updated text // 업데이트된 텍스트
        } else if (
          selectedYears.size > 0 &&
          selectedYears.size === allAvailableYears.length
        ) {
          const sortedSelectedYears = Array.from(selectedYears).sort(
            (a, b) => a - b,
          );
          titleSuffixElement.textContent = `(${sortedSelectedYears.join("년, ")}년)`;
        } else if (selectedYears.size > 0) {
          const sortedSelectedYears = Array.from(selectedYears).sort(
            (a, b) => a - b,
          );
          if (sortedSelectedYears.length > 2) {
            titleSuffixElement.textContent = `(${sortedSelectedYears[0]}년 외 ${sortedSelectedYears.length - 1}개)`;
          } else {
            titleSuffixElement.textContent = `(${sortedSelectedYears.join("년, ")}년)`;
          }
        } else {
          titleSuffixElement.textContent = "";
        }
      }

      // Function to update the text of the year filter button
      // 연도 필터 버튼의 텍스트 업데이트 기능
      function updateYearFilterButtonText() {
        const yearFilterBtn = document.getElementById("year-filter-btn");
        if (!yearFilterBtn) return;

        if (allData.length === 0) {
          yearFilterBtn.textContent = "연도 필터 ▼";
          return;
        }

        const allAvailableYears = [
          ...new Set(allData.map((d) => d.year)),
        ].filter((y) => y);

        if (selectedYears.size === 0 && allAvailableYears.length > 0) {
          yearFilterBtn.textContent = "연도 (전체 해제) ▼";
        } else if (
          allAvailableYears.length > 0 &&
          selectedYears.size === allAvailableYears.length
        ) {
          yearFilterBtn.textContent = "연도 (전체 선택) ▼";
        } else if (selectedYears.size === 1) {
          const selectedYear = selectedYears.values().next().value;
          yearFilterBtn.textContent = `연도 (${selectedYear}년) ▼`;
        } else if (selectedYears.size > 1) {
          yearFilterBtn.textContent = `연도 (${selectedYears.size}개) ▼`;
        } else {
          yearFilterBtn.textContent = "연도 필터 ▼";
        }
      }

      // Function to update the state of the "Select All Bubbles" checkbox
      // "모든 버블 선택" 체크박스 상태 업데이트 기능
      function updateSelectAllCheckboxState() {
        const selectAllCheckbox = document.getElementById("select-all");
        if (!selectAllCheckbox || allData.length === 0) {
          if (selectAllCheckbox) selectAllCheckbox.checked = false;
          return;
        }

        // 변경된 로직: 체크박스는 '최신 연도 프리셋'이 활성화되었는지를 나타냅니다.
        const allAvailableYears = [
          ...new Set(allData.map((d) => d.year).filter((y) => y)),
        ].sort((a, b) => b - a);

        // 데이터가 없으면 체크할 수 없습니다.
        if (allAvailableYears.length === 0) {
          selectAllCheckbox.checked = false;
          return;
        }

        const latestYear = allAvailableYears[0];

        // 조건 1: 최신 연도만 선택되었는가?
        const isLatestYearSelected =
          selectedYears.size === 1 && selectedYears.has(latestYear);

        // 조건 2: 해당 최신 연도의 모든 월이 선택되었는가?
        const monthsForLatestYear = new Set(
          allData
            .filter((d) => d.year === latestYear)
            .map((d) => d.month)
            .filter((m) => m),
        );
        let areAllMonthsForLatestYearSelected =
          monthsForLatestYear.size > 0 &&
          selectedMonths.size === monthsForLatestYear.size &&
          [...monthsForLatestYear].every((m) => selectedMonths.has(m));
        if (monthsForLatestYear.size === 0 && selectedMonths.size === 0) {
          areAllMonthsForLatestYearSelected = true; // 해당 연도에 월 데이터가 없는 경우도 참으로 간주
        }

        // 조건 3: 모든 작업 유형이 선택되었는가?
        const allPossibleTypesInData = new Set(
          allData.map((d) => d.type).filter((t) => t),
        );
        const areAllTypesSelected =
          allPossibleTypesInData.size > 0
            ? selectedTypes.size === allPossibleTypesInData.size
            : selectedTypes.size === 0;

        // 세 조건이 모두 충족될 때 체크박스가 활성화됩니다.
        selectAllCheckbox.checked =
          isLatestYearSelected &&
          areAllMonthsForLatestYearSelected &&
          areAllTypesSelected;
      }

      // Centralized full view refresh that can optionally skip recalculating selectedMonths
      // skipMonthRecalc: when true, do not recalculate selectedMonths (used for manual month interactions)
      function updateAllViews(skipMonthRecalc) {
        if (isMonthFilterManuallySelected) {
          syncManualMonthsToSelectedYears();
        } else if (!skipMonthRecalc) {
          // Recalculate selectedMonths based on selectedYears (same behavior as previous centralized logic)
          selectedMonths.clear();
          if (selectedYears.size > 0) {
            allData.forEach((d) => {
              if (selectedYears.has(d.year) && d.month) {
                selectedMonths.add(d.month);
              }
            });
          }
          // If selectedYears is empty then selectedMonths stays empty (explicit deselect case)
        }

        // UI & data updates
        updateYearFilter();
        updateYearFilterButtonText();
        updateDashboardTitle();
        updateMonthFilter();
        renderDashboardView();
        updateBubbleOpacity();
        updateBubbleTextsBasedOnFilter();
        updateSelectAllCheckboxState();
        updateSelectAllMonthsCheckboxState();
      }

      // --- 통합된 레거시 연동 함수: 중앙 업데이트 파이프라인으로 위임 ---
      // 기존에 많은 위치에서 호출되므로 함수명을 유지하고 내부에서 중앙화된
      // updateAllViews(false)를 호출하여 동작을 단일 경로로 통합합니다.
      function updateLinkedFiltersAndRender() {
        // 위임: selectedMonths 재계산이 필요하므로 skipMonthRecalc=false
        updateAllViews(false);
      }
      // --- 통합 완료 ---

      // Function to populate and handle year filter options in the popup
      // 팝업에서 연도 필터 옵션 채우기 및 처리 기능
      function updateYearFilter() {
        const yearCheckboxesPopup = document.getElementById(
          "year-checkboxes-popup",
        );
        const allAvailableYears = [
          ...new Set(allData.map((d) => d.year).filter((y) => y)),
        ].sort((a, b) => b - a);

        // 연도 필터 팝업 내 체크박스 목록을 다시 그림.
        // selectedYears Set에 포함된 연도는 체크되고, 'selected' 클래스가 라벨에 추가됨.
        yearCheckboxesPopup.innerHTML = allAvailableYears
          .map(
            (y) => `
        <label class="year-checkbox ${selectedYears.has(y) ? "selected" : ""}">
          <input type="checkbox" value="${y}" ${selectedYears.has(y) ? "checked" : ""}>
          ${y}년
        </label>
      `,
          )
          .join("");

        yearCheckboxesPopup
          .querySelectorAll(".year-checkbox")
          .forEach((checkboxLabel) => {
            checkboxLabel.addEventListener("click", function (event) {
              event.stopPropagation(); // 이벤트 버블링 중단 (팝업 닫힘 방지)

              const yearInput = this.querySelector("input");
              const year = yearInput.value;

              // 라벨 클릭 시 input의 checked 상태는 이미 변경된 후임.
              if (yearInput.checked) {
                selectedYears.add(year);
                // this.classList.add('selected'); // updateLinkedFiltersAndRender -> updateYearFilter에서 처리
              } else {
                selectedYears.delete(year);
                // this.classList.remove('selected'); // updateLinkedFiltersAndRender -> updateYearFilter에서 처리
              }
              isInitialMonthClick = true; // 연도 변경 시 월 필터 클릭 상태 초기화
              isYearFilterManuallySetAllOrNone = false; // 개별 연도 선택 시 플래그 해제

              if (displayMode !== "table") displayMode = "summary"; // 상세 테이블 활성 상태에서는 테이블 유지
              syncManualMonthsToSelectedYears();
              updateLinkedFiltersAndRender(); // 통합된 업데이트 함수 호출
            });
          });
        // 초기 로드 시 또는 데이터 없을 때도 버튼 텍스트는 업데이트 필요
        updateYearFilterButtonText();
        updateDashboardTitle();
      }

      // Function to populate and handle month filter options
      // 월 필터 옵션 채우기 및 처리 기능
      function updateMonthFilter() {
        const selectAllMonthsLabel = document.getElementById(
          "select-all-months-label",
        );
        const monthCheckboxes = document.getElementById("month-checkboxes");
        let yearFilteredData = allData;

        // selectedYears에 따라 표시할 월 목록을 결정
        if (selectedYears.size > 0) {
          yearFilteredData = allData.filter((d) => selectedYears.has(d.year));
        } else {
          // 선택된 연도가 없으면 (예: "전체 해제" 시) 모든 데이터를 기반으로 가능한 월 목록을 보여주되, 선택은 하지 않음
          // 또는, 연도가 선택되지 않으면 월 목록을 비울 수도 있음. 현재는 모든 데이터를 기반으로 함.
          // 만약 isYearFilterManuallySetAllOrNone가 true이고 selectedYears가 비어있으면, 실제로 월을 보여주지 않아야 할 수 있음.
          // 이 부분은 updateLinkedFiltersAndRender에서 selectedMonths가 이미 비워져 있으므로 괜찮음.
          if (isYearFilterManuallySetAllOrNone && selectedYears.size === 0) {
            yearFilteredData = []; // 명시적 전체 해제 시 월 목록도 비움
          }
        }

        // --- 개선 사항: 월 필터를 역순으로 정렬 (예: 12월, 11월...) ---
        const allAvailableMonthsForDisplay = [
          ...new Set(yearFilteredData.map((d) => d.month).filter((m) => m)),
        ].sort((a, b) => {
          const [aYear, aMon] = a.split("-").map(Number);
          const [bYear, bMon] = b.split("-").map(Number);
          if (aYear !== bYear) return bYear - aYear; // 연도를 내림차순으로 정렬
          return bMon - aMon; // 같은 연도 내에서 월을 내림차순으로 정렬
        });

        // Show or hide the master checkbox based on month availability
        if (allAvailableMonthsForDisplay.length > 0) {
          selectAllMonthsLabel.style.display = "flex";
        } else {
          selectAllMonthsLabel.style.display = "none";
        }

        // selectedMonths는 updateLinkedFiltersAndRender 또는 다른 핸들러에서 이미 설정됨.
        // 여기서는 해당 selectedMonths를 기반으로 UI만 업데이트.
        const yearsInMonthDisplay = [
          ...new Set(
            allAvailableMonthsForDisplay
              .map((m) => String(m).split("-")[0])
              .filter(Boolean),
          ),
        ];
        const shouldGroupMonthsByYear =
          selectedYears.size > 1 && yearsInMonthDisplay.length > 1;
        monthCheckboxes.classList.toggle(
          "grouped-by-year",
          shouldGroupMonthsByYear,
        );

        const renderMonthCheckbox = (m) => `
        <label class="month-checkbox ${selectedMonths.has(m) ? "selected" : ""}">
          <input type="checkbox" value="${m}" ${selectedMonths.has(m) ? "checked" : ""}>
          ${formatMonth(m)}
        </label>
      `;

        if (shouldGroupMonthsByYear) {
          monthCheckboxes.innerHTML = yearsInMonthDisplay
            .map((year) => {
              const monthsForYear = allAvailableMonthsForDisplay.filter((m) =>
                String(m).startsWith(`${year}-`),
              );
              return `
        <div class="month-year-group" data-year="${year}">
          <span class="month-year-label">${year}년</span>
          <div class="month-year-months">
            ${monthsForYear.map(renderMonthCheckbox).join("")}
          </div>
        </div>
      `;
            })
            .join("");
        } else {
          monthCheckboxes.innerHTML = allAvailableMonthsForDisplay
            .map(renderMonthCheckbox)
            .join("");
        }

        monthCheckboxes
          .querySelectorAll(".month-year-label")
          .forEach((yearLabel) => {
            yearLabel.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopPropagation();

              const group = this.closest(".month-year-group");
              if (!group) return;

              const monthsForYear = Array.from(
                group.querySelectorAll(".month-checkbox input"),
              ).map((input) => input.value);
              if (monthsForYear.length === 0) return;

              const hasAnySelectedMonth = monthsForYear.some((month) =>
                selectedMonths.has(month),
              );

              if (hasAnySelectedMonth) {
                monthsForYear.forEach((month) => selectedMonths.delete(month));
              } else {
                monthsForYear.forEach((month) => selectedMonths.add(month));
              }

              isInitialMonthClick = false;
              isYearFilterManuallySetAllOrNone = false;
              isMonthFilterManuallySelected = true;
              rememberManualMonthSelection();
              updateAllViews(true);
              updateBubbleOpacity();
              updateBubbleTextsBasedOnFilter();
            });
          });

        monthCheckboxes
          .querySelectorAll(".month-checkbox")
          .forEach((checkboxLabel) => {
            checkboxLabel.addEventListener("mousedown", function (e) {
              e.preventDefault(); // 기본 동작(체크박스 토글)을 막고 커스텀 로직 실행
              const monthInput = this.querySelector("input");
              const month = monthInput.value;

              // 첫 클릭 시: 다른 월 선택을 모두 해제하고 현재 월만 선택
              if (selectedMonths.has(month)) {
                selectedMonths.delete(month);
              } else {
                selectedMonths.add(month);
              }
              isInitialMonthClick = false;

              isYearFilterManuallySetAllOrNone = false;
              isMonthFilterManuallySelected = true;
              rememberManualMonthSelection();
              if (displayMode !== "table") displayMode = "summary";

              // 월 상태가 수동으로 변경되었으므로, 월 재계산 없이(true) 뷰 업데이트
              updateAllViews(true);
              // 버블 상태 즉시 업데이트
              updateBubbleOpacity();
              updateBubbleTextsBasedOnFilter();
            });
          });
        updateSelectAllMonthsCheckboxState();
        requestMobileStickyLayoutSync();
      }

      // Function to update the state of the "Select All Months" checkbox
      // "월 전체선택" 체크박스 상태 업데이트 기능
      function updateSelectAllMonthsCheckboxState() {
        const selectAllMonthsCheckbox =
          document.getElementById("select-all-months");
        if (!selectAllMonthsCheckbox) return;

        let yearFilteredData = allData;
        if (selectedYears.size > 0) {
          yearFilteredData = allData.filter((d) => selectedYears.has(d.year));
        } else if (
          isYearFilterManuallySetAllOrNone &&
          selectedYears.size === 0
        ) {
          yearFilteredData = [];
        }

        let availableMonths = [
          ...new Set(yearFilteredData.map((d) => d.month).filter((m) => m)),
        ];

        // If no months are available because the year filter is empty (explicit deselect),
        // avoid globally selecting months from disparate years which can cause data/visual conflicts.
        // Instead, limit month selection to the latest year present in the data.
        if (availableMonths.length === 0 && selectedYears.size === 0) {
          const yearsInData = [
            ...new Set(allData.map((d) => d.year).filter((y) => y)),
          ].map(Number);
          if (yearsInData.length > 0) {
            const latestYear = Math.max(...yearsInData);
            availableMonths = [
              ...new Set(
                allData
                  .filter((d) => Number(d.year) === latestYear)
                  .map((d) => d.month)
                  .filter((m) => m),
              ),
            ];
          } else {
            availableMonths = [];
          }
        }
        const availableMonthCount = availableMonths.length;
        // Count only selected months that are available in the current year selection
        const relevantSelectedMonthCount = availableMonths.filter((m) =>
          selectedMonths.has(m),
        ).length;

        if (availableMonthCount === 0) {
          selectAllMonthsCheckbox.checked = false;
          selectAllMonthsCheckbox.indeterminate = false;
          selectAllMonthsCheckbox.disabled = true;
        } else {
          selectAllMonthsCheckbox.disabled = false;
          if (relevantSelectedMonthCount === 0) {
            selectAllMonthsCheckbox.checked = false;
            selectAllMonthsCheckbox.indeterminate = false;
          } else if (relevantSelectedMonthCount === availableMonthCount) {
            selectAllMonthsCheckbox.checked = true;
            selectAllMonthsCheckbox.indeterminate = false;
          } else {
            selectAllMonthsCheckbox.checked = false;
            selectAllMonthsCheckbox.indeterminate = true;
          }
        }
      }

      // Function to update the opacity of bubbles based on current filters
      // 현재 필터를 기반으로 버블 불투명도 업데이트 기능
      function updateBubbleOpacity() {
        if (!svg) return;
        svg.selectAll(".node").each(function (d_node) {
          const node = d3.select(this);
          const isTypeSelectedBySet = selectedTypes.has(d_node.data.type);

          const nodeYears = d_node.data.years || [];
          const nodeMonths = d_node.data.months || [];

          // 연도 필터: "전체 해제" (selectedYears.size === 0 이지만 isYearFilterManuallySetAllOrNone가 true인 경우)는 데이터 없음으로 간주
          const allYearsInData = new Set(
            allData.map((d) => d.year).filter((y) => y),
          );
          let isYearEffectivelySelected =
            selectedYears.size > 0
              ? nodeYears.some((y) => selectedYears.has(y))
              : true;
          if (
            selectedYears.size === 0 &&
            isYearFilterManuallySetAllOrNone &&
            allYearsInData.size > 0
          ) {
            isYearEffectivelySelected = false; // 명시적 전체 해제 시 버블 비활성화
          } else if (selectedYears.size === 0 && allYearsInData.size === 0) {
            // 데이터 로드 전
            isYearEffectivelySelected = true; // 또는 false, 상황에 따라
          }

          // --- 월 필터 로직 개선 ---
          // 현재 연도 필터에 따라 선택 가능한 월 목록을 먼저 결정합니다.
          let yearFilteredDataForMonthCheck = allData;
          if (selectedYears.size > 0) {
            yearFilteredDataForMonthCheck = allData.filter((d) =>
              selectedYears.has(d.year),
            );
          } else if (
            isYearFilterManuallySetAllOrNone &&
            allYearsInData.size > 0
          ) {
            yearFilteredDataForMonthCheck = [];
          }
          const availableMonthsAfterYearFilter = [
            ...new Set(
              yearFilteredDataForMonthCheck
                .map((d) => d.month)
                .filter((m) => m),
            ),
          ];

          let isMonthMatch;
          if (selectedMonths.size > 0) {
            // 선택된 월이 있을 경우
            // 이 버블의 월 중에 선택된 월이 있는지 확인합니다.
            isMonthMatch = nodeMonths.some((m) => selectedMonths.has(m));
          } else {
            // 선택된 월이 없을 때:
            // - 선택 가능한 월이 애초에 없었다면 월 필터는 무시됩니다 (true).
            // - 선택 가능한 월이 있었는데 선택된 월이 없다면, 사용자가 모두 해제한 것이므로 매치되지 않습니다 (false).
            isMonthMatch = availableMonthsAfterYearFilter.length === 0;
          }
          // --- 월 필터 로직 개선 끝 ---

          let opacity = 0.3;
          let stroke = "#cccccc";
          let strokeWidth = 2;
          let isNodeEffectivelySelected = false;

          if (
            isTypeSelectedBySet &&
            isYearEffectivelySelected &&
            isMonthMatch
          ) {
            opacity = 1;
            stroke = "#000000";
            strokeWidth = 4;
            isNodeEffectivelySelected = true;
          } else if (
            selectedTypes.size === 0 &&
            isYearEffectivelySelected &&
            isMonthMatch &&
            selectedMonths.size > 0
          ) {
            // Explicit month-only selection: highlight matching bubbles fully
            opacity = 1;
            stroke = "#000000";
            strokeWidth = 3;
            isNodeEffectivelySelected = true;
          } else if (
            selectedTypes.size === 0 &&
            isYearEffectivelySelected &&
            isMonthMatch
          ) {
            // No explicit month selection and no type filter: dimmed default
            opacity = 0.5;
          } else if (
            isTypeSelectedBySet &&
            (!isYearEffectivelySelected || !isMonthMatch)
          ) {
            opacity = 0.1;
          } else if (selectedTypes.size > 0 && !isTypeSelectedBySet) {
            opacity = 0.1;
          } else if (!isYearEffectivelySelected) {
            opacity = 0.1; // 연도 필터가 효과적으로 선택되지 않은 경우
          }

          node.classed("selected", isNodeEffectivelySelected);
          node.style("opacity", null);
          node
            .select("circle")
            .attr("stroke", stroke)
            .attr("stroke-width", strokeWidth)
            .style("opacity", opacity)
            .transition()
            .duration(100)
            .attr("r", Math.max(0, (Number(d_node.r) || 0) * (isNodeEffectivelySelected ? 1.3 : 1)));
          node
            .select("text")
            .style("opacity", opacity <= 0.15 ? 0 : 1)
            .style(
              "font-weight",
              isNodeEffectivelySelected ? "bold" : "normal",
            );
        });
      }

      // Function to update the text within bubbles based on current filters
      // 현재 필터를 기반으로 버블 내 텍스트 업데이트 기능
      function updateBubbleTextsBasedOnFilter() {
        if (!svg || !allData.length) return;

        svg.selectAll(".node").each(function (d_node) {
          const nodeElement = d3.select(this);
          const type = d_node.data.type;

          let filteredDataForType = allData.filter(
            (item) => item.type === type,
          );

          // 연도 필터: "전체 해제" 시 데이터 없도록 처리
          const allYearsInData = new Set(
            allData.map((d) => d.year).filter((y) => y),
          );
          if (selectedYears.size > 0) {
            filteredDataForType = filteredDataForType.filter((item) =>
              selectedYears.has(item.year),
            );
          } else if (
            allData.length > 0 &&
            allYearsInData.size > 0 &&
            isYearFilterManuallySetAllOrNone
          ) {
            // "전체 해제" 상태
            filteredDataForType = [];
          }

          // --- 월 필터 로직 개선 ---
          const availableMonthsAfterYearAndTypeFilter = [
            ...new Set(
              filteredDataForType.map((d) => d.month).filter((m) => m),
            ),
          ];
          if (selectedMonths.size > 0) {
            filteredDataForType = filteredDataForType.filter((item) =>
              selectedMonths.has(item.month),
            );
          } else {
            // 연도/유형 필터링 후 선택 가능한 월이 있었지만, 선택된 월이 없는 경우 (사용자가 모든 월 선택을 해제함)
            if (availableMonthsAfterYearAndTypeFilter.length > 0) {
              filteredDataForType = [];
            }
          }
          // --- 월 필터 로직 개선 끝 ---

          currentTotalSavings = d3.sum(
            filteredDataForType,
            (item) => item.saving,
          );
          currentItemCount = filteredDataForType.filter(
            (item) => item.saving !== 0,
          ).length;

          const amountTspan = nodeElement.select("text .amount-tspan");
          const countTspan = nodeElement.select("text .count-tspan");

          if (amountTspan.node()) {
            amountTspan.text(d3.format(",")(currentTotalSavings));
          }
          if (countTspan.node()) {
            countTspan.text(`${currentItemCount}건`);
          }
        });
      }

      // Function to initialize the chart area
      // 차트 영역 초기화 기능
      function initChart() {
        normalizeDashboardLayout();
        const chartContainer = document.getElementById("chart");
        const containerWidth = chartContainer.clientWidth;
        const containerHeight = chartContainer.clientHeight;
        width = Math.min(containerWidth, containerHeight);
        height = width;

        const baseFontSize = Math.min(18, width / 18);

        if (
          !svg ||
          svg.attr("width") !== width ||
          svg.attr("height") !== height
        ) {
          d3.select("#chart").selectAll("*").remove();
          svg = d3
            .select("#chart")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet");
        }
        window.chartFontSize = baseFontSize;
      }

      // Function to draw the bubble chart
      // 버블 차트 그리기 기능
      function drawChart() {
        if (!svg) initChart();

        if (svg.selectAll("*").size() > 0) {
          svg.selectAll("*").remove();
        }

        const backgroundRect = svg
          .append("rect")
          .attr("width", width)
          .attr("height", height)
          .attr("fill", "transparent");

        // --- 개선 사항: 빈 화면 클릭/더블 클릭 시 동작 변경 ---
        const handleBackgroundClick = function () {
          enterBackgroundViewPreservingDateFilters();
        };

        backgroundRect.on("click", function (event) {
          if (event.detail === 2) return; // 더블 클릭의 일부인 경우 무시
          handleBackgroundClick();
        });

        backgroundRect.on("dblclick", function (event) {
          event.preventDefault();
          event.stopPropagation();
          handleBackgroundClick();
        });

        const packData = d3
          .rollups(
            allData,
            (v) => {
              const validData = v.filter(
                (d) => d.month && d.type && d.detail && d.year,
              );
              const itemCount = validData.length;
              return {
                value: d3.sum(validData, (d) => Math.abs(d.saving)) || 1,
                total: d3.sum(validData, (d) => d.saving) || 0,
                months: [...new Set(validData.map((d) => d.month))],
                years: [...new Set(validData.map((d) => d.year))],
                itemCount: itemCount,
              };
            },
            (d) => d.type,
          )
          .map(([type, stats]) => ({ type, ...stats }));

        const sizeScale = 0.95;
        const pack = d3
          .pack()
          .size([
            (width - margin * 2) * sizeScale,
            (height - margin * 2) * sizeScale,
          ])
          .padding(4);

        const root = pack(
          d3.hierarchy({ children: packData }).sum((d) => d.value),
        );
        colorScale = d3
          .scaleOrdinal()
          .domain(packData.map((d) => d.type))
          .range(createBubblePalette(packData.length));

        updateSelectAllCheckboxState();

        const bubbleHeightValue =
          d3.max(root.leaves(), (d) => d.y + d.r) -
          d3.min(root.leaves(), (d) => d.y - d.r);
        const offsetY =
          (height - bubbleHeightValue) / 2 -
          d3.min(root.leaves(), (d) => d.y - d.r);
        const offsetX = margin + 35;

        const nodes = svg
          .selectAll("g.node")
          .data(root.leaves(), (d) => d.data.type)
          .enter()
          .append("g")
          .attr("class", "node")
          .attr(
            "transform",
            (d) => `translate(${d.x + offsetX},${d.y + offsetY + margin})`,
          )
          .on("click", function (event, d_node) {
            event.preventDefault();
            event.stopPropagation();

            const clickedType = d_node.data.type;
            captureDetailReturnFilters();
            if (event.ctrlKey || event.metaKey) {
              // Ctrl 또는 Cmd 키와 함께 클릭 시 다중 선택/해제
              if (selectedTypes.has(clickedType)) {
                selectedTypes.delete(clickedType);
              } else {
                selectedTypes.add(clickedType);
              }
            } else {
              // 단독 클릭 시
              if (selectedTypes.has(clickedType) && selectedTypes.size === 1) {
                // 이미 선택된 버블을 다시 클릭하면 선택 해제
                selectedTypes.clear();
              } else {
                // 새로운 버블 선택 또는 다른 버블로 변경
                selectedTypes.clear();
                selectedTypes.add(clickedType);
              }
            }
            isYearFilterManuallySetAllOrNone = false; // 버블 클릭 시에는 명시적 전체 선택/해제 상태 해제

            // --- 개선 사항: 버블 클릭 시 월 필터 연동 ---
            if (hasActiveManualMonthSnapshot()) {
              preserveManualMonthsForDetailMode();
            } else {
              selectedMonths.clear();
              if (selectedTypes.size > 0) {
                allData.forEach((d) => {
                  if (
                    selectedTypes.has(d.type) &&
                    (selectedYears.size === 0 || selectedYears.has(d.year)) &&
                    d.month
                  ) {
                    selectedMonths.add(d.month);
                  }
                });
              } else {
                allData.forEach((d) => {
                  if (
                    (selectedYears.size === 0 || selectedYears.has(d.year)) &&
                    d.month
                  ) {
                    selectedMonths.add(d.month);
                  }
                });
              }
            }

            displayMode = "table"; // 버블 클릭 시 테이블 모드로 전환

            // 중앙화된 업데이트 호출 (월 재계산을 건너뛰어 수동으로 설정한 selectedMonths 유지)
            updateAllViews(true);
          });

        nodes
          .append("circle")
          .attr("r", (d) => Math.max(0, Number(d.r) || 0))
          .attr("fill", (d) => getTypeColor(d.data.type));

        nodes
          .append("text")
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .style("fill", (d) => getReadableBubbleTextColor(getTypeColor(d.data.type)))
          .style("font-weight", 700)
          .style("text-shadow", (d) =>
            getReadableBubbleTextColor(getTypeColor(d.data.type)) === "#ffffff"
              ? "0 1px 2px rgba(15, 23, 42, 0.28)"
              : "0 1px 1px rgba(255, 255, 255, 0.42)"
          )
          .each(function (d) {
            const t = d3.select(this);
            t.text("");

            const typeText = d.data.type;
            const typeWords = typeText.split(" ");
            let currentLine = "";
            let lines = [];

            const maxTextWidth = d.r * 1.8;
            const fontSize = Math.min(window.chartFontSize, d.r / 3);

            typeWords.forEach((word) => {
              if (((currentLine + word).length * fontSize) / 2 > maxTextWidth) {
                lines.push(currentLine.trim());
                currentLine = word;
              } else {
                currentLine += (currentLine ? " " : "") + word;
              }
            });
            if (currentLine) lines.push(currentLine.trim());

            const lineHeight = fontSize * 1.2;
            const amountText = d3.format(",")(d.data.total);
            const amountFontSize = Math.min(fontSize, d.r / 4);
            const countText = `${d.data.itemCount}건`;
            const countFontSize = Math.min(amountFontSize, d.r / 5);

            const totalTextHeight =
              lines.length * lineHeight + lineHeight * 1.5 + lineHeight * 1.2;
            const startY = -totalTextHeight / 2 + lineHeight / 2;

            lines.forEach((line, i) => {
              t.append("tspan")
                .attr("x", 0)
                .attr("dy", i === 0 ? startY + "px" : lineHeight + "px")
                .text(line)
                .style("font-size", fontSize + "px");
            });

            const typeToAmountGap = lineHeight * 1.5;
            t.append("tspan")
              .attr("class", "amount-tspan")
              .attr("x", 0)
              .attr("dy", typeToAmountGap + "px")
              .text(amountText)
              .style("font-size", amountFontSize + "px");

            const amountToCountGap = lineHeight * 1.2;
            t.append("tspan")
              .attr("class", "count-tspan")
              .attr("x", 0)
              .attr("dy", amountToCountGap + "px")
              .text(countText)
              .style("font-size", countFontSize + "px");
          });
        updateBubbleOpacity();
        updateBubbleTextsBasedOnFilter();
      }

      window.addEventListener("resize", function () {
        if (allData.length > 0) {
          initChart();
          drawChart();
        }
        checkMenuOverlap();
      });

      const fileInput = document.getElementById("file-input");
      document
        .getElementById("raw-upload-btn")
        .addEventListener("click", function () {
          fileInput.click();
        });

      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();

        function formatNumberWithCommas(str) {
          if (/^-?\d+$/.test(str)) {
            return str.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          }
          return str.replace(/(\d{3,})/g, function (match) {
            return match.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          });
        }

        reader.onload = function (ev) {
          try {
            const rawData = d3.csvParse(ev.target.result, normalizeCsvRecord);
            if (!rawData || !rawData.length) {
              console.error("CSV 파일을 분석할 수 없습니다.");
              return;
            }

            function normalizeCsvRecord(d) {
              const monthRaw = (d["월"] || "").trim();
              const yearRaw = normalizeYearValue(d["연도"] || "");
              let year = yearRaw,
                month = "";

              if (monthRaw.includes("-")) {
                const parts = monthRaw.split("-");
                if (parts.length === 3) {
                  // YYYY-MM-DD 형식: parts[0]=YYYY, parts[1]=MM, parts[2]=DD
                  year = normalizeYearValue(parts[0]) || yearRaw;
                  const mm = String(Number(parts[1])).padStart(2, "0");
                  month = year ? `${year}-${mm}` : mm;
                } else if (parts.length === 2) {
                  // YYYY-MM 형식
                  year = normalizeYearValue(parts[0]) || yearRaw;
                  month = normalizeMonthValue(monthRaw, year);
                } else {
                  year = normalizeYearValue(parts[0]) || yearRaw;
                  month = normalizeMonthValue(monthRaw, year);
                }
              } else if (yearRaw && getMonthNumber(monthRaw)) {
                month = normalizeMonthValue(monthRaw, yearRaw);
              } else if (monthRaw.length === 4 && !isNaN(monthRaw)) {
                year = normalizeYearValue(monthRaw);
                month = "";
              } else {
                month = normalizeMonthValue(monthRaw, year);
              }

              const type = d["작업유형"] || "";
              const detail = d["절감항목"] || "";
              const note = d["비고"] || "";
              const actual =
                parseFloat((d["A.집행비"] || "0").replace(/,/g, "")) || 0;
              const estimated =
                parseFloat((d["B.공사비 적용시"] || "0").replace(/,/g, "")) || 0;
              const saving =
                parseFloat((d["절감비(A-B)"] || "0").replace(/,/g, "")) || 0;

              const formattedDetail = formatNumberWithCommas(detail);
              let formattedNote = formatNumberWithCommas(note);

              const minLaborCostLinks = {
                "기계 최소인건비":
                  "https://photos.app.goo.gl/od8H1Cn9ZXcyttq6A",
                "건축 최소인건비":
                  "https://photos.app.goo.gl/RY4GxypvWKuGJnuu7",
                "전기 최소인건비":
                  "https://photos.app.goo.gl/htiYjUpzb8U7YtdW8",
              };
              Object.entries(minLaborCostLinks).forEach(([text, url]) => {
                if (formattedNote.includes(text)) {
                  formattedNote = formattedNote.replace(
                    text,
                    `<span class="min-labor-cost-link" onclick="window.open('${url}', '_blank')">${text}</span>`,
                  );
                }
              });

              return {
                year: year,
                month: month,
                type: type,
                detail: formattedDetail,
                actual: actual,
                estimated: estimated,
                saving: saving,
                note: formattedNote,
              };
            }

            function processData(rawData) {
              return rawData.sort((a, b) => {
                  if (a.year !== b.year) return a.year.localeCompare(b.year);
                  if (a.month !== b.month)
                    return a.month.localeCompare(b.month);
                  return a.type.localeCompare(b.type);
                });
            }

            function buildLoadedDataIndex(rows) {
              const years = new Set();
              const types = new Set();
              const details = new Set();
              const monthNumbers = new Set();
              const monthNumbersByYear = new Map();
              const monthsByYear = new Map();
              rows.forEach((row) => {
                if (row.year) years.add(row.year);
                if (row.type) types.add(row.type);
                if (row.detail) details.add(row.detail);
                const monthNumber = getMonthNumber(row.month);
                if (!monthNumber) return;
                monthNumbers.add(monthNumber);
                if (row.year) {
                  if (!monthNumbersByYear.has(row.year)) {
                    monthNumbersByYear.set(row.year, new Set());
                  }
                  monthNumbersByYear.get(row.year).add(monthNumber);
                  if (!monthsByYear.has(row.year)) {
                    monthsByYear.set(row.year, new Set());
                  }
                  monthsByYear.get(row.year).add(row.month);
                }
              });
              return {
                years: [...years].sort((a, b) => Number(b) - Number(a)),
                types: [...types].sort((a, b) => String(a).localeCompare(String(b), "ko")),
                details: [...details].sort((a, b) => String(a).localeCompare(String(b), "ko")),
                monthNumbers: [...monthNumbers].sort((a, b) => Number(a) - Number(b)),
                monthNumbersByYear,
                monthsByYear,
              };
            }

            function loadAndRenderData(rawData) {
              allData = processData(rawData);
              const loadedDataIndex = buildLoadedDataIndex(allData);
              compareOptionCacheSource = allData;
              compareOptionCache = loadedDataIndex;
              selectedTypes.clear();
              selectedMonths.clear(); // CSV 로드 시 월 선택 초기화
              selectedYears.clear(); // CSV 로드 시 연도 선택 초기화
              csvLoadedInitialYear = null; // 초기 연도도 리셋
              isYearFilterManuallySetAllOrNone = false; // CSV 로드 시에는 명시적 전체 선택/해제 상태가 아님
              isInitialMonthClick = true; // 데이터 로드 시 월 필터 클릭 상태 초기화
              displayMode = "summary";
              document
                .getElementById("year-filter-popup")
                .classList.remove("show-popup");

              // 개선 사항 1 & 3: 로우데이터 업로드 시 최신 연도와 해당 월, 모든 유형을 자동 선택합니다. (더블클릭 동작과 통일)
              const allAvailableYears = loadedDataIndex.years;
              const allAvailableTypes = loadedDataIndex.types;

              if (allAvailableYears.length > 0) {
                const latestYear = allAvailableYears[0];
                csvLoadedInitialYear = latestYear; // 나중에 초기화할 수 있도록 최신 연도 저장
                selectedYears.add(latestYear); // 최신 연도만 선택

                const monthsForLatestYear = [
                  ...(loadedDataIndex.monthsByYear.get(latestYear) || []),
                ];
                selectedMonths = new Set(monthsForLatestYear); // 해당 연도의 모든 월 선택
              }

              selectedTypes = new Set(allAvailableTypes); // 모든 작업 유형 선택
              isYearFilterManuallySetAllOrNone = false; // '전체 선택' 상태가 아니므로 false로 설정

              normalizeDashboardLayout();

              setTimeout(() => {
                initChart();
                drawChart();
                // Centralized refresh to ensure months/years/types pipeline is applied to chart and UI
                updateAllViews(false);

                const tableContainer =
                  document.getElementById("table-container");
                if (tableContainer) {
                  const computedMaxHeight =
                    getComputedStyle(tableContainer).maxHeight;
                  if (computedMaxHeight && computedMaxHeight !== "none") {
                    initialTableContainerMaxHeight = computedMaxHeight;
                  } else {
                    initialTableContainerMaxHeight = "calc(100vh - 195px)";
                  }
                }
              }, 50);
            }

            loadAndRenderData(rawData);
          } catch (error) {
            console.error("파일 처리 중 오류가 발생했습니다:", error);
          }
        };
        reader.readAsText(file);
        e.target.value = null;
      });
