      function renderCompareSplitRows(rows, maxDelta) {
        return rows
          .map((row) => {
            const width = Math.max(4, (Math.abs(row.delta) / maxDelta) * 100);
            const deltaClass = getCompareDeltaClass(row.delta);
            return `
              <div class="compare-split-row">
                <div class="compare-row-top">
                  <span>${escapeCompareHtml(row.label)}</span>
                  <span class="compare-row-value ${deltaClass}">${formatCompareVal(row.delta)}</span>
                </div>
                <div class="compare-progress">
                  <span style="--bar-width:${width}%; --bar-color:${row.delta < 0 ? "#27ae60" : "#eb5757"};"></span>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function getCompareToneClass(delta) {
        if (delta < 0) return "is-better";
        if (delta > 0) return "is-worse";
        return "is-flat";
      }

      function getComparePerformanceText(delta) {
        if (delta < 0) return "절감을 더 잘했습니다";
        if (delta > 0) return "절감을 덜 했습니다";
        return "전년과 같은 절감 수준입니다";
      }

      function getCompareCategoryStatus(row, hasCompare) {
        if (!hasCompare) return "기준 구조";
        if (row.baseCount === 0 && Math.abs(row.base) < 1) return "금년도 해당 없음";
        if (row.delta < 0) return "절감 확대";
        if (row.delta > 0) return "절감 축소";
        return "변화 없음";
      }

      function getCompareCategoryDriverTags(row, hasCompare) {
        if (!hasCompare) {
          return [
            `구성 ${formatComparePercent(row.baseShare)}`,
            `${row.baseCount}건`,
            `평균 ${formatComparePlain(row.baseAvg)}`,
          ];
        }
        if (row.baseCount === 0 && Math.abs(row.base) < 1) {
          return [
            "금년도 0건",
            `전년 ${row.compareCount}건`,
            "금년도 절감 0",
          ];
        }
        const avgTag =
          row.avgDelta < 0
            ? `평균 개선 ${formatComparePlain(Math.abs(row.avgDelta))}`
            : row.avgDelta > 0
              ? `평균 약화 ${formatComparePlain(Math.abs(row.avgDelta))}`
              : "평균 동일";
        return [
          `건수 ${formatCompareSignedCount(row.countDelta)}`,
          avgTag,
          `구성 ${formatCompareSignedPercentPoint(row.shareDelta)}`,
        ];
      }

      function getCompareCategoryInsight(row, vm) {
        if (!vm.compareYear) {
          return `${vm.baseYear}년 기준 ${row.label}은 전체 절감 구조의 ${formatComparePercent(row.baseShare)}를 차지합니다. ${row.caption}의 건수와 평균 절감액을 함께 봐야 다음 비교 기준을 만들 수 있습니다.`;
        }
        if (row.baseCount === 0 && Math.abs(row.base) < 1) {
          return `선택한 ${vm.baseYear}년 기간에는 ${row.label} 절감 항목이 없습니다. 표시된 전년 차이는 ${vm.compareYear}년 동일 기간에 있었던 ${row.compareCount}건, ${formatComparePlain(Math.abs(row.compare))} 절감이 금년도에는 발생하지 않았다는 뜻입니다.`;
        }
        const countPhrase =
          row.countDelta > 0
            ? `대상 건수는 ${row.countDelta}건 늘어 절감 기회가 커졌습니다.`
            : row.countDelta < 0
              ? `대상 건수는 ${Math.abs(row.countDelta)}건 줄어 절감 기회가 작아졌습니다.`
              : "대상 건수는 전년과 같습니다.";
        const avgPhrase =
          row.avgDelta < 0
            ? `건당 절감은 ${formatComparePlain(Math.abs(row.avgDelta))} 개선되어 단위 효율이 좋아졌습니다.`
            : row.avgDelta > 0
              ? `건당 절감은 ${formatComparePlain(Math.abs(row.avgDelta))} 약해져 단위 효율 점검이 필요합니다.`
              : "건당 절감은 전년과 같습니다.";
        const sharePhrase =
          row.shareDelta > 0
            ? `전체 절감 구성에서 비중은 ${formatCompareSignedPercentPoint(row.shareDelta)} 커졌습니다.`
            : row.shareDelta < 0
              ? `전체 절감 구성에서 비중은 ${formatCompareSignedPercentPoint(row.shareDelta)} 낮아졌습니다.`
              : "전체 절감 구성비는 전년과 같습니다.";
        return `${countPhrase} ${avgPhrase} ${sharePhrase}`;
      }

      function renderCompareCharacterBlock(row, vm) {
        const hasCompare = Boolean(vm.compareYear);
        const toneClass = getCompareToneClass(row.delta);
        const baseShareWidth = Math.max(row.baseShare > 0 ? 2 : 0, row.baseShare * 100);
        const compareShareWidth = Math.max(row.compareShare > 0 ? 2 : 0, row.compareShare * 100);
        const tags = getCompareCategoryDriverTags(row, hasCompare);
        const hasNoBaseRows = hasCompare && row.baseCount === 0 && Math.abs(row.base) < 1;
        return `
          <div class="compare-character-block ${toneClass}">
            <div class="compare-character-head">
              <div>
                <strong>${escapeCompareHtml(row.label)}</strong>
                <div class="compare-card-label">${escapeCompareHtml(row.caption)}</div>
              </div>
              <span class="compare-character-status">${getCompareCategoryStatus(row, hasCompare)}</span>
            </div>
            <div class="compare-character-metrics">
              <div class="compare-character-metric compare-base-year">
                <span>${escapeCompareHtml(vm.baseYear)}년 절감</span>
                <strong>${formatCompareVal(row.base)}</strong>
              </div>
              <div class="compare-character-metric compare-compare-year">
                <span>${hasCompare ? `${escapeCompareHtml(vm.compareYear)}년 절감` : "비교 절감"}</span>
                <strong>${hasCompare ? formatCompareVal(row.compare) : "-"}</strong>
              </div>
              <div class="compare-character-metric">
                <span>전년 차이</span>
                <strong>${hasCompare ? formatCompareVal(row.delta) : "-"}</strong>
              </div>
              <div class="compare-character-metric">
                <span>${hasNoBaseRows ? `${escapeCompareHtml(vm.baseYear)}년 항목` : "건당 차이"}</span>
                <strong>${hasNoBaseRows ? "0건" : hasCompare ? formatCompareVal(row.avgDelta) : formatCompareVal(row.baseAvg)}</strong>
              </div>
            </div>
            <div class="compare-share-rows">
              <div class="compare-share-row">
                <span>${escapeCompareHtml(vm.baseYear)} 구성</span>
                <div class="compare-share-track"><span style="--share-width:${baseShareWidth}%; --share-color:${row.color};"></span></div>
                <span>${formatComparePercent(row.baseShare)}</span>
              </div>
              <div class="compare-share-row">
                <span>${hasCompare ? `${escapeCompareHtml(vm.compareYear)} 구성` : "비교 구성"}</span>
                <div class="compare-share-track"><span style="--share-width:${compareShareWidth}%; --share-color:#9fb3c8;"></span></div>
                <span>${hasCompare ? formatComparePercent(row.compareShare) : "-"}</span>
              </div>
            </div>
            <div class="compare-character-reason">
              <strong>왜?</strong>
              <span>${escapeCompareHtml(getCompareCategoryInsight(row, vm))}</span>
            </div>
            <div class="compare-character-note">
              ${tags.map((tag) => `<span>${escapeCompareHtml(tag)}</span>`).join("")}
            </div>
          </div>
        `;
      }

      function renderCompareCharacterAnalysis(vm) {
        const hasCompare = Boolean(vm.compareYear);
        const dominant = [...vm.categoryRows].sort(
          (a, b) => Math.abs(b.delta) - Math.abs(a.delta),
        )[0];
        const shareDriver =
          [...vm.categoryRows]
            .filter((row) => row.shareDelta > 0)
            .sort((a, b) => b.shareDelta - a.shareDelta)[0] ||
          [...vm.categoryRows].sort(
            (a, b) => Math.abs(b.shareDelta) - Math.abs(a.shareDelta),
          )[0];
        const verdictClass = getCompareToneClass(vm.totalDelta);
        const verdictTitle = hasCompare
          ? `<span class="compare-character-verdict-year-base">${escapeCompareHtml(vm.baseYear)}년</span>은 <span class="compare-character-verdict-year-compare">${escapeCompareHtml(vm.compareYear)}년</span>보다 ${escapeCompareHtml(getComparePerformanceText(vm.totalDelta))}`
          : `<span class="compare-character-verdict-year-base">${escapeCompareHtml(vm.baseYear)}년</span> 성격별 절감 구조`;
        const dominantText =
          hasCompare && dominant
            ? `${dominant.label}에서 ${formatComparePlain(Math.abs(dominant.delta))} 차이가 발생해 전체 변화의 핵심 축입니다.`
            : "비교 연도를 추가하면 공사성·영선 전환 중 어떤 축이 성과를 만든 것인지 분리해 볼 수 있습니다.";
        const shareText =
          hasCompare && shareDriver && Math.abs(shareDriver.shareDelta) >= 0.005
            ? shareDriver.shareDelta > 0
              ? `절감 구성은 ${shareDriver.label} 쪽으로 ${formatCompareSignedPercentPoint(shareDriver.shareDelta)} 이동했습니다.`
              : `${shareDriver.label} 비중은 ${formatCompareSignedPercentPoint(shareDriver.shareDelta)} 낮아졌습니다.`
            : hasCompare
              ? "절감 구성비의 큰 이동은 없습니다."
              : "";
        return `
          <div class="compare-character-analysis">
            <div class="compare-character-verdict ${verdictClass}">
              <div class="compare-card-label">공사성 vs. 영선 전환 판정 (${escapeCompareHtml(formatCompareBasisLabel(vm))})</div>
              <strong>${verdictTitle}</strong>
              <p>${escapeCompareHtml(dominantText)} ${escapeCompareHtml(shareText)}</p>
            </div>
            <div class="compare-character-grid">
              ${vm.categoryRows.map((row) => renderCompareCharacterBlock(row, vm)).join("")}
            </div>
          </div>
        `;
      }

      function renderCompareImpactRows(rows, maxDelta, emptyText, rowAttributeFactory, progressAttributeFactory) {
        if (!rows.length) return `<div class="compare-impact-row is-empty">${escapeCompareHtml(emptyText)}</div>`;
        return rows
          .map((row, index) => {
            const width = Math.max(4, (Math.abs(row.delta) / maxDelta) * 100);
            const label = row.detail || row.type || row.label;
            const sub = row.type && row.detail ? row.type : getCompareDeltaLabel(row.delta);
            const attrs = rowAttributeFactory ? ` ${rowAttributeFactory(row, index)}` : "";
            const progressAttrs = progressAttributeFactory ? ` ${progressAttributeFactory(row, index)}` : "";
            return `
              <div class="compare-impact-row"${attrs}>
                <div class="compare-row-top">
                  <span title="${escapeCompareHtml(label)}">${escapeCompareHtml(label)}</span>
                  <span class="compare-row-value ${getCompareDeltaClass(row.delta)}">${formatCompareVal(row.delta)}</span>
                </div>
                <div class="compare-progress">
                  <span${progressAttrs} style="--bar-width:${width}%; --bar-color:${row.color || (row.delta < 0 ? "#27ae60" : "#eb5757")};"></span>
                </div>
                <div class="compare-card-label">${escapeCompareHtml(sub)}</div>
              </div>
            `;
          })
          .join("");
      }

      function getCompareTopDiffSummary(rows) {
        return {
          count: rows.length,
          totalDelta: d3.sum(rows, (row) => row.delta),
          betterCount: rows.filter((row) => row.delta < 0).length,
          worseCount: rows.filter((row) => row.delta > 0).length,
        };
      }

      function renderCompareTopDiffSummary(rows) {
        const summary = getCompareTopDiffSummary(rows);
        return `
          <div class="compare-top-diff-summary">
            <span>대상 항목<strong>${summary.count}개</strong></span>
            <span>절감 확대<strong>${summary.betterCount}개</strong></span>
            <span>절감 축소<strong>${summary.worseCount}개</strong></span>
            <span>순 차이<strong>${formatCompareVal(summary.totalDelta)}</strong></span>
          </div>
        `;
      }

      function getCompareTopRows(rows, limit) {
        return [...rows].sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta)).slice(0, limit);
      }

      function getCompareRowsMaxDelta(rows) {
        return Math.max(1, d3.max(rows, (row) => Math.abs(row.delta)) || 1);
      }

      function renderCompareDiffSegment(title, rows, limit, emptyText) {
        const topRows = getCompareTopRows(rows, limit);
        const totalDelta = d3.sum(rows, (row) => row.delta);
        return `
          <section class="compare-diff-segment">
            <div class="compare-diff-segment-head">
              <span class="compare-diff-segment-title">${escapeCompareHtml(title)}</span>
              <span class="compare-diff-segment-meta">Top ${Math.min(limit, topRows.length)} · ${formatComparePlain(totalDelta)}</span>
            </div>
            <div class="compare-impact-list">${renderCompareImpactRows(topRows, getCompareRowsMaxDelta(topRows), emptyText)}</div>
          </section>
        `;
      }

      function renderCompareConstructionTopDiffPanel(vm) {
        const rows = vm.detailRows.filter((row) => row.category === "construction");
        const topRows = getCompareTopRows(rows, 10);
        return `
          <article class="compare-panel compare-top-diff-panel">
            <div class="compare-panel-head">
              <h3>공사성 상위 차이 항목</h3>
              <span class="compare-panel-sub">Top ${Math.min(10, topRows.length)}</span>
            </div>
            ${renderCompareTopDiffSummary(rows)}
            <div class="compare-impact-list">${renderCompareImpactRows(topRows, getCompareRowsMaxDelta(topRows), "공사성 차이 항목이 없습니다.")}</div>
          </article>
        `;
      }

      function renderCompareMaintenanceTopDiffPanel(vm) {
        const rows = vm.detailRows.filter((row) => row.category === "maintenance");
        const segmentOrder = ["건축", "기계", "전기", "탐지/기타"];
        const segmentBlocks = segmentOrder
          .map((segment) => ({
            segment,
            rows: rows.filter((row) => row.segment === segment),
          }))
          .filter((item) => item.rows.length > 0 || item.segment !== "탐지/기타")
          .map((item) =>
            renderCompareDiffSegment(
              item.segment,
              item.rows,
              3,
              `${item.segment} 영선 전환 차이 항목이 없습니다.`,
            ),
          )
          .join("");
        return `
          <article class="compare-panel compare-top-diff-panel">
            <div class="compare-panel-head">
              <h3>영선 전환 상위 차이 항목</h3>
              <span class="compare-panel-sub">건축 · 기계 · 전기</span>
            </div>
            ${renderCompareTopDiffSummary(rows)}
            <div class="compare-maintenance-segments">${segmentBlocks}</div>
          </article>
        `;
      }

      function renderCompareTopDiffAnalysis(vm) {
        return `
          ${renderCompareConstructionTopDiffPanel(vm)}
          ${renderCompareMaintenanceTopDiffPanel(vm)}
        `;
      }

      function renderCompareMonthTiles(vm, rows = vm.monthlyRows, valueKey = "delta") {
        const maxMonthDelta = Math.max(
          1,
          d3.max(rows, (row) => Math.abs(getCompareNumber(row[valueKey]))) || 1,
        );
        return rows
          .map((row) => {
            const value = getCompareNumber(row[valueKey]);
            const hasValue = Math.abs(value) > 0;
            const alpha = Math.min(0.42, 0.08 + (Math.abs(value) / maxMonthDelta) * 0.34);
            const rgb = value < 0 ? "39, 174, 96" : value > 0 ? "235, 87, 87" : "130, 154, 177";
            return `
              <div class="compare-month-tile ${hasValue ? "" : "is-empty"}" data-compare-heatmap-tile data-month="${row.monthNumber}" data-value-key="${escapeCompareHtml(valueKey)}" data-has-value="${hasValue ? "true" : "false"}" data-base="${row.base}" data-compare="${row.compare}" data-delta="${row.delta}" style="--heat-rgb:${rgb}; --heat-alpha:${hasValue ? alpha : 0.035};">
                <strong>${row.monthNumber}월</strong>
                <span class="${getCompareDeltaClass(value)}">${hasValue ? formatComparePlain(value) : ""}</span>
              </div>
            `;
          })
          .join("");
      }

      function renderCompareMonthHeatmapLane(label, caption, rows, vm, valueKey, className = "") {
        const monthCount = Math.max(1, Math.min(12, rows.length || 1));
        const desktopColumns = monthCount;
        const mobileColumns = Math.max(1, Math.min(4, monthCount));
        const phoneColumns = Math.max(1, Math.min(3, monthCount));
        return `
          <div class="compare-month-heatmap-lane ${className}" data-compare-heatmap-lane="${escapeCompareHtml(valueKey)}" data-compare-heatmap-lane-label="${escapeCompareHtml(label)}" data-compare-heatmap-lane-caption="${escapeCompareHtml(caption)}">
            <div class="compare-month-heatmap-lane-label">
              <strong>${escapeCompareHtml(label)}</strong>
              <span>${escapeCompareHtml(caption)}</span>
            </div>
            <div class="compare-month-tiles" style="--heatmap-columns:${desktopColumns}; --heatmap-mobile-columns:${mobileColumns}; --heatmap-phone-columns:${phoneColumns};">${renderCompareMonthTiles(vm, rows, valueKey)}</div>
          </div>
        `;
      }

      function getCompareHeatmapRows(rows, vm) {
        const selectedMonths = Array.isArray(vm.monthNumbers) ? vm.monthNumbers : [];
        const monthOrder = selectedMonths
          .map((month) => Number(getMonthNumber(month)))
          .filter((month) => Number.isFinite(month) && month >= 1 && month <= 12)
          .sort((a, b) => a - b);
        if (!monthOrder.length) return rows;
        const byMonth = new Map(rows.map((row) => [Number(row.monthNumber), row]));
        return monthOrder
          .map((monthNumber) => byMonth.get(monthNumber))
          .filter(Boolean);
      }

      function renderCompareMonthHeatmapSection(title, subtitle, rows, vm) {
        const baseLabel = `${vm.baseYear || "기준"}년`;
        const compareLabel = vm.compareYear ? `${vm.compareYear}년` : "비교 없음";
        const heatmapRows = getCompareHeatmapRows(rows, vm);
        const monthRange = formatCompareMonthRange(heatmapRows.map((row) => row.monthNumber));
        const scopedSubtitle = `${subtitle} · ${monthRange}`;
        return `
          <div class="compare-month-heatmap-section" data-compare-heatmap-section="${escapeCompareHtml(title)}">
            <div class="compare-month-heatmap-title">
              <strong>${escapeCompareHtml(title)}</strong>
              <span>${escapeCompareHtml(scopedSubtitle)}</span>
            </div>
            <div class="compare-month-heatmap-lanes">
              ${renderCompareMonthHeatmapLane(baseLabel, "기준 연도 월별 절감", heatmapRows, vm, "base", "is-base")}
              ${renderCompareMonthHeatmapLane(compareLabel, "비교 연도 월별 절감", heatmapRows, vm, "compare", "is-compare")}
              ${renderCompareMonthHeatmapLane("차이", "기준 - 비교", heatmapRows, vm, "delta", "is-delta")}
            </div>
          </div>
        `;
      }

      function renderCompareMonthHeatmaps(vm) {
        return `
          <div class="compare-month-heatmap-stack">
            ${renderCompareMonthHeatmapSection("전체", "전체 작업유형 기준", vm.monthlyRows, vm)}
            ${renderCompareMonthHeatmapSection("공사성", "관리소 제외 기준", vm.monthlyConstructionRows, vm)}
            ${renderCompareMonthHeatmapSection("영선 전환", "관리소 자체 처리 기준", vm.monthlyMaintenanceRows, vm)}
          </div>
        `;
      }

      function getCompareMonthVariationRows(rows) {
        return [...(rows || [])]
          .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta))
          .slice(0, 4)
          .map((row) => ({
            label: `${row.monthNumber}월`,
            monthNumber: row.monthNumber,
            base: row.base,
            compare: row.compare,
            delta: row.delta,
            color: row.delta < 0 ? "#27ae60" : "#eb5757",
          }));
      }

      function getCompareMonthVariationScopeRows(vm, scope) {
        if (scope === "construction") return vm.monthlyConstructionRows || [];
        if (scope === "maintenance") return vm.monthlyMaintenanceRows || [];
        return vm.monthlyRows || [];
      }

      function renderCompareMonthVariationSection(title, subtitle, rows, vm, scope) {
        const variationRows = getCompareMonthVariationRows(rows);
        const monthRange = formatCompareMonthRange(variationRows.map((row) => row.monthNumber));
        const scopedSubtitle = monthRange
          ? `${subtitle} · Top ${variationRows.length} · ${monthRange}`
          : `${subtitle} · Top ${variationRows.length}`;
        return `
          <div class="compare-month-heatmap-section" data-compare-variation-section="${escapeCompareHtml(title)}">
            <div class="compare-month-heatmap-title">
              <strong>${escapeCompareHtml(title)}</strong>
              <span>${escapeCompareHtml(scopedSubtitle)}</span>
            </div>
            <div class="compare-impact-list">${renderCompareImpactRows(
              variationRows,
              getCompareRowsMaxDelta(variationRows),
              `${title} 월별 변동이 없습니다.`,
              null,
              (_row, index) => `data-compare-month-variation-scope="${scope}" data-compare-month-variation-index="${index}"`,
            )}</div>
          </div>
        `;
      }

      function renderCompareMonthVariationSections(vm) {
        return `
          <div class="compare-month-heatmap-stack">
            ${renderCompareMonthVariationSection("전체", "전체 작업유형 기준", vm.monthlyRows, vm, "total")}
            ${renderCompareMonthVariationSection("공사성", "관리소 제외 기준", vm.monthlyConstructionRows, vm, "construction")}
            ${renderCompareMonthVariationSection("영선 전환", "관리소 자체 처리 기준", vm.monthlyMaintenanceRows, vm, "maintenance")}
          </div>
        `;
      }

      function renderCompareTotalPart(vm) {
        const impactClass = vm.totalDelta > 0 ? "is-worse" : "is-better";
        return `
          <section class="compare-part" data-part="total">
            <div class="compare-hero-grid">
              <article class="compare-impact-card ${impactClass}">
                <div>
                  <div class="compare-card-label">핵심 차이</div>
                  <div class="compare-impact-value">${formatCompareVal(vm.totalDelta)}</div>
                  <div class="compare-impact-caption">${vm.compareYear ? `${escapeCompareHtml(vm.baseYear)}년 - ${escapeCompareHtml(vm.compareYear)}년 · ${getCompareDeltaLabel(vm.totalDelta)}` : "비교 연도를 추가 선택"}</div>
                </div>
                <div class="compare-delta-meter">
                  <span style="${getCompareMeterStyle(vm.totalDelta, vm.maxDelta)}"></span>
                </div>
              </article>
              <article class="compare-panel compare-bridge-chart-trigger" data-compare-bridge-popout tabindex="0" role="button" aria-label="총괄 브릿지 확대">
                <div class="compare-panel-head">
                  <h3>총괄 브릿지</h3>
                  <span class="compare-panel-sub">${escapeCompareHtml(vm.baseYear)} vs ${escapeCompareHtml(vm.compareYear || "-")}</span>
                </div>
                <svg id="compare-total-bridge-chart" class="compare-chart" viewBox="0 0 640 300" preserveAspectRatio="xMidYMid meet"></svg>
              </article>
              ${renderCompareMicroStack(vm)}
            </div>
            <div class="compare-infographic-grid">
              <article class="compare-panel compare-character-panel">
                <div class="compare-panel-head">
                  <h3>성격별 차이</h3>
                  <span class="compare-panel-sub">${getCompareDeltaLabel(vm.totalDelta)}</span>
                </div>
                ${renderCompareCharacterAnalysis(vm)}
              </article>
              ${renderCompareTopDiffAnalysis(vm)}
            </div>
          </section>
        `;
      }

      function renderCompareMonthlyPart(vm) {
        return `
          <section class="compare-part" data-part="monthly">
            <div class="compare-infographic-grid">
              <div class="compare-monthly-chart-grid">
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="total" tabindex="0" role="button" aria-label="월별 절감 흐름 전체 확대">
                  <div class="compare-panel-head">
                    <h3>월별 절감 흐름 · 전체</h3>
                    <span class="compare-panel-sub">${escapeCompareHtml(vm.baseYear)} / ${escapeCompareHtml(vm.compareYear || "-")}</span>
                  </div>
                  <svg id="compare-monthly-chart" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="construction" tabindex="0" role="button" aria-label="월별 절감 흐름 공사성 확대">
                  <div class="compare-panel-head">
                    <h3>월별 절감 흐름 · 공사성</h3>
                    <span class="compare-panel-sub">관리소 제외</span>
                  </div>
                  <svg id="compare-monthly-chart-construction" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="maintenance" tabindex="0" role="button" aria-label="월별 절감 흐름 영선 전환 확대">
                  <div class="compare-panel-head">
                    <h3>월별 절감 흐름 · 영선 전환</h3>
                    <span class="compare-panel-sub">관리소(...) 기준</span>
                  </div>
                  <svg id="compare-monthly-chart-maintenance" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
              </div>
              <article class="compare-panel">
                <div class="compare-panel-head">
                  <h3>월별 차이 히트맵</h3>
                  <span class="compare-panel-sub">1-12월</span>
                </div>
                ${renderCompareMonthHeatmaps(vm)}
              </article>
              <article class="compare-panel">
                <div class="compare-panel-head">
                  <h3>변동 큰 월</h3>
                  <span class="compare-panel-sub">Top 4</span>
                </div>
                ${renderCompareMonthVariationSections(vm)}
              </article>
            </div>
          </section>
        `;
      }

      function renderCompareTypePart(vm) {
        const renderImpactCard = (scope) => {
          const label = getCompareTypeScopeLabel(scope);
          const rows = getCompareTypeScopeRows(vm, scope).slice(0, 6);
          return `
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="impact-${scope}" tabindex="0" role="button" aria-label="영향도 순위 ${label} 확대">
                  <div class="compare-panel-head">
                    <h3>영향도 순위 · ${label}</h3>
                    <span class="compare-panel-sub">Top ${rows.length}</span>
                  </div>
                  <div class="compare-impact-list">${renderCompareImpactRows(
                    rows,
                    vm.maxDelta,
                    `${label} 작업 유형이 없습니다.`,
                    (_row, index) => `data-compare-impact-source="${scope}" data-compare-impact-index="${index}"`,
                  )}</div>
                </article>
          `;
        };
        const renderShareCard = (scope) => {
          const label = getCompareTypeScopeLabel(scope);
          const suffix = scope === "total" ? `${escapeCompareHtml(vm.baseYear)}년` : label;
          return `
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="share-${scope}" tabindex="0" role="button" aria-label="기준 연도 구성 ${label} 확대">
                  <div class="compare-panel-head">
                    <h3>기준 연도 구성 · ${label}</h3>
                    <span class="compare-panel-sub">${suffix}</span>
                  </div>
                  <svg id="compare-type-share-chart${scope === "total" ? "" : `-${scope}`}" class="compare-chart" viewBox="0 0 360 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
          `;
        };
        return `
          <section class="compare-part" data-part="type">
            <div class="compare-infographic-grid">
              <div class="compare-monthly-chart-grid">
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="type-total" tabindex="0" role="button" aria-label="작업 유형별 거리 전체 확대">
                  <div class="compare-panel-head">
                    <h3>작업 유형별 거리 · 전체</h3>
                    <span class="compare-panel-sub">${escapeCompareHtml(vm.baseYear)} / ${escapeCompareHtml(vm.compareYear || "-")}</span>
                  </div>
                  <svg id="compare-type-chart" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="type-construction" tabindex="0" role="button" aria-label="작업 유형별 거리 공사성 확대">
                  <div class="compare-panel-head">
                    <h3>작업 유형별 거리 · 공사성</h3>
                    <span class="compare-panel-sub">관리소 제외</span>
                  </div>
                  <svg id="compare-type-chart-construction" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
                <article class="compare-panel compare-monthly-chart-trigger" data-compare-monthly-popout="type-maintenance" tabindex="0" role="button" aria-label="작업 유형별 거리 영선 전환 확대">
                  <div class="compare-panel-head">
                    <h3>작업 유형별 거리 · 영선 전환</h3>
                    <span class="compare-panel-sub">관리소(...) 기준</span>
                  </div>
                  <svg id="compare-type-chart-maintenance" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                </article>
              </div>
              <div class="compare-monthly-chart-grid">
                ${renderImpactCard("total")}
                ${renderImpactCard("construction")}
                ${renderImpactCard("maintenance")}
              </div>
              <div class="compare-monthly-chart-grid">
                ${renderShareCard("total")}
                ${renderShareCard("construction")}
                ${renderShareCard("maintenance")}
              </div>
            </div>
          </section>
        `;
      }

      function renderComparePartContent(part, vm) {
        if (part === "monthly") return renderCompareMonthlyPart(vm);
        if (part === "type") return renderCompareTypePart(vm);
        return renderCompareTotalPart(vm);
      }

      function drawCompareActiveCharts(vm) {
        if (!vm) return;
        if (compareActivePart === "monthly") {
          renderCompareMonthlyChart(vm);
          renderCompareMonthlyChart(vm, "#compare-monthly-chart-construction", vm.monthlyConstructionRows);
          renderCompareMonthlyChart(vm, "#compare-monthly-chart-maintenance", vm.monthlyMaintenanceRows);
          bindCompareMonthVariationTooltips(document.getElementById("compare-body"), vm);
          return;
        }
        if (compareActivePart === "type") {
          renderCompareTypeChart(vm);
          renderCompareTypeChart(vm, "#compare-type-chart-construction", vm.typeConstructionRows, "작업 유형별 거리 · 공사성");
          renderCompareTypeChart(vm, "#compare-type-chart-maintenance", vm.typeMaintenanceRows, "작업 유형별 거리 · 영선 전환");
          renderCompareTypeShareChart(vm);
          renderCompareTypeShareChart(vm, "#compare-type-share-chart-construction", vm.typeConstructionRows, "기준 연도 구성 · 공사성");
          renderCompareTypeShareChart(vm, "#compare-type-share-chart-maintenance", vm.typeMaintenanceRows, "기준 연도 구성 · 영선 전환");
          bindCompareTypeSupportTooltips(document.getElementById("compare-body"), vm);
          return;
        }
        renderCompareBridgeChart(vm);
      }

      function renderCompareActiveCharts(vm) {
        requestAnimationFrame(() => drawCompareActiveCharts(vm));
      }

      function clampCompareChartValue(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getCompareBarLabelY(value, y, innerHeight) {
        const labelY = y(value) - 10;
        return clampCompareChartValue(labelY, 16, innerHeight - 14);
      }

      function renderCompareBridgeChart(vm, selector = "#compare-total-bridge-chart") {
        const chart = d3.select(selector);
        if (chart.empty()) return;
        chart.selectAll("*").remove();

        const data = [
          { label: `${vm.compareYear || "비교"}년`, role: "compare", value: vm.compare.saving, color: "#f2994a" },
          { label: `${vm.baseYear}년`, role: "base", value: vm.base.saving, color: "#2f80ed" },
          { label: "차이", role: "delta", value: vm.totalDelta, color: vm.totalDelta < 0 ? "#27ae60" : "#eb5757" },
        ];
        const width = 640;
        const height = 300;
        const margin = { top: 40, right: 34, bottom: 68, left: 90 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const maxAbs = Math.max(1, d3.max(data, (d) => Math.abs(d.value)) || 1);
        const x = d3.scaleBand().domain(data.map((d) => d.label)).range([0, innerWidth]).padding(0.46);
        const y = d3.scaleLinear().domain([-maxAbs, maxAbs]).nice().range([innerHeight, 0]);
        const svgChart = chart.attr("viewBox", `0 0 ${width} ${height}`);
        const g = svgChart.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        g.append("line")
          .attr("x1", 0)
          .attr("x2", innerWidth)
          .attr("y1", y(0))
          .attr("y2", y(0))
          .attr("stroke", "#9fb3c8")
          .attr("stroke-width", 1.5);
        g.append("g")
          .attr("transform", `translate(0,${innerHeight})`)
          .call(d3.axisBottom(x).tickSize(0).tickPadding(18))
          .call((axis) => {
            axis.select(".domain").remove();
            axis.selectAll("text").attr("font-size", 12).attr("font-weight", 800);
          });
        g.append("g")
          .call(d3.axisLeft(y).ticks(5).tickFormat(formatComparePlain))
          .call((axis) => {
            axis.select(".domain").remove();
            axis.selectAll("text").attr("font-size", 11);
          });

        const chartNode = chart.node();
        const chartTitle =
          chartNode?.closest("article")?.querySelector("h3")?.textContent?.trim() ||
          document.querySelector("[data-compare-popout-title]")?.textContent?.trim() ||
          "총괄 브릿지";
        const bindBridgeTooltip = (selection) => {
          selection
            .style("cursor", "help")
            .on("mouseenter", function (event, d) {
              showCompareBridgeTooltip(event, d, vm, chartTitle);
            })
            .on("mousemove", function (event, d) {
              showCompareBridgeTooltip(event, d, vm, chartTitle);
            })
            .on("mouseleave", hideCompareMonthlyTooltip);
        };

        const bridgeBars = g.selectAll("rect.compare-bridge-bar")
          .data(data)
          .enter()
          .append("rect")
          .attr("class", "compare-bridge-bar")
          .attr("x", (d) => x(d.label))
          .attr("y", (d) => Math.min(y(0), y(d.value)))
          .attr("width", x.bandwidth())
          .attr("height", (d) => Math.max(3, Math.abs(y(d.value) - y(0))))
          .attr("rx", 7)
          .attr("fill", (d) => d.color);
        bindBridgeTooltip(bridgeBars);

        const bridgeLabels = g.selectAll("text.compare-bridge-label")
          .data(data)
          .enter()
          .append("text")
          .attr("x", (d) => x(d.label) + x.bandwidth() / 2)
          .attr("y", (d) => getCompareBarLabelY(d.value, y, innerHeight))
          .attr("text-anchor", "middle")
          .attr("font-size", 12)
          .attr("font-weight", 800)
          .style("fill", "#102a43")
          .text((d) => formatComparePlain(d.value));
        bindBridgeTooltip(bridgeLabels);
      }

      function ensureCompareMonthlyTooltip() {
        let tooltip = document.getElementById("compare-monthly-tooltip");
        if (tooltip) return tooltip;
        tooltip = document.createElement("div");
        tooltip.id = "compare-monthly-tooltip";
        tooltip.className = "compare-monthly-tooltip";
        document.body.appendChild(tooltip);
        return tooltip;
      }

      function positionCompareMonthlyTooltip(event, tooltip) {
        const gap = 14;
        const rect = tooltip.getBoundingClientRect();
        let left = event.clientX + gap;
        let top = event.clientY + gap;
        if (left + rect.width > window.innerWidth - 8) left = event.clientX - rect.width - gap;
        if (top + rect.height > window.innerHeight - 8) top = event.clientY - rect.height - gap;
        tooltip.style.left = `${Math.max(8, left)}px`;
        tooltip.style.top = `${Math.max(8, top)}px`;
      }

      function getCompareMonthlyTooltipInsight(row, vm) {
        const monthLabel = `${row.monthNumber}월`;
        if (!vm.compareYear) {
          return `${monthLabel}은 ${vm.baseYear}년 단년 기준 ${formatComparePlain(row.base)} 절감 흐름입니다. 전년을 추가하면 이 월의 개선폭을 분리해 볼 수 있습니다.`;
        }
        if (row.base === 0 && row.compare < 0) {
          return `${monthLabel}은 전년에는 ${formatComparePlain(Math.abs(row.compare))} 절감이 있었지만 금년도에는 해당 절감이 발생하지 않은 공백 월입니다.`;
        }
        if (row.base < 0 && row.compare === 0) {
          return `${monthLabel}은 전년 대비 신규 절감이 발생한 월입니다. 금년도 절감선이 비교년도보다 아래에 있어 절감 확대 신호입니다.`;
        }
        if (row.delta < 0) {
          return `${monthLabel}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 더 절감했습니다. 막대가 아래로 내려갈수록 전년 대비 절감 확대입니다.`;
        }
        if (row.delta > 0) {
          return `${monthLabel}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 덜 절감했습니다. 막대가 위로 올라가면 전년 대비 절감 축소입니다.`;
        }
        return `${monthLabel}은 두 연도의 절감 수준이 같습니다. 선의 위치가 비슷하고 차이 막대가 0선에 머뭅니다.`;
      }

      function getCompareMonthlyTooltipHtml(row, vm, chartTitle) {
        const compareLabel = vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음";
        const deltaLabel = vm.compareYear ? formatCompareVal(row.delta) : "-";
        return `
          <strong>${escapeCompareHtml(chartTitle)} · ${row.monthNumber}월</strong>
          <div class="tooltip-grid">
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base)}</b></span>
            <span>${compareLabel}<b>${vm.compareYear ? formatCompareVal(row.compare) : "-"}</b></span>
            <span>전년 차이<b>${deltaLabel}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareMonthlyTooltipInsight(row, vm))}</p>
          <p class="tooltip-note">파란선은 금년도, 주황 점선은 비교년도, 막대는 금년도-비교년도 차이입니다.</p>
        `;
      }

      function getCompareBridgeTooltipInsight(row, vm) {
        if (row.role === "base") {
          return `${vm.baseYear}년 선택 조건의 총 절감액입니다. 총괄 판단의 기준값으로 사용됩니다.`;
        }
        if (row.role === "compare") {
          return vm.compareYear
            ? `${vm.compareYear}년 동일 선택 조건의 총 절감액입니다. 기준 연도와 직접 비교되는 값입니다.`
            : "비교 연도가 선택되지 않아 비교 기준값이 없습니다.";
        }
        if (!vm.compareYear) {
          return "비교 연도를 추가하면 총 절감 차이가 개선인지 축소인지 브릿지로 분리됩니다.";
        }
        if (row.value < 0) {
          return `${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.value))} 더 절감된 상태입니다. 음수 차이는 절감 개선을 의미합니다.`;
        }
        if (row.value > 0) {
          return `${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.value))} 절감이 축소된 상태입니다. 양수 차이는 절감 축소를 의미합니다.`;
        }
        return "두 비교 기준의 총 절감액 차이가 없습니다.";
      }

      function getCompareBridgeTooltipHtml(row, vm, chartTitle) {
        return `
          <strong>${escapeCompareHtml(chartTitle)} · ${escapeCompareHtml(row.label)}</strong>
          <div class="tooltip-grid">
            <span>분석값<b>${formatCompareVal(row.value)}</b></span>
            <span>기준연도<b>${escapeCompareHtml(vm.baseYear)}년</b></span>
            <span>비교연도<b>${vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "-"}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareBridgeTooltipInsight(row, vm))}</p>
          <p class="tooltip-note">막대는 기준/비교 연도 총액과 두 값의 차이를 같은 축에서 보여줍니다.</p>
        `;
      }

      function showCompareBridgeTooltip(event, row, vm, chartTitle) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareBridgeTooltipHtml(row, vm, chartTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function showCompareMonthlyTooltip(event, row, vm, chartTitle) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareMonthlyTooltipHtml(row, vm, chartTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function getCompareMonthVariationInsight(row, vm) {
        const monthLabel = `${row.monthNumber}월`;
        if (!vm.compareYear) {
          if (row.base < 0) return `${monthLabel}은 ${vm.baseYear}년 단년 기준 절감 규모가 큰 월입니다. 단년 분석에서는 금액 크기와 반복 여부를 함께 확인하는 것이 좋습니다.`;
          if (row.base > 0) return `${monthLabel}은 ${vm.baseYear}년 단년 기준 비용 증가 방향의 값이 커진 월입니다. 절감 항목의 성격과 입력 기준을 우선 확인해야 합니다.`;
          return `${monthLabel}은 표시할 절감 변동이 거의 없는 월입니다.`;
        }
        if (row.delta < 0) {
          return `${monthLabel}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 더 절감된 핵심 개선 월입니다. 이 월의 실행 항목이 전체 월별 성과를 끌어올렸는지 확인해야 합니다.`;
        }
        if (row.delta > 0) {
          return `${monthLabel}은 ${vm.baseYear}년 절감이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 축소된 경계 월입니다. 전년 대비 누락된 절감 항목이나 집행비 증가 요인을 우선 점검해야 합니다.`;
        }
        return `${monthLabel}은 기준 연도와 비교 연도의 절감 수준이 같습니다. 큰 변동을 만든 월은 아닙니다.`;
      }

      function getCompareMonthVariationTooltipHtml(row, vm) {
        const compareLabel = vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음";
        const deltaLabel = vm.compareYear ? formatCompareVal(row.delta) : "-";
        const scopeLabel = row.variationScopeLabel ? `${row.variationScopeLabel} · ` : "";
        return `
          <strong>변동 큰 월 · ${escapeCompareHtml(scopeLabel)}${row.monthNumber}월</strong>
          <div class="tooltip-grid">
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base)}</b></span>
            <span>${compareLabel}<b>${vm.compareYear ? formatCompareVal(row.compare) : "-"}</b></span>
            <span>월별 차이<b>${deltaLabel}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareMonthVariationInsight(row, vm))}</p>
          <p class="tooltip-note">막대는 월별 기준-비교 차이의 절대 규모입니다. 채워진 막대 위에 커서가 있을 때만 표시됩니다.</p>
        `;
      }

      function showCompareMonthVariationTooltip(event, row, vm) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareMonthVariationTooltipHtml(row, vm);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function getCompareTypeTooltipInsight(row, vm) {
        const label = row.type || "작업 유형";
        if (!vm.compareYear) {
          return `${label}은 ${vm.baseYear}년 단년 기준 ${formatComparePlain(row.base.saving)} 절감 흐름입니다. 비교 연도를 추가하면 유형별 거리와 개선 방향을 함께 볼 수 있습니다.`;
        }
        if (row.delta < 0) {
          return `${label}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 더 절감했습니다. 두 점 사이 거리가 길수록 유형별 절감 확대 영향이 큽니다.`;
        }
        if (row.delta > 0) {
          return `${label}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 덜 절감했습니다. 두 점 사이 거리가 길수록 유형별 절감 축소 영향이 큽니다.`;
        }
        return `${label}은 두 연도의 절감 수준이 같습니다. 파란점과 주황점이 같은 위치에 가까울수록 변화가 작습니다.`;
      }

      function getCompareTypeTooltipHtml(row, vm, chartTitle) {
        const compareLabel = vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음";
        const deltaLabel = vm.compareYear ? formatCompareVal(row.delta) : "-";
        return `
          <strong>${escapeCompareHtml(chartTitle || "작업 유형별 거리")} · ${escapeCompareHtml(row.type || "미분류")}</strong>
          <div class="tooltip-grid">
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base.saving)}</b></span>
            <span>${compareLabel}<b>${vm.compareYear ? formatCompareVal(row.compare.saving) : "-"}</b></span>
            <span>전년 차이<b>${deltaLabel}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareTypeTooltipInsight(row, vm))}</p>
          <p class="tooltip-note">파란점은 금년도, 주황점은 비교년도, 연결선은 작업 유형별 절감 거리입니다.</p>
        `;
      }

      function showCompareTypeTooltip(event, row, vm, chartTitle) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareTypeTooltipHtml(row, vm, chartTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function getCompareImpactTooltipInsight(row, vm) {
        const label = row.type || row.detail || "항목";
        if (!vm.compareYear) {
          return `${label}은 ${vm.baseYear}년 단년 기준 ${formatComparePlain(row.base.saving)} 절감 영향도를 가진 항목입니다.`;
        }
        if (row.delta < 0) {
          return `${label}은 전년 대비 ${formatComparePlain(Math.abs(row.delta))} 절감 확대에 기여했습니다. 순위가 높을수록 전체 변화에 미친 영향이 큽니다.`;
        }
        if (row.delta > 0) {
          return `${label}은 전년 대비 ${formatComparePlain(Math.abs(row.delta))} 절감 축소 요인입니다. 우선 점검해야 할 영향 항목입니다.`;
        }
        return `${label}은 기준 연도와 비교 연도의 영향도 차이가 없습니다.`;
      }

      function getCompareImpactTooltipHtml(row, vm, chartTitle) {
        const compareLabel = vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음";
        return `
          <strong>${escapeCompareHtml(chartTitle || "영향도 순위")} · ${escapeCompareHtml(row.type || row.detail || "미분류")}</strong>
          <div class="tooltip-grid">
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base.saving)}</b></span>
            <span>${compareLabel}<b>${vm.compareYear ? formatCompareVal(row.compare.saving) : "-"}</b></span>
            <span>영향도<b>${formatCompareVal(row.delta)}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareImpactTooltipInsight(row, vm))}</p>
          <p class="tooltip-note">막대 길이는 기준-비교 차이의 절대 규모이며, 색상은 절감 확대/축소 방향을 나타냅니다.</p>
        `;
      }

      function showCompareImpactTooltip(event, row, vm, chartTitle) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareImpactTooltipHtml(row, vm, chartTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function getCompareShareTooltipInsight(row, vm) {
        const label = row.type || "작업 유형";
        const share = formatComparePercent(row.baseShareInScope || 0);
        if (!vm.compareYear) {
          return `${label}은 ${vm.baseYear}년 기준 구성비 ${share}를 차지합니다.`;
        }
        if (row.delta < 0) {
          return `${label}은 구성비 ${share} 안에서 전년 대비 절감 확대가 발생한 유형입니다.`;
        }
        if (row.delta > 0) {
          return `${label}은 구성비 ${share} 안에서 전년 대비 절감 축소가 발생한 유형입니다.`;
        }
        return `${label}은 구성비 ${share}이며 기준 연도와 비교 연도의 차이가 없습니다.`;
      }

      function getCompareShareTooltipHtml(row, vm, chartTitle) {
        const compareLabel = vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음";
        return `
          <strong>${escapeCompareHtml(chartTitle || "기준 연도 구성")} · ${escapeCompareHtml(row.type || "미분류")}</strong>
          <div class="tooltip-grid">
            <span>구성비<b>${formatComparePercent(row.baseShareInScope || 0)}</b></span>
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base.saving)}</b></span>
            <span>${compareLabel}<b>${vm.compareYear ? formatCompareVal(row.compare.saving) : "-"}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareShareTooltipInsight(row, vm))}</p>
          <p class="tooltip-note">도넛은 기준 연도 절감액의 절대값 기준 구성입니다.</p>
        `;
      }

      function showCompareShareTooltip(event, row, vm, chartTitle) {
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareShareTooltipHtml(row, vm, chartTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function bindCompareTypeSupportTooltips(root, vm) {
        if (!root || !vm) return;
        root.querySelectorAll("[data-compare-impact-source][data-compare-impact-index]").forEach((node) => {
          if (node.dataset.compareSupportTooltipBound === "1") return;
          node.dataset.compareSupportTooltipBound = "1";
          const show = (event) => {
            const scope = node.getAttribute("data-compare-impact-source") || "total";
            const index = Number(node.getAttribute("data-compare-impact-index")) || 0;
            const row = getCompareTypeScopeRows(vm, scope)[index];
            if (!row) return;
            showCompareImpactTooltip(event, row, vm, `영향도 순위 · ${getCompareTypeScopeLabel(scope)}`);
          };
          node.addEventListener("mouseenter", show);
          node.addEventListener("mousemove", show);
          node.addEventListener("mouseleave", hideCompareMonthlyTooltip);
        });
      }

      function bindCompareMonthVariationTooltips(root, vm) {
        if (!root || !vm) return;
        root.querySelectorAll("[data-compare-month-variation-index]").forEach((node) => {
          if (node.dataset.compareMonthVariationTooltipBound === "1") return;
          node.dataset.compareMonthVariationTooltipBound = "1";
          const show = (event) => {
            const scope = node.getAttribute("data-compare-month-variation-scope") || "total";
            const index = Number(node.getAttribute("data-compare-month-variation-index")) || 0;
            const rows = getCompareMonthVariationRows(getCompareMonthVariationScopeRows(vm, scope));
            const row = rows[index];
            if (!row) return;
            showCompareMonthVariationTooltip(
              event,
              {
                ...row,
                variationScopeLabel: getCompareTypeScopeLabel(scope),
              },
              vm,
            );
          };
          node.classList.add("compare-tooltip-target");
          node.addEventListener("mouseenter", show);
          node.addEventListener("mousemove", show);
          node.addEventListener("mouseleave", hideCompareMonthlyTooltip);
        });
      }

      function isPointerInCompareHeatmapTileCenter(event, tile) {
        const rect = tile.getBoundingClientRect();
        if (!rect.width || !rect.height) return false;
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const maxX = rect.width * 0.25;
        const maxY = rect.height * 0.25;
        return Math.abs(event.clientX - centerX) <= maxX && Math.abs(event.clientY - centerY) <= maxY;
      }

      function getCompareHeatmapTooltipInsight(row, vm, laneKey, sectionTitle) {
        const monthLabel = `${row.monthNumber}월`;
        const section = sectionTitle || "전체";
        if (laneKey === "base") {
          if (row.base < 0) {
            return `${section} ${monthLabel}은 ${vm.baseYear}년 기준 절감이 발생한 달입니다. 색이 진할수록 해당 월의 기준 연도 절감 규모가 큽니다.`;
          }
          if (row.base > 0) {
            return `${section} ${monthLabel}은 ${vm.baseYear}년 기준 절감 축소 방향의 값입니다. 다른 월의 기준 연도 흐름과 함께 확인해야 합니다.`;
          }
          return `${section} ${monthLabel}은 ${vm.baseYear}년 기준 표시할 절감 값이 없습니다.`;
        }
        if (laneKey === "compare") {
          if (!vm.compareYear) return `${section} ${monthLabel}은 비교 연도가 없어 비교 기준 히트맵 값이 비어 있습니다.`;
          if (row.compare < 0) {
            return `${section} ${monthLabel}은 ${vm.compareYear}년 비교 기준에서 절감이 발생한 달입니다. 기준 연도 행과 같은 월 위치를 비교해 증감 방향을 읽습니다.`;
          }
          if (row.compare > 0) {
            return `${section} ${monthLabel}은 ${vm.compareYear}년 비교 기준에서 절감 축소 방향의 값입니다.`;
          }
          return `${section} ${monthLabel}은 ${vm.compareYear}년 비교 기준 표시할 절감 값이 없습니다.`;
        }
        if (!vm.compareYear) return `${section} ${monthLabel}은 비교 연도 선택 후 기준-비교 차이를 분석할 수 있습니다.`;
        if (row.delta < 0) {
          return `${section} ${monthLabel}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 더 절감된 구간입니다. 녹색이 진할수록 개선 폭이 큽니다.`;
        }
        if (row.delta > 0) {
          return `${section} ${monthLabel}은 ${vm.baseYear}년이 ${vm.compareYear}년보다 ${formatComparePlain(Math.abs(row.delta))} 절감이 축소된 구간입니다. 붉은색이 진할수록 축소 폭이 큽니다.`;
        }
        return `${section} ${monthLabel}은 기준 연도와 비교 연도의 월별 절감 차이가 없습니다.`;
      }

      function getCompareHeatmapTooltipHtml(row, vm, laneKey, laneLabel, sectionTitle) {
        const activeValue = laneKey === "base" ? row.base : laneKey === "compare" ? row.compare : row.delta;
        return `
          <strong>${escapeCompareHtml(sectionTitle || "월별 차이 히트맵")} · ${escapeCompareHtml(laneLabel || "차이")} · ${row.monthNumber}월</strong>
          <div class="tooltip-grid">
            <span>${escapeCompareHtml(vm.baseYear)}년<b>${formatCompareVal(row.base)}</b></span>
            <span>${vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년` : "비교 없음"}<b>${vm.compareYear ? formatCompareVal(row.compare) : "-"}</b></span>
            <span>차이<b>${vm.compareYear ? formatCompareVal(row.delta) : "-"}</b></span>
          </div>
          <p>${escapeCompareHtml(getCompareHeatmapTooltipInsight(row, vm, laneKey, sectionTitle))}</p>
          <p class="tooltip-note">현재 행의 강조 값은 ${formatCompareVal(activeValue)}입니다. 커서가 타일 중앙 영역에 있을 때만 표시됩니다.</p>
        `;
      }

      function showCompareHeatmapTooltip(event, tile, vm) {
        if (tile.getAttribute("data-has-value") !== "true") {
          hideCompareMonthlyTooltip();
          return;
        }
        if (!isPointerInCompareHeatmapTileCenter(event, tile)) {
          hideCompareMonthlyTooltip();
          return;
        }
        const lane = tile.closest("[data-compare-heatmap-lane]");
        const section = tile.closest("[data-compare-heatmap-section]");
        const row = {
          monthNumber: Number(tile.getAttribute("data-month")) || 0,
          base: getCompareNumber(tile.getAttribute("data-base")),
          compare: getCompareNumber(tile.getAttribute("data-compare")),
          delta: getCompareNumber(tile.getAttribute("data-delta")),
        };
        const laneKey = lane?.getAttribute("data-compare-heatmap-lane") || tile.getAttribute("data-value-key") || "delta";
        const laneLabel = lane?.getAttribute("data-compare-heatmap-lane-label") || "차이";
        const sectionTitle = section?.getAttribute("data-compare-heatmap-section") || "전체";
        const tooltip = ensureCompareMonthlyTooltip();
        tooltip.innerHTML = getCompareHeatmapTooltipHtml(row, vm, laneKey, laneLabel, sectionTitle);
        tooltip.classList.add("show");
        positionCompareMonthlyTooltip(event, tooltip);
      }

      function bindCompareHeatmapTooltips(vm) {
        const tiles = document.querySelectorAll("[data-compare-heatmap-tile]");
        tiles.forEach((tile) => {
          tile.addEventListener("mousemove", function (event) {
            showCompareHeatmapTooltip(event, tile, vm);
          });
          tile.addEventListener("mouseleave", hideCompareMonthlyTooltip);
        });
      }

      function hideCompareMonthlyTooltip() {
        const tooltip = document.getElementById("compare-monthly-tooltip");
        if (tooltip) tooltip.classList.remove("show");
      }

      function renderCompareMonthlyChart(vm, selector = "#compare-monthly-chart", sourceRows = vm.monthlyRows) {
        const chart = d3.select(selector);
        if (chart.empty()) return;
        chart.selectAll("*").remove();
        const rows = Array.isArray(sourceRows) ? sourceRows : [];
        if (!rows.length) return;
        const chartNode = chart.node();
        const chartTitle =
          chartNode?.closest("article")?.querySelector("h3")?.textContent?.trim() ||
          document.querySelector("[data-compare-popout-title]")?.textContent?.trim() ||
          "월별 절감 흐름";

        const width = 720;
        const height = 300;
        const margin = { top: 56, right: 32, bottom: 48, left: 78 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const maxAbs = Math.max(
          1,
          d3.max(rows, (d) => Math.max(Math.abs(d.base), Math.abs(d.compare), Math.abs(d.delta))) || 1,
        );
        const sidePad = 24;
        const x = d3.scaleLinear().domain([1, 12]).range([sidePad, innerWidth - sidePad]);
        const y = d3.scaleLinear().domain([-maxAbs, maxAbs]).nice().range([innerHeight, 0]);
        const svgChart = chart.attr("viewBox", `0 0 ${width} ${height}`);
        const g = svgChart.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        g.append("g")
          .attr("transform", `translate(0,${innerHeight})`)
          .call(d3.axisBottom(x).tickValues(d3.range(1, 13)).tickFormat((d) => `${d}월`).tickSize(0).tickPadding(12))
          .call((axis) => {
            axis.select(".domain").remove();
            axis.selectAll("text").attr("font-size", 11).attr("font-weight", 700);
          });
        g.append("g")
          .call(d3.axisLeft(y).ticks(5).tickFormat(formatComparePlain))
          .call((axis) => {
            axis.select(".domain").remove();
            axis.selectAll("text").attr("font-size", 11);
          });
        g.append("line")
          .attr("x1", 0)
          .attr("x2", innerWidth)
          .attr("y1", y(0))
          .attr("y2", y(0))
          .attr("stroke", "#9fb3c8")
          .attr("stroke-width", 1.5);

        const barWidth = Math.max(10, (innerWidth - sidePad * 2) / 12 - 18);
        const bindMonthlyTooltip = (selection) => {
          selection
            .style("cursor", "help")
            .on("mouseenter", function (event, d) {
              showCompareMonthlyTooltip(event, d, vm, chartTitle);
            })
            .on("mousemove", function (event, d) {
              showCompareMonthlyTooltip(event, d, vm, chartTitle);
            })
            .on("mouseleave", hideCompareMonthlyTooltip);
        };

        const deltaBars = g.selectAll("rect.compare-month-delta")
          .data(rows)
          .enter()
          .append("rect")
          .attr("class", "compare-month-delta")
          .attr("x", (d) => x(d.monthNumber) - barWidth / 2)
          .attr("y", (d) => Math.min(y(0), y(d.delta)))
          .attr("width", barWidth)
          .attr("height", (d) => Math.max(2, Math.abs(y(d.delta) - y(0))))
          .attr("rx", 4)
          .attr("fill", (d) => (d.delta < 0 ? "rgba(39, 174, 96, 0.34)" : "rgba(235, 87, 87, 0.3)"));
        bindMonthlyTooltip(deltaBars);

        const line = d3
          .line()
          .x((d) => x(d.monthNumber))
          .y((d) => y(d.base))
          .curve(d3.curveMonotoneX);
        const compareLine = d3
          .line()
          .x((d) => x(d.monthNumber))
          .y((d) => y(d.compare))
          .curve(d3.curveMonotoneX);

        g.append("path")
          .datum(rows)
          .attr("fill", "none")
          .attr("stroke", "#2f80ed")
          .attr("stroke-width", 3)
          .attr("d", line);
        if (vm.compareYear) {
          g.append("path")
            .datum(rows)
            .attr("fill", "none")
            .attr("stroke", "#f2994a")
            .attr("stroke-width", 3)
            .attr("stroke-dasharray", "5 5")
            .attr("d", compareLine);
        }

        const basePoints = g.selectAll("circle.compare-month-base-point")
          .data(rows)
          .enter()
          .append("circle")
          .attr("class", "compare-month-base-point")
          .attr("cx", (d) => x(d.monthNumber))
          .attr("cy", (d) => y(d.base))
          .attr("r", 4.8)
          .attr("fill", "#ffffff")
          .attr("stroke", "#2f80ed")
          .attr("stroke-width", 2.4);
        bindMonthlyTooltip(basePoints);

        if (vm.compareYear) {
          const comparePoints = g.selectAll("circle.compare-month-compare-point")
            .data(rows)
            .enter()
            .append("circle")
            .attr("class", "compare-month-compare-point")
            .attr("cx", (d) => x(d.monthNumber))
            .attr("cy", (d) => y(d.compare))
            .attr("r", 4.8)
            .attr("fill", "#ffffff")
            .attr("stroke", "#f2994a")
            .attr("stroke-width", 2.4);
          bindMonthlyTooltip(comparePoints);
        }

        const legend = svgChart.append("g").attr("transform", `translate(${margin.left}, 20)`);
        legend.append("circle").attr("cx", 0).attr("cy", 0).attr("r", 5).attr("fill", "#2f80ed");
        legend.append("text").attr("x", 11).attr("y", 4).attr("font-size", 12).attr("font-weight", 800).text(`${vm.baseYear}년`);
        if (vm.compareYear) {
          legend.append("circle").attr("cx", 82).attr("cy", 0).attr("r", 5).attr("fill", "#f2994a");
          legend.append("text").attr("x", 93).attr("y", 4).attr("font-size", 12).attr("font-weight", 800).text(`${vm.compareYear}년`);
        }
      }

      function renderCompareTypeChart(vm, selector = "#compare-type-chart", sourceRows = vm.typeRows, chartTitle = "작업 유형별 거리 · 전체") {
        const chart = d3.select(selector);
        if (chart.empty()) return;
        chart.selectAll("*").remove();
        const rows = (sourceRows || []).slice(0, 8);
        if (!rows.length) return;

        const width = 720;
        const height = Math.max(300, rows.length * 38 + 96);
        const margin = { top: 58, right: 72, bottom: 54, left: 178 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const maxAbs = Math.max(
          1,
          d3.max(rows, (d) => Math.max(Math.abs(d.base.saving), Math.abs(d.compare.saving), Math.abs(d.delta))) || 1,
        );
        const x = d3.scaleLinear().domain([-maxAbs, maxAbs]).nice().range([0, innerWidth]);
        const y = d3.scaleBand().domain(rows.map((d) => d.type)).range([0, innerHeight]).padding(0.48);
        const svgChart = chart.attr("viewBox", `0 0 ${width} ${height}`);
        const legend = svgChart.append("g").attr("transform", `translate(${margin.left}, 22)`);
        legend.append("circle").attr("cx", 0).attr("cy", 0).attr("r", 5).attr("fill", "#2f80ed");
        legend.append("text").attr("x", 11).attr("y", 4).attr("font-size", 12).attr("font-weight", 800).text(`${vm.baseYear}년`);
        legend.append("circle").attr("cx", 82).attr("cy", 0).attr("r", 5).attr("fill", vm.compareYear ? "#f2994a" : "#d9e2ec");
        legend.append("text").attr("x", 93).attr("y", 4).attr("font-size", 12).attr("font-weight", 800).text(`${vm.compareYear || "비교"}년`);
        const g = svgChart.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        const bindTypeTooltip = (selection) => {
          selection
            .classed("compare-tooltip-target", true)
            .on("mouseenter", function (event, d) {
              showCompareTypeTooltip(event, d, vm, chartTitle);
            })
            .on("mousemove", function (event, d) {
              showCompareTypeTooltip(event, d, vm, chartTitle);
            })
            .on("mouseleave", hideCompareMonthlyTooltip);
        };

        g.append("g")
          .attr("transform", `translate(0,${innerHeight})`)
          .call(d3.axisBottom(x).ticks(5).tickFormat(formatComparePlain).tickSize(0).tickPadding(12))
          .call((axis) => {
            axis.select(".domain").remove();
            axis.selectAll("text").attr("font-size", 11);
          });
        g.append("line")
          .attr("x1", x(0))
          .attr("x2", x(0))
          .attr("y1", 0)
          .attr("y2", innerHeight)
          .attr("stroke", "#9fb3c8")
          .attr("stroke-width", 1.5);

        const typeLabels = g.selectAll("text.compare-type-label")
          .data(rows)
          .enter()
          .append("text")
          .attr("x", -12)
          .attr("y", (d) => y(d.type) + y.bandwidth() / 2)
          .attr("dy", "0.35em")
          .attr("text-anchor", "end")
          .attr("font-size", 12)
          .attr("font-weight", 800)
          .text((d) => truncateCompareLabel(d.type, 18));
        bindTypeTooltip(typeLabels);

        const distanceLines = g.selectAll("line.compare-type-distance")
          .data(rows)
          .enter()
          .append("line")
          .attr("x1", (d) => x(d.compare.saving))
          .attr("x2", (d) => x(d.base.saving))
          .attr("y1", (d) => y(d.type) + y.bandwidth() / 2)
          .attr("y2", (d) => y(d.type) + y.bandwidth() / 2)
          .attr("stroke", (d) => d.color)
          .attr("stroke-width", 4)
          .attr("stroke-linecap", "round")
          .attr("opacity", 0.42);
        bindTypeTooltip(distanceLines);

        const basePoints = g.selectAll("circle.compare-type-base")
          .data(rows)

          // fall back to allData months so "월 전체선택" can select all months globally.

            ];
          }

          // Logic: if it was checked or indeterminate, the next state is unchecked (clear all).

            selectedMonths.clear();

            // wasUnchecked
            availableMonths.forEach((m) => selectedMonths.add(m));
          }
          isMonthFilterManuallySelected = true;

          // Update all UIs. updateMonthFilter will call updateSelectAllMonthsCheckboxState

        // Define areas that, if clicked, should NOT trigger a filter reset
        // 클릭 시 필터 재설정을 트리거해서는 안 되는 영역 정의
        const interactiveAreas = [
          "svg", // Includes chart background and bubbles // 차트 배경 및 버블 포함
          "#table-container", // Includes table and summary cards // 테이블 및 요약 카드 포함

        ];

        let clickedInInteractiveArea = interactiveAreas.some((selector) =>
          event.target.closest(selector),
        );

        // If the click was on the SVG background itself (not a bubble), the SVG's own click handler
        // would have already managed the state. We only want to proceed here if the click
        // was truly outside *all* defined interactive dashboard elements.
        // 클릭이 SVG 배경 자체(버블 아님)에 있는 경우 SVG 자체 클릭 핸들러가

        if (

          event.target.tagName.toLowerCase() === "rect"

          // Or, if it's a dblclick, that's also handled by its own listener.

          // 또는 더블 클릭인 경우 자체 리스너에 의해 처리됩니다.
          return;

      async function downloadCSV() {
        if (!allData || allData.length === 0) {
          alert("다운로드할 데이터가 없습니다.");
          return;
        }
        try {
          const headers = [

          ];
          const csvRows = [
            headers
              .map((field) => `"${String(field).replace(/"/g, '""')}"`)
              .join(","),
            ...allData.map((row) =>
              [
                formatYearShort(row.year),
                row.month,
                row.type,
                row.detail.replace(/<[^>]*>?/gm, ""),
                row.actual,
                row.estimated,
                row.saving,
                row.note.replace(/<[^>]*>?/gm, ""),
              ]
                .map((field) => `"${String(field).replace(/"/g, '""')}"`)
                .join(","),
            ),
          ];
          const csvContent = "\uFEFF" + csvRows.join("\n");
          const today = new Date();
          const currentYear = today.getFullYear();
          const currentMonth = String(today.getMonth() + 1).padStart(2, "0");
          const currentDay = String(today.getDate()).padStart(2, "0");
          const dateStr = `${currentYear}${currentMonth}${currentDay}`;
          const filename = `월별 비용 절감 목록_(기숙사 및 사택)_RawDn_${dateStr}.csv`;

          if ("showSaveFilePicker" in window) {
            try {
              const handle = await window.showSaveFilePicker({
                suggestedName: filename,
                types: [
                  { description: "CSV 파일", accept: { "text/csv": [".csv"] } },
                ],
              });
              const writable = await handle.createWritable();
              await writable.write(csvContent);
              await writable.close();
              return;
            } catch (err) {
              if (err.name !== "AbortError")
                console.error("File System Access API 실패:", err);
            }
          }
          const blob = new Blob([csvContent], {
            type: "text/csv;charset=utf-8",

          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        } catch (error) {
          console.error("다운로드 중 오류 발생:", error);
          alert("파일 다운로드 중 오류가 발생했습니다.");

      function applyHyperlinkRules() {
        const tbody = document.querySelector("#table-container table tbody");
        if (!tbody) return;

        const combinedRules = getCombinedHyperlinkRules();

        tbody
          .querySelectorAll(
            'tr:not(.sticky-total-row):not(.subtotal) a[class^="hyperlink-"], tr:not(.sticky-total-row):not(.subtotal) span[class^="min-labor-cost-link"], tr:not(.sticky-total-row):not(.subtotal) a.detail-link, tr:not(.sticky-total-row):not(.subtotal) a.note-link',
          )
          .forEach((el) => {
            const textNode = document.createTextNode(el.textContent);
            if (el.parentNode) {
              el.parentNode.replaceChild(textNode, el);
            }
          });

        const headers = Array.from(
          document.querySelectorAll("#table-container thead th"),
        ).map((th) => th.textContent.trim());

        tbody
          .querySelectorAll("tr:not(.sticky-total-row):not(.subtotal) td")
          .forEach((cell) => {
            const columnIndex = Array.from(cell.parentNode.children).indexOf(
              cell,
            );
            const columnName = headers[columnIndex];
            if (!columnName) return;

            const rulesForColumn = combinedRules.filter(
              (rule) => rule.column === columnName,
            );
            const originalBackgroundColor = cell.style.backgroundColor;

            if (rulesForColumn.length > 0) {
              let currentHtml = cell.innerHTML;
              let currentText = cell.textContent || "";

              rulesForColumn.forEach((rule) => {
                const searchText = rule.searchText;
                const linkUrl = rule.linkUrl;
                const linkType = rule.linkType || "note";
                const description = rule.description || searchText;

                if (currentText.includes(searchText)) {
                  let tag = "a";
                  let cssClass = "";

                  if (linkType === "year") {
                    cssClass = "hyperlink-year";
                    tag = "a";
                  } else if (linkType === "month") {
                    cssClass = "hyperlink-month";
                    tag = "a";
                  } else if (linkType === "type") {
                    cssClass = "hyperlink-type";
                    tag = "a";
                  } else if (linkType === "detail") {
                    cssClass = "detail-link";
                    tag = "a";
                  } else if (linkType === "note") {
                    if (searchText.includes("최소인건비")) {
                      cssClass = "min-labor-cost-link";
                      tag = "span";
                    } else {
                      cssClass = "note-link";
                      tag = "a";
                    }
                  } else {
                    cssClass = "hyperlink-unknown";
                    tag = "a";
                  }

                  const linkHtml = `<${tag} ${tag === "a" ? `href="${linkUrl}" target="_blank"` : cssClass === "min-labor-cost-link" ? `onclick="window.open('${linkUrl}', '_blank')"` : ""} class="${cssClass}" title="${description}">${searchText}</${tag}>`;
                  const escapedSearchText = searchText.replace(
                    /[.*+?^${}()|[\]\\]/g,
                    "\\$&",
                  );
                  const regex = new RegExp(
                    `(?![^<]*?<\/(?:a|span)>)${escapedSearchText}(?![^<]*?<\\/(?:a|span)>)(?![^<>]*?>)`,
                    "g",
                  );

                  if (!currentHtml.includes(linkHtml)) {
                    currentHtml = currentHtml.replace(regex, (match) => {
                      const tempDiv = document.createElement("div");
                      tempDiv.innerHTML = match;
                      if (
                        tempDiv.firstChild &&
                        (tempDiv.firstChild.nodeName === "A" ||
                          tempDiv.firstChild.nodeName === "SPAN")
                      ) {
                        return match;
                      }
                      return linkHtml;
                    });
                  }
                }
              });
              cell.innerHTML = currentHtml;
            }
            if (originalBackgroundColor) {
              cell.style.backgroundColor = originalBackgroundColor;
            }
          });
      }

      function getCombinedHyperlinkRules() {
        const combinedRulesList = [];
        const ruleMap = new Map();

        if (defaultHyperlinkRules && defaultHyperlinkRules.length > 0) {
          defaultHyperlinkRules.forEach((rule) => {
            if (rule.column && rule.searchText && rule.linkUrl) {
              const key = `${rule.column}|${rule.searchText}`;
              ruleMap.set(key, rule);
            }
          });
        }
        if (hyperlinkRules && hyperlinkRules.length > 0) {
          hyperlinkRules.forEach((rule) => {
            if (rule.column && rule.searchText && rule.linkUrl) {
              const key = `${rule.column}|${rule.searchText}`;
              ruleMap.set(key, rule);
            }
          });
        }
        combinedRulesList.push(...ruleMap.values());
        return combinedRulesList;
      }

        } catch (error) {
