          <ul style="margin:3px 0 0 10px;padding:0; list-style-type: none;">
            <li style="font-size:12.8px; color:#888;">
              <div class="type-category" data-category="construction" style="cursor: pointer; margin: 4px 0;">
                <span class="summary-value ${constructionSaving >= 0 ? "positive" : "negative"}">${formatNumber(constructionSaving)}</span>
                <span style="font-weight: bold; text-decoration: underline;">공사성 절감비</span>
                <br><small>(${constructionCount}건, 평균 ${formatNumber(constructionAvg)})</small>
              </div>
            </li>
            <li style="font-size:12.8px; color:#888;">
              <div class="type-category" data-category="maintenance" style="cursor: pointer; margin: 4px 0;">
                <span class="summary-value ${maintenanceSaving >= 0 ? "positive" : "negative"}">${formatNumber(maintenanceSaving)}</span>
                <span style="font-weight: bold; text-decoration: underline;">영선 전환(관리소) 절감비</span>
                <br><small>(${maintenanceCount}건, 평균 ${formatNumber(maintenanceAvg)})</small>
              </div>
            </li>
          </ul>
        </div>
        <div class="summary-item">
          <strong>상위 2개 절감항목:</strong>
          <ul style="margin:3px 0 0 10px;padding:0; list-style-type: none;">
            ${top3
              .slice(0, 2)
              .map(
                (
                  item,
                ) => `<li style="font-size:12.8px; color:#888; margin-bottom: 5px;">
              <span class="summary-value ${item.saving >= 0 ? "positive" : "negative"}">${formatNumber(item.saving)}</span><br>
              <span style="color:${getTypeColor(item.type)}; cursor:pointer; text-decoration:underline;" class="type-label" data-type="${item.type}" data-detail-month="${item.month}" data-detail-year="${item.year}">${item.detail}</span>
              <small>(${formatMonth(item.month)}, ${item.year}년)</small>
            </li>`,
              )
              .join("")}
          </ul>
        </div>
      `;

        // "작업 유형별 통계" 및 "상위 2개 절감항목" 내의 레이블 클릭 이벤트 핸들러
        const handleTypeLabelClick = function (e) {
          e.stopPropagation();
          const type = this.getAttribute("data-type");
          const detailMonth = this.getAttribute("data-detail-month"); // "상위 2개 항목" 클릭 시에만 유효
          const detailYear = this.getAttribute("data-detail-year"); // "상위 2개 항목" 클릭 시에만 유효

          if (!svg) return;
          isYearFilterManuallySetAllOrNone = false; // 개별 항목 클릭 시 명시적 전체 선택/해제 상태 해제
          captureDetailReturnFilters();

          selectedTypes = new Set([type]); // 클릭된 유형만 선택

          if (detailYear && detailMonth) {
            selectSameMonthAcrossSelectedYears(detailMonth, detailYear);
            isMonthFilterManuallySelected = true;
            rememberManualMonthSelection();
          } else {
            selectedMonths.clear();
            let dataForMonthSelection = allData;
            if (selectedYears.size > 0) {
              dataForMonthSelection = allData.filter((d) =>
                selectedYears.has(d.year),
              );
            }
            dataForMonthSelection.forEach((d) => {
              if (selectedTypes.has(d.type) && d.month) {
                selectedMonths.add(d.month);
              }
            });
            isMonthFilterManuallySelected = true;
            rememberManualMonthSelection();
          }

          displayMode = "table";
          // 모든 UI 업데이트
          updateYearFilter(); // 연도 필터 UI는 현재 selectedYears 상태를 반영
          updateMonthFilter(); // 새로 계산/설정된 selectedMonths로 월 UI 업데이트
          renderDashboardView();
          updateBubbleOpacity();
          updateBubbleTextsBasedOnFilter();
          updateSelectAllCheckboxState();
          updateDashboardTitle();
          updateYearFilterButtonText();
        };

        document.querySelectorAll(".type-category").forEach((category) => {
          category.removeEventListener("click", handleTypeCategoryClick);
          category.addEventListener("click", handleTypeCategoryClick);
        });

        // Rollup monthly totals (do not change original filteredForSummary)
        const monthlyData = d3.rollups(
          filteredForSummary.filter((d) => d.saving !== 0), // Use filteredForSummary
          (v) => ({
            total: d3.sum(v, (d) => d.saving),
            count: v.length,
            avg: v.length > 0 ? d3.sum(v, (d) => d.saving) / v.length : 0,
          }),
          (d) => d.month,
        );

        // Determine current month and fallback latest month in the summary data (YYYY-MM format)
        const today = new Date();
        const currentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}`;

        const monthsAvailableSet = new Set(monthlyData.map((d) => d[0]));
        // Decide which month to highlight:
        // 1) If current month present in summary data -> highlight current month
        // 2) Else -> highlight the most recent month available in the summary data
        let highlightMonth = null;
        if (monthsAvailableSet.has(currentMonthStr)) {
          highlightMonth = currentMonthStr;
        } else if (monthlyData.length > 0) {
          // Determine latest month present in monthlyData by parsing YYYY-MM and taking max
          const sortedMonthsDesc = [...monthsAvailableSet].sort((a, b) => {
            const [aY, aM] = a.split("-").map(Number);
            const [bY, bM] = b.split("-").map(Number);
            if (aY !== bY) return bY - aY;
            return bM - aM;
          });
          highlightMonth =
            sortedMonthsDesc.length > 0 ? sortedMonthsDesc[0] : null;
        }

        // Sort monthly cards by total saving ascending (smallest amounts first)
        const monthlyDataSortedByTotal = [...monthlyData].sort(
          (a, b) => a[1].total - b[1].total,
        );

        monthlySummaryContainer.innerHTML = monthlyDataSortedByTotal
          .map(([month, stats]) => {
            const isHighlight = month === highlightMonth;
            // Use a subtle pale yellow background for the highlighted month; keep it light to avoid visual jarring
            const bgStyle = isHighlight
              ? "background-color: rgba(255, 235, 59, 0.25); border-radius:6px; padding:8px;"
              : "";
            return `
        <div class="summary-item" style="${bgStyle}">
          <strong><span class="summary-month-label" data-month="${month}" style="color:#1976d2; cursor:pointer; text-decoration:underline; font-size:120%;">
              ${formatMonth(month)}:</span></strong>
          <span class="summary-value ${stats.total >= 0 ? "positive" : "negative"}">${formatNumber(stats.total)}</span>
          <br><small>(${stats.count}건, 평균 ${formatNumber(stats.avg)})</small>
        </div>
      `;
          })
          .join("");

        monthlySummaryContainer
          .querySelectorAll(".summary-month-label")
          .forEach((label) => {
            label.removeEventListener("click", handleSummaryMonthLabelClick);
            label.addEventListener("click", handleSummaryMonthLabelClick);
          });

        const typeData = d3
          .rollups(
            filteredForSummary.filter((d) => d.saving !== 0), // Use filteredForSummary
            (v) => ({
              total: d3.sum(v, (d) => d.saving),
              count: v.length,
              avg: v.length > 0 ? d3.sum(v, (d) => d.saving) / v.length : 0,
            }),
            (d) => d.type,
          )
          .sort((a, b) => Math.abs(b[1].total) - Math.abs(a[1].total));

        if (typeSummaryContainer) {
          typeSummaryContainer.innerHTML = typeData
            .map(([type, stats]) => {
              const typeColor = getTypeColor(type);
              return `
            <div class="summary-item">
              <strong style="color: ${typeColor}; cursor: pointer;" class="type-label" data-type="${type}">${type}:</strong>
              <span class="summary-value ${stats.total >= 0 ? "positive" : "negative"}">${formatNumber(stats.total)}</span>
              <br><small>(${stats.count}건, 평균 ${formatNumber(stats.avg)})</small>
            </div>`;
            })
            .join("");
        }
        document
          .querySelectorAll(".analysis-summary .type-label")
          .forEach((label) => {
            label.removeEventListener("click", handleTypeLabelClick);
            label.addEventListener("click", handleTypeLabelClick);
          });
        if (typeof window.injectScopedExcelExportButtons === "function") {
          window.injectScopedExcelExportButtons(document);
        }
      }

      // --- "총 절감 분석" 카드 내 "공사성 vs. 영선 전환" 클릭 시 동작 수정 ---
      const handleTypeCategoryClick = function (e) {
        e.stopPropagation();
        const categoryType = this.getAttribute("data-category");
        captureDetailReturnFilters();

        // 기존에 선택되어 있던 selectedYears는 변경되지 않고 유지됩니다.
        isYearFilterManuallySetAllOrNone = false; // 명시적 전체 선택/해제 상태 해제

        selectedTypes = new Set(
          allData
            .filter((d) =>
              categoryType === "construction"
                ? !isCompareMaintenanceType(d.type)
                : isCompareMaintenanceType(d.type),
            )
            .map((d) => d.type),
        );

        selectedMonths.clear();
        let dataToFilterMonths = allData;
        if (selectedYears.size > 0) {
          dataToFilterMonths = allData.filter((d) => selectedYears.has(d.year));
        }
        dataToFilterMonths.forEach((d) => {
          if (selectedTypes.has(d.type) && d.month) {
            selectedMonths.add(d.month);
          }
        });
        isMonthFilterManuallySelected = true;
        rememberManualMonthSelection();

        displayMode = "table";

        // 모든 UI 업데이트
        updateYearFilter(); // 연도 필터 UI는 현재 selectedYears 상태를 반영하여 업데이트
        updateMonthFilter(); // 새로 계산된 selectedMonths로 월 UI 업데이트
        renderDashboardView();
        updateBubbleOpacity();
        updateBubbleTextsBasedOnFilter();
        updateSelectAllCheckboxState();
        updateDashboardTitle();
        updateYearFilterButtonText();
      };
      // --- 개선 사항 끝 ---

      // --- 개선 사항: "월별 절감 현황"의 월 클릭 시 해당 월 데이터만 테이블에 표시 ---
      const handleSummaryMonthLabelClick = function (e) {
        e.stopPropagation();
        const month = this.getAttribute("data-month"); // "YYYY-MM" 형식
        const year = month.substring(0, 4);
        captureDetailReturnFilters();

        selectSameMonthAcrossSelectedYears(month, year);
        isMonthFilterManuallySelected = true;
        rememberManualMonthSelection();
        selectedTypes.clear(); // 유형 선택은 초기화 (특정 월의 모든 유형을 보여주기 위함)
        isYearFilterManuallySetAllOrNone = false; // 개별 항목 클릭 시 명시적 전체 선택/해제 상태 해제

        displayMode = "table"; // 테이블 뷰로 전환

        // Use centralized update to ensure consistent refresh; skip month recalculation
        updateAllViews(true);
      };
      // --- 개선 사항 끝 ---

      function formatNumber(num) {
        if (num === 0) return "0";
        if (isNaN(num)) return "0";
        const absNum = Math.abs(num);
        const suffixes = ["원", "천원", "백만원", "십억원", "조원"];
        const suffixNum = absNum > 0 ? Math.floor(Math.log10(absNum) / 3) : 0;
        const actualSuffixNum = Math.min(suffixNum, suffixes.length - 1);
        const shortNum = absNum / Math.pow(1000, actualSuffixNum);
        const roundedNum = Math.round(shortNum * 100) / 100;
        return `${num < 0 ? "-" : ""}${roundedNum}<small>${suffixes[actualSuffixNum]}</small>`;
      }

      let compareSelection = null;
      let compareDetailsIntentionallyEmpty = false;
      let compareFiltersCollapsed = true;

      function escapeCompareHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getCompareNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : 0;
      }

      function getCompareMonthLabel(month) {
        const text = String(month || "");
        const monthNumber = getMonthNumber(text);
        const yearMatch = text.match(/^(\d{4})-/);
        if (yearMatch && monthNumber) return `${yearMatch[1]}년 ${Number(monthNumber)}월`;
        return monthNumber ? `${Number(monthNumber)}월` : text;
      }

      let compareOptionCacheSource = null;
      let compareOptionCache = null;

      function getCompareOptionCache() {
        if (compareOptionCache && compareOptionCacheSource === allData) {
          return compareOptionCache;
        }
        const years = new Set();
        const types = new Set();
        const details = new Set();
        const monthNumbers = new Set();
        const monthNumbersByYear = new Map();
        allData.forEach((row) => {
          if (row.year) years.add(row.year);
          if (row.type) types.add(row.type);
          if (row.detail) details.add(row.detail);
          const monthNumber = getMonthNumber(row.month);
          if (monthNumber) {
            monthNumbers.add(monthNumber);
            if (row.year) {
              if (!monthNumbersByYear.has(row.year)) {
                monthNumbersByYear.set(row.year, new Set());
              }
              monthNumbersByYear.get(row.year).add(monthNumber);
            }
          }
        });
        compareOptionCacheSource = allData;
        compareOptionCache = {
          years: [...years].sort((a, b) => Number(b) - Number(a)),
          types: [...types].sort((a, b) => String(a).localeCompare(String(b), "ko")),
          details: [...details].sort((a, b) => String(a).localeCompare(String(b), "ko")),
          monthNumbers: [...monthNumbers].sort((a, b) => Number(a) - Number(b)),
          monthNumbersByYear,
        };
        return compareOptionCache;
      }

      function getCompareAvailableYears() {
        return getCompareOptionCache().years;
      }

      function getCompareAvailableMonths(yearSet) {
        const cache = getCompareOptionCache();
        if (!yearSet || yearSet.size === 0) {
          return cache.monthNumbers;
        }
        const monthNumbers = new Set();
        yearSet.forEach((year) => {
          const yearMonths = cache.monthNumbersByYear.get(year);
          if (yearMonths) yearMonths.forEach((month) => monthNumbers.add(month));
        });
        return [...monthNumbers].sort((a, b) => Number(a) - Number(b));
      }

      function getCompareAvailableTypes() {
        return getCompareOptionCache().types;
      }

      function getCompareAvailableDetails() {
        let rows = allData;
        if (compareSelection) {
          rows = getCompareRowsBeforeDetailFilter();
        } else {
          return getCompareOptionCache().details;
        }
        return [
          ...new Set(rows.map((d) => d.detail).filter((detail) => detail)),
        ].sort((a, b) => String(a).localeCompare(String(b), "ko"));
      }

      function getCompareRowsBeforeDetailFilter() {
        if (!compareSelection) return allData;
        if (
          compareSelection.years.size === 0 ||
          compareSelection.months.size === 0 ||
          compareSelection.types.size === 0
        ) {
          return [];
        }
        const selectedMonthNumbers = new Set(
          Array.from(compareSelection.months).map(getMonthNumber).filter(Boolean),
        );
        return allData.filter(
          (d) =>
            compareSelection.years.has(d.year) &&
            selectedMonthNumbers.has(getMonthNumber(d.month)) &&
            compareSelection.types.has(d.type),
        );
      }

      function getCompareFilteredRows() {
        if (!compareSelection) return [];
        if (compareSelection.details.size === 0) return [];
        return getCompareRowsBeforeDetailFilter().filter((d) =>
          compareSelection.details.has(d.detail),
        );
      }

      function getCompareDefaultYearAndMonthSets() {
        const years = getCompareAvailableYears();
        const yearSet = new Set();
        const monthSet = new Set();
        if (years.length === 0) return { years: yearSet, months: monthSet };

        const today = new Date();
        const calendarYear = String(today.getFullYear());
        let baseYear = years.includes(calendarYear) ? calendarYear : years[0];
        const previousYear = String(Number(baseYear) - 1);
        const comparisonYear = years.includes(previousYear)
          ? previousYear
          : years.find((year) => year !== baseYear);

        yearSet.add(baseYear);
        if (comparisonYear) yearSet.add(comparisonYear);

        let cutoffMonth = baseYear === calendarYear ? today.getMonth() : 12;
        const baseMonths = allData
          .filter((d) => d.year === baseYear && d.month)
          .map((d) => Number(getMonthNumber(d.month)))
          .filter((month) => Number.isFinite(month) && month > 0);
        if (baseYear !== calendarYear && baseMonths.length > 0) {
          cutoffMonth = Math.max(...baseMonths);
        }

        allData.forEach((d) => {
          const monthNumber = Number(getMonthNumber(d.month));
          if (
            yearSet.has(d.year) &&
            d.month &&
            monthNumber >= 1 &&
            monthNumber <= cutoffMonth
          ) {
            monthSet.add(getMonthNumber(d.month));
          }
        });

        if (monthSet.size === 0) {
          const fallbackMonths =
            baseYear === calendarYear && cutoffMonth < 1
              ? []
              : getCompareAvailableMonths(yearSet);
          fallbackMonths.forEach((month) => monthSet.add(month));
        }

        return { years: yearSet, months: monthSet };
      }

      function initializeCompareSelection(force) {
        if (compareSelection && !force) return;
        const defaults = getCompareDefaultYearAndMonthSets();
        compareSelection = {
          years: defaults.years,
          months: defaults.months,
          types: new Set(getCompareAvailableTypes()),
          details: new Set(getCompareAvailableDetails()),
        };
        compareDetailsIntentionallyEmpty = false;
      }

      function resetCompareModalSessionState() {
        compareSelection = null;
        compareDetailsIntentionallyEmpty = false;
        compareFiltersCollapsed = true;
        compareActivePart = "total";
        compareDetailTableMode = null;
      }

      function ensureCompareModal() {
        let overlay = document.getElementById("compare-overlay");
        if (overlay) return overlay;

        overlay = document.createElement("div");
        overlay.id = "compare-overlay";
        overlay.className = "compare-overlay";
        overlay.setAttribute("aria-hidden", "true");
        overlay.innerHTML = `
          <div class="compare-modal" role="dialog" aria-modal="true" aria-labelledby="compare-title">
            <div class="compare-header">
              <button type="button" class="compare-x-btn compare-x-left" aria-label="비교 팝업 닫기">X</button>
              <div class="compare-title-block">
                <h2 id="compare-title">선택↔비교</h2>
                <button type="button" id="filter-all-toggle" class="compare-close-btn" style="margin-right:8px; background:#e3f2fd; color:#1e88e5;">필터 토글</button>
                <button type="button" id="compare-reset-btn" class="compare-close-btn">기본값</button>
              </div>
              <button type="button" class="compare-x-btn compare-x-right" aria-label="비교 팝업 닫기">X</button>
            </div>
            <div id="compare-controls-panel" class="compare-controls"></div>
            <div id="compare-body" class="compare-body"></div>
          </div>
        `;
        document.body.appendChild(overlay);

        overlay.querySelectorAll(".compare-x-btn").forEach((button) => {
          button.addEventListener("click", closeCompareModal);
        });
        overlay
          .querySelector("#compare-reset-btn")
          .addEventListener("click", function () {
            compareActivePart = "total";
            compareDetailTableMode = null;
            compareFiltersCollapsed = true;
            initializeCompareSelection(true);
            renderCompareModal();
          });
        overlay
          .querySelector("#filter-all-toggle")
          .addEventListener("click", function () {
            const panel = overlay.querySelector("#compare-controls-panel");
            const boxes = overlay.querySelectorAll(".compare-filter-box");
            if (boxes.length === 0) return;
            const allFolded = Array.from(boxes).every(bx => bx.classList.contains("cm-fold"));
            compareFiltersCollapsed = !allFolded;
            if (panel) panel.classList.toggle("is-collapsed", compareFiltersCollapsed);
            boxes.forEach(bx => {
              if (allFolded) {
                bx.classList.remove("cm-fold");
                const btn = bx.querySelector(".cm-ct");
                if (btn) btn.innerHTML = "\u25B2";
              } else {
                bx.classList.add("cm-fold");
                const btn = bx.querySelector(".cm-ct");
                if (btn) btn.innerHTML = "\u25BC";
              }
            });
          });
        return overlay;
      }

      function openCompareModal() {
        initializeCompareSelection(false);
        compareFiltersCollapsed = true;
        const overlay = ensureCompareModal();
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        renderCompareModal();
      }

      function closeCompareModal() {
        const overlay = document.getElementById("compare-overlay");
        if (!overlay) return;
        closeCompareMonthlyPopout();
        overlay.classList.remove("show");
        overlay.setAttribute("aria-hidden", "true");
        resetCompareModalSessionState();
        compareCurrentViewModel = null;
      }

      function renderCompareChip(kind, value, label, checked) {
        return `
          <label class="compare-chip">
            <input type="checkbox" data-compare-kind="${kind}" value="${escapeCompareHtml(value)}" ${checked ? "checked" : ""}>
            <span>${escapeCompareHtml(label)}</span>
          </label>
        `;
      }

      function renderCompareFilterBox(title, kind, values, labelFactory, selectedSet) {
        const chips =
          values.length > 0
            ? values
                .map((value) =>
                  renderCompareChip(
                    kind,
                    value,
                    labelFactory(value),
                    selectedSet.has(value),
                  ),
                )
                .join("")
            : '<div class="compare-empty">선택 가능한 항목이 없습니다.</div>';
        const foldedClass = compareFiltersCollapsed ? " cm-fold" : "";
        return `
          <div class="compare-filter-box${foldedClass}">
            <div class="compare-filter-title-row">
              <h3>${title}</h3>
              <div class="compare-filter-actions">
                <button type="button" class="compare-mini-btn" data-compare-action="all" data-compare-kind="${kind}">전체</button>
                <button type="button" class="compare-mini-btn" data-compare-action="none" data-compare-kind="${kind}">해제</button>
              </div>
            </div>
            <div class="compare-chip-list">${chips}</div>
          </div>
        `;
      }

      function renderCompareControls() {
        const panel = document.getElementById("compare-controls-panel");
        if (!panel || !compareSelection) return;
        panel.classList.toggle("is-collapsed", compareFiltersCollapsed);

        const years = getCompareAvailableYears();
        const months = getCompareAvailableMonths(compareSelection.years);
        const monthOptionSet = new Set(months);
        compareSelection.months = new Set(
          Array.from(compareSelection.months)
            .map(getMonthNumber)
            .filter((month) => monthOptionSet.has(month)),
        );
        const types = getCompareAvailableTypes();
        const details = getCompareAvailableDetails();
        const detailOptionSet = new Set(details);
        compareSelection.details = new Set(
          Array.from(compareSelection.details).filter((detail) =>
            detailOptionSet.has(detail),
          ),
        );
        if (
          details.length > 0 &&
          compareSelection.details.size === 0 &&
          !compareDetailsIntentionallyEmpty
        ) {
          compareSelection.details = new Set(details);
        }

        panel.innerHTML =
          renderCompareFilterBox(
            "연도",
            "years",
            years,
            (year) => `${year}년`,
            compareSelection.years,
          ) +
          renderCompareFilterBox(
            "월",
            "months",
            months,
            getCompareMonthLabel,
            compareSelection.months,
          ) +
          renderCompareFilterBox(
            "작업유형",
            "types",
            types,
            (type) => type,
            compareSelection.types,
          ) +
          renderCompareFilterBox(
            "절감항목",
            "details",
            details,
            (detail) => detail,
            compareSelection.details,
          );

        panel.querySelectorAll("input[data-compare-kind]").forEach((input) => {
          input.addEventListener("change", handleCompareControlChange);
        });
        panel.querySelectorAll("button[data-compare-action]").forEach((button) => {
          button.addEventListener("click", handleCompareBulkAction);
        });
      }

      function getCompareOptionsForKind(kind) {
        if (kind === "years") return getCompareAvailableYears();
        if (kind === "months") return getCompareAvailableMonths(compareSelection.years);
        if (kind === "types") return getCompareAvailableTypes();
        if (kind === "details") return getCompareAvailableDetails();
        return [];
      }

      function getCompareSelectionSet(kind) {
        if (kind === "years") return compareSelection.years;
        if (kind === "months") return compareSelection.months;
        if (kind === "types") return compareSelection.types;
        if (kind === "details") return compareSelection.details;
        return null;
      }

      function syncCompareDetailsToAvailable(repopulateIfEmpty) {
        const details = getCompareAvailableDetails();
        const detailOptionSet = new Set(details);
        compareSelection.details = new Set(
          Array.from(compareSelection.details).filter((detail) =>
            detailOptionSet.has(detail),
          ),
        );
        if (
          repopulateIfEmpty &&
          details.length > 0 &&
          compareSelection.details.size === 0
        ) {
          compareSelection.details = new Set(details);
        }
      }

      function resetCompareDetailsToAvailable() {
        compareSelection.details = new Set(getCompareAvailableDetails());
        compareDetailsIntentionallyEmpty = false;
      }

      function syncCompareMonthsAfterYearChange() {
        const availableMonths = getCompareAvailableMonths(compareSelection.years);
        const availableMonthSet = new Set(availableMonths);
        const previousSize = compareSelection.months.size;
        compareSelection.months = new Set(
          Array.from(compareSelection.months)
            .map(getMonthNumber)
            .filter((month) => availableMonthSet.has(month)),
        );
        if (
          compareSelection.years.size > 0 &&
          availableMonths.length > 0 &&
          previousSize > 0 &&
          compareSelection.months.size === 0
        ) {
          availableMonths.forEach((month) => compareSelection.months.add(month));
        }
      }

      function handleCompareControlChange(event) {
        const input = event.currentTarget;
        const kind = input.getAttribute("data-compare-kind");
        const set = getCompareSelectionSet(kind);
        if (!set) return;
        const value = kind === "months" ? getMonthNumber(input.value) : input.value;
        if (input.checked) set.add(value);
        else set.delete(value);

        if (kind === "years") syncCompareMonthsAfterYearChange();
        if (kind === "details") {
          compareDetailsIntentionallyEmpty = set.size === 0;
        }
        if (kind === "years" || kind === "months" || kind === "types") {
          resetCompareDetailsToAvailable();
          compareDetailTableMode = null;
        }
        renderCompareModal();
      }

      function handleCompareBulkAction(event) {
        const button = event.currentTarget;
        const kind = button.getAttribute("data-compare-kind");
        const action = button.getAttribute("data-compare-action");
        const set = getCompareSelectionSet(kind);
        if (!set) return;
        set.clear();
        if (action === "all") {
          getCompareOptionsForKind(kind).forEach((value) => set.add(value));
        }
        if (kind === "details") {
          compareDetailsIntentionallyEmpty = action !== "all";
        }
        if (kind === "years") syncCompareMonthsAfterYearChange();
        if (kind === "years" || kind === "months" || kind === "types") {
          resetCompareDetailsToAvailable();
          compareDetailTableMode = null;
        }
        renderCompareModal();
      }


      let compareActivePart = "total";
      let compareDetailTableMode = null;
      let compareCurrentViewModel = null;
      let compareMonthlyPopoutState = {
        key: null,
        zoom: 1,
        dragging: null,
        resizing: null,
        panning: null,
      };
      const comparePartOrder = ["total", "monthly", "type"];
      const comparePalette = [
        "#2f80ed",
        "#27ae60",
        "#f2994a",
        "#eb5757",
        "#9b51e0",
        "#00a6a6",
        "#f2c94c",
        "#8b5e3c",
      ];

      function isCompareMaintenanceType(type) {
        const normalized = String(type || "")
          .replace(/\s+/g, "")
          .replace(/（/g, "(")
          .replace(/）/g, ")");
        return /^관리소\([^)]*\)$/.test(normalized);
      }

      function getCompareCharacterKeyFromType(type) {
        return isCompareMaintenanceType(type) ? "maintenance" : "construction";
      }

      function getCompareMaintenanceSegment(type) {
        const normalized = String(type || "");
        if (normalized.includes("건축")) return "건축";
        if (normalized.includes("기계")) return "기계";
        if (normalized.includes("전기")) return "전기";
        return "탐지/기타";
      }

      function getCompareEmptyStats() {
        return {
          saving: 0,
          actual: 0,
          estimated: 0,
          count: 0,
          avg: 0,
          construction: { saving: 0, count: 0, avg: 0 },
          maintenance: { saving: 0, count: 0, avg: 0 },
          topItems: [],
        };
      }

      function getCompareStatsByYear(rows) {
        return d3
          .rollups(
            rows,
            (values) => {
              const normalized = values.map((d) => ({
                ...d,
                saving: getCompareNumber(d.saving),
                actual: getCompareNumber(d.actual),
                estimated: getCompareNumber(d.estimated),
              }));
              const saving = d3.sum(normalized, (d) => d.saving);
              const actual = d3.sum(normalized, (d) => d.actual);
              const estimated = d3.sum(normalized, (d) => d.estimated);
              const constructionData = normalized.filter(
                (d) => !isCompareMaintenanceType(d.type) && d.saving !== 0,
              );
              const maintenanceData = normalized.filter(
                (d) => isCompareMaintenanceType(d.type) && d.saving !== 0,
              );
              const constructionSaving = d3.sum(constructionData, (d) => d.saving);
              const maintenanceSaving = d3.sum(maintenanceData, (d) => d.saving);
              const sorted = [...normalized].sort(
                (a, b) => Math.abs(b.saving) - Math.abs(a.saving),
              );

              return {
                saving,
                actual,
                estimated,
                count: normalized.length,
                avg: normalized.length > 0 ? saving / normalized.length : 0,
                construction: {
                  saving: constructionSaving,
                  count: constructionData.length,
                  avg:
                    constructionData.length > 0
                      ? constructionSaving / constructionData.length
                      : 0,
                },
                maintenance: {
                  saving: maintenanceSaving,
                  count: maintenanceData.length,
                  avg:
                    maintenanceData.length > 0
                      ? maintenanceSaving / maintenanceData.length
                      : 0,
                },
                topItems: sorted.slice(0, 2),
              };
            },
            (d) => d.year,
          )
          .sort((a, b) => Number(b[0]) - Number(a[0]));
      }

      function formatCompareVal(val) {
        if (!val && val !== 0) return "-";
        return `<span class="${val >= 0 ? "compare-positive" : "compare-negative"}">${formatNumber(val)}</span>`;
      }

      function formatComparePlain(value) {
        const num = getCompareNumber(value);
        const abs = Math.abs(num);
        if (abs >= 100000000) return `${(num / 100000000).toFixed(abs >= 1000000000 ? 1 : 2)}억`;
        if (abs >= 1000000) return `${(num / 1000000).toFixed(abs >= 10000000 ? 1 : 2)}백만`;
        if (abs >= 1000) return `${(num / 1000).toFixed(abs >= 10000 ? 1 : 2)}천`;
        return `${Math.round(num * 100) / 100}`;
      }

      function formatComparePercent(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return "0.0%";
        return `${(num * 100).toFixed(1)}%`;
      }

      function formatCompareSignedPercentPoint(value) {
        const num = Number(value);
        if (!Number.isFinite(num) || Math.abs(num) < 0.0005) return "0.0%p";
        const point = num * 100;
        return `${point > 0 ? "+" : ""}${point.toFixed(1)}%p`;
      }

      function formatCompareSignedCount(value) {
        const num = Number(value) || 0;
        if (num === 0) return "0건";
        return `${num > 0 ? "+" : ""}${num}건`;
      }

      function getCompareSelectedMonthNumbers() {
        const source = compareSelection ? Array.from(compareSelection.months) : [];
        return [...new Set(source.map(getMonthNumber).filter(Boolean))]
          .sort((a, b) => Number(a) - Number(b));
      }

      function formatCompareMonthRange(monthNumbers) {
        const months = monthNumbers
          .map((month) => Number(getMonthNumber(month)))
          .filter((month) => Number.isFinite(month) && month > 0)
          .sort((a, b) => a - b);
        if (months.length === 0) return "월 선택 없음";
        if (months.length === 1) return `${months[0]}월`;
        return `${months[0]}월 ~ ${months[months.length - 1]}월`;
      }

      function formatComparePeriodLabel(year, monthNumbers) {
        if (!year) return "비교 없음";
        return `${year}년 (${formatCompareMonthRange(monthNumbers)})`;
      }

      function formatCompareBasisLabel(vm) {
        const monthRange = formatCompareMonthRange(vm.monthNumbers || []);
        if (vm.compareYear) {
          return `${vm.baseYear}년 ↔ ${vm.compareYear}년, ${monthRange} 동기 기준`;
        }
        return `${vm.baseYear}년, ${monthRange} 기준`;
      }

      function truncateCompareLabel(value, maxLength) {
        const text = String(value || "");
        return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
      }

      function getCompareDeltaLabel(delta) {
        if (!delta) return "차이 없음";
        return delta < 0 ? "절감 확대" : "절감 축소";
      }

      function getCompareDeltaClass(delta) {
        if (!delta) return "";
        return delta < 0 ? "compare-delta-good" : "compare-delta-bad";
      }

      function getCompareTypeColor(type, index) {
        if (colorScale) return getTypeColor(type);
        return comparePalette[index % comparePalette.length];
      }

      function getCompareMonthlyMatrix(rows, years) {
        const monthNumbers = [
          ...new Set(rows.map((d) => getMonthNumber(d.month)).filter((month) => month)),
        ].sort((a, b) => Number(a) - Number(b));
        return monthNumbers.map((monthNumber) => {
          const item = { monthNumber };
          years.forEach((year) => {
            item[year] = d3.sum(
              rows.filter(
                (d) => d.year === year && getMonthNumber(d.month) === monthNumber,
              ),
              (d) => getCompareNumber(d.saving),
            );
          });
          return item;
        });
      }

      function buildCompareTypeRows(rows, viewYears) {
        const [baseYear, compareYear] = viewYears;
        return d3
          .rollups(
            rows,
            (values) =>
              d3.rollup(
                values,
                (items) => ({
                  saving: d3.sum(items, (d) => getCompareNumber(d.saving)),
                  count: items.length,
                }),
                (d) => d.year,
              ),
            (d) => d.type || "미분류",
          )
          .map(([type, byYear], index) => {
            const base = byYear.get(baseYear) || { saving: 0, count: 0 };
            const compare = compareYear
              ? byYear.get(compareYear) || { saving: 0, count: 0 }
              : { saving: 0, count: 0 };
            const delta = compareYear ? base.saving - compare.saving : base.saving;
            return {
              type,
              category: getCompareCharacterKeyFromType(type),
              segment: isCompareMaintenanceType(type) ? getCompareMaintenanceSegment(type) : "공사성",
              base,
              compare,
              delta,
              totalAbs: Math.abs(base.saving) + Math.abs(compare.saving) + Math.abs(delta),
              color: getCompareTypeColor(type, index),
            };
          })
          .sort((a, b) => b.totalAbs - a.totalAbs);
      }

      function buildCompareDetailRows(rows, viewYears) {
        const [baseYear, compareYear] = viewYears;
        return d3
          .rollups(
            rows,
            (values) => ({
              type: values[0]?.type || "미분류",
              byYear: d3.rollup(
                values,
                (items) => ({
                  saving: d3.sum(items, (d) => getCompareNumber(d.saving)),
                  count: items.length,
                }),
                (d) => d.year,
              ),
            }),
            (d) => d.detail || "미분류",
          )
          .map(([detail, data], index) => {
            const base = data.byYear.get(baseYear) || { saving: 0, count: 0 };
            const compare = compareYear
              ? data.byYear.get(compareYear) || { saving: 0, count: 0 }
              : { saving: 0, count: 0 };
            const delta = compareYear ? base.saving - compare.saving : base.saving;
            return {
              detail,
              type: data.type,
              category: getCompareCharacterKeyFromType(data.type),
              segment: isCompareMaintenanceType(data.type) ? getCompareMaintenanceSegment(data.type) : "공사성",
              base,
              compare,
              delta,
              color: getCompareTypeColor(data.type, index),
            };
          })
          .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
      }

      function buildCompareMonthlyRows(rows, viewYears) {
        const [baseYear, compareYear] = viewYears;
        const matrix = getCompareMonthlyMatrix(rows, viewYears);
        return Array.from({ length: 12 }, (_, index) => {
          const monthNumber = index + 1;
          const existing = matrix.find((d) => Number(d.monthNumber) === monthNumber);
          const base = existing ? getCompareNumber(existing[baseYear]) : 0;
          const compare = existing && compareYear ? getCompareNumber(existing[compareYear]) : 0;
          return {
            monthNumber,
            base,
            compare,
            delta: compareYear ? base - compare : base,
          };
        });
      }

      function getCompareTypeScopeRows(vm, scope) {
        if (scope === "construction") return vm.typeConstructionRows || [];
        if (scope === "maintenance") return vm.typeMaintenanceRows || [];
        return vm.typeRows || [];
      }

      function getCompareTypeScopeLabel(scope) {
        if (scope === "construction") return "공사성";
        if (scope === "maintenance") return "영선 전환";
        return "전체";
      }

      function getCompareTypeScopeSubtitle(vm, scope) {
        if (scope === "construction") return "관리소 제외 · " + formatCompareBasisLabel(vm);
        if (scope === "maintenance") return "관리소(...) 기준 · " + formatCompareBasisLabel(vm);
        return formatCompareBasisLabel(vm);
      }

      function getCompareMonthlyPopoutConfig(key, vm) {
        if (key === "type-total") {
          return {
            key,
            chartType: "type-distance",
            title: "작업 유형별 거리 · 전체",
            subtitle: formatCompareBasisLabel(vm),
            rows: vm.typeRows || [],
          };
        }
        if (key === "type-construction") {
          return {
            key,
            chartType: "type-distance",
            title: "작업 유형별 거리 · 공사성",
            subtitle: "관리소 제외 · " + formatCompareBasisLabel(vm),
            rows: vm.typeConstructionRows || [],
          };
        }
        if (key === "type-maintenance") {
          return {
            key,
            chartType: "type-distance",
            title: "작업 유형별 거리 · 영선 전환",
            subtitle: "관리소(...) 기준 · " + formatCompareBasisLabel(vm),
            rows: vm.typeMaintenanceRows || [],
          };
        }
        if (key === "impact-total" || key === "impact-construction" || key === "impact-maintenance") {
          const scope = key.replace("impact-", "");
          return {
            key,
            scope,
            chartType: "impact-list",
            title: `영향도 순위 · ${getCompareTypeScopeLabel(scope)}`,
            subtitle: getCompareTypeScopeSubtitle(vm, scope),
            rows: getCompareTypeScopeRows(vm, scope).slice(0, 10),
          };
        }
        if (key === "share-total" || key === "share-construction" || key === "share-maintenance") {
          const scope = key.replace("share-", "");
          return {
            key,
            scope,
            chartType: "type-share",
            title: `기준 연도 구성 · ${getCompareTypeScopeLabel(scope)}`,
            subtitle: `${vm.baseYear}년 · ${getCompareTypeScopeLabel(scope)}`,
            rows: getCompareTypeScopeRows(vm, scope),
          };
        }
        if (key === "construction") {
          return {
            key,
            chartType: "monthly",
            title: "월별 절감 흐름 · 공사성",
            subtitle: "관리소 제외 · " + formatCompareBasisLabel(vm),
            rows: vm.monthlyConstructionRows || [],
          };
        }
        if (key === "maintenance") {
          return {
            key,
            chartType: "monthly",
            title: "월별 절감 흐름 · 영선 전환",
            subtitle: "관리소(...) 기준 · " + formatCompareBasisLabel(vm),
            rows: vm.monthlyMaintenanceRows || [],
          };
        }
        return {
          key: "total",
          chartType: "monthly",
          title: "월별 절감 흐름 · 전체",
          subtitle: formatCompareBasisLabel(vm),
          rows: vm.monthlyRows || [],
        };
      }

      function setCompareMonthlyPopoutZoom(nextZoom) {
        compareMonthlyPopoutState.zoom = Math.max(0.75, Math.min(2.5, nextZoom));
        const overlay = document.getElementById("compare-chart-popout-overlay");
        const stageInner = overlay ? overlay.querySelector(".compare-chart-popout-stage-inner") : null;
        const zoomText = overlay ? overlay.querySelector("[data-compare-popout-zoom-text]") : null;
        const zoom = compareMonthlyPopoutState.zoom;
        if (stageInner) {
          stageInner.style.width = `${100 * zoom}%`;
          stageInner.style.height = `${100 * zoom}%`;
          stageInner.style.minWidth = `${900 * zoom}px`;
          stageInner.style.minHeight = `${430 * zoom}px`;
        }
        if (zoomText) zoomText.textContent = `${Math.round(zoom * 100)}%`;
      }

      function startComparePopoutGraphicPan(event) {
        const stage = event.currentTarget;
        if (!stage || event.target.closest("button, a, input, select, textarea")) return;
        if (event.pointerType === "mouse" && event.button !== 0) return;
        compareMonthlyPopoutState.panning = {
          pointerId: event.pointerId,
          stage,
          startX: event.clientX,
          startY: event.clientY,
          scrollLeft: stage.scrollLeft,
          scrollTop: stage.scrollTop,
        };
        stage.classList.add("is-panning");
        stage.setPointerCapture?.(event.pointerId);
        document.addEventListener("pointermove", moveComparePopoutGraphicPan);
        document.addEventListener("pointerup", stopComparePopoutGraphicPan);
        document.addEventListener("pointercancel", stopComparePopoutGraphicPan);
        event.preventDefault();
      }

      function moveComparePopoutGraphicPan(event) {
        const pan = compareMonthlyPopoutState.panning;
        if (!pan || pan.pointerId !== event.pointerId) return;
        const stage = pan.stage || event.currentTarget;
        stage.scrollLeft = pan.scrollLeft - (event.clientX - pan.startX);
        stage.scrollTop = pan.scrollTop - (event.clientY - pan.startY);
        event.preventDefault();
      }

      function stopComparePopoutGraphicPan(event) {
        const pan = compareMonthlyPopoutState.panning;
        if (!pan || pan.pointerId !== event.pointerId) return;
        const stage = pan.stage || event.currentTarget;
        stage.releasePointerCapture?.(event.pointerId);
        stage.classList.remove("is-panning");
        compareMonthlyPopoutState.panning = null;
        document.removeEventListener("pointermove", moveComparePopoutGraphicPan);
        document.removeEventListener("pointerup", stopComparePopoutGraphicPan);
        document.removeEventListener("pointercancel", stopComparePopoutGraphicPan);
      }

      function bindComparePopoutGraphicPan(overlay) {
        const stage = overlay ? overlay.querySelector(".compare-chart-popout-stage") : null;
        if (!stage || stage.dataset.compareGraphicPanBound === "1") return;
        stage.dataset.compareGraphicPanBound = "1";
        stage.addEventListener("pointerdown", startComparePopoutGraphicPan);
        stage.addEventListener("pointermove", moveComparePopoutGraphicPan);
        stage.addEventListener("pointerup", stopComparePopoutGraphicPan);
        stage.addEventListener("pointercancel", stopComparePopoutGraphicPan);
        stage.addEventListener("lostpointercapture", () => {
          stage.classList.remove("is-panning");
          compareMonthlyPopoutState.panning = null;
          document.removeEventListener("pointermove", moveComparePopoutGraphicPan);
          document.removeEventListener("pointerup", stopComparePopoutGraphicPan);
          document.removeEventListener("pointercancel", stopComparePopoutGraphicPan);
        });
      }

      function renderCompareMonthlyPopoutChart() {
        if (!compareCurrentViewModel || !compareMonthlyPopoutState.key) return;
        if (compareMonthlyPopoutState.key === "bridge") {
          const overlay = ensureCompareMonthlyPopout();
          setComparePopoutContentMode(overlay, "svg");
          overlay.querySelector("[data-compare-popout-title]").textContent = "총괄 브릿지";
          overlay.querySelector("[data-compare-popout-subtitle]").textContent =
            `${compareCurrentViewModel.baseYear} vs ${compareCurrentViewModel.compareYear || "-"}`;
          setCompareMonthlyPopoutZoom(compareMonthlyPopoutState.zoom);
          renderCompareBridgeChart(compareCurrentViewModel, "#compare-monthly-popout-chart");
          return;
        }
        const config = getCompareMonthlyPopoutConfig(compareMonthlyPopoutState.key, compareCurrentViewModel);
        const overlay = ensureCompareMonthlyPopout();
        overlay.querySelector("[data-compare-popout-title]").textContent = config.title;
        overlay.querySelector("[data-compare-popout-subtitle]").textContent = config.subtitle;
        setCompareMonthlyPopoutZoom(compareMonthlyPopoutState.zoom);
        if (config.chartType === "type-distance") {
          setComparePopoutContentMode(overlay, "svg");
          renderCompareTypeChart(compareCurrentViewModel, "#compare-monthly-popout-chart", config.rows, config.title);
          return;
        }
        if (config.chartType === "impact-list") {
          setComparePopoutContentMode(overlay, "html");
          renderCompareImpactPopout(overlay, compareCurrentViewModel, config);
          return;
        }
        if (config.chartType === "type-share") {
          setComparePopoutContentMode(overlay, "svg");
          renderCompareTypeShareChart(compareCurrentViewModel, "#compare-monthly-popout-chart", config.rows, config.title);
          return;
        }
        setComparePopoutContentMode(overlay, "svg");
        renderCompareMonthlyChart(compareCurrentViewModel, "#compare-monthly-popout-chart", config.rows);
      }

      function setComparePopoutContentMode(overlay, mode) {
        const svg = overlay ? overlay.querySelector("#compare-monthly-popout-chart") : null;
        const html = overlay ? overlay.querySelector("#compare-popout-html") : null;
        if (svg) svg.style.display = mode === "html" ? "none" : "";
        if (html) html.style.display = mode === "html" ? "" : "none";
      }

      function renderCompareImpactPopout(overlay, vm, config) {
        const html = overlay ? overlay.querySelector("#compare-popout-html") : null;
        if (!html) return;
        const rows = config.rows || [];
        html.innerHTML = `
          <div class="compare-impact-list">
            ${renderCompareImpactRows(
              rows,
              getCompareRowsMaxDelta(rows),
              `${getCompareTypeScopeLabel(config.scope)} 영향도 항목이 없습니다.`,
              (_row, index) => `data-compare-impact-source="${escapeCompareHtml(config.scope || "total")}" data-compare-impact-index="${index}"`,
            )}
          </div>
        `;
        bindCompareTypeSupportTooltips(html, vm);
      }

      function ensureCompareMonthlyPopout() {
        let overlay = document.getElementById("compare-chart-popout-overlay");
        if (overlay) {
          bindComparePopoutGraphicPan(overlay);
          return overlay;
        }
        overlay = document.createElement("div");
        overlay.id = "compare-chart-popout-overlay";
        overlay.className = "compare-chart-popout-overlay";
        overlay.setAttribute("aria-hidden", "true");
        overlay.innerHTML = `
          <div class="compare-chart-popout-modal" role="dialog" aria-modal="true" aria-label="월별 절감 흐름 확대">
            <div class="compare-chart-popout-header" data-compare-popout-drag>
              <button type="button" class="compare-chart-popout-close" data-compare-popout-close aria-label="확대 차트 닫기">X</button>
              <div class="compare-chart-popout-title">
                <strong data-compare-popout-title></strong>
                <span data-compare-popout-subtitle></span>
              </div>
              <div class="compare-chart-popout-actions">
                <button type="button" class="compare-chart-popout-btn" data-compare-popout-zoom="-1" title="축소" aria-label="축소">-</button>
                <button type="button" class="compare-chart-popout-btn" data-compare-popout-zoom-text aria-label="현재 확대율">100%</button>
                <button type="button" class="compare-chart-popout-btn" data-compare-popout-zoom="1" title="확대" aria-label="확대">+</button>
                <button type="button" class="compare-chart-popout-btn" data-compare-popout-center title="그래픽 가운데 정렬" aria-label="그래픽 영역 가운데 정렬">◎</button>
                <button type="button" class="compare-chart-popout-btn" data-compare-popout-fullscreen title="전체 보기" aria-label="전체 보기">⛶</button>
                <button type="button" class="compare-chart-popout-close" data-compare-popout-close aria-label="확대 차트 닫기">X</button>
              </div>
            </div>
            <div class="compare-chart-popout-body">
              <div class="compare-chart-popout-stage">
                <div class="compare-chart-popout-stage-inner">
                  <svg id="compare-monthly-popout-chart" class="compare-chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet"></svg>
                  <div id="compare-popout-html" style="display:none;"></div>
                </div>
              </div>
            </div>
            <span class="compare-chart-popout-resize n" data-compare-popout-resize="n"></span>
            <span class="compare-chart-popout-resize s" data-compare-popout-resize="s"></span>
            <span class="compare-chart-popout-resize w" data-compare-popout-resize="w"></span>
            <span class="compare-chart-popout-resize e" data-compare-popout-resize="e"></span>
            <span class="compare-chart-popout-resize nw" data-compare-popout-resize="nw"></span>
            <span class="compare-chart-popout-resize ne" data-compare-popout-resize="ne"></span>
            <span class="compare-chart-popout-resize sw" data-compare-popout-resize="sw"></span>
            <span class="compare-chart-popout-resize se" data-compare-popout-resize="se"></span>
          </div>
        `;
        document.body.appendChild(overlay);
        bindComparePopoutGraphicPan(overlay);
        overlay.addEventListener("click", function (event) {
          if (event.target.closest("[data-compare-popout-close]")) {
            closeCompareMonthlyPopout();
            return;
          }
          const zoomButton = event.target.closest("[data-compare-popout-zoom]");
          if (zoomButton) {
            const direction = Number(zoomButton.getAttribute("data-compare-popout-zoom"));
            setCompareMonthlyPopoutZoom(compareMonthlyPopoutState.zoom + direction * 0.15);
            return;
          }
          if (event.target.closest("[data-compare-popout-center]")) {
            centerCompareMonthlyPopoutGraphic();
            return;
          }
          if (event.target.closest("[data-compare-popout-fullscreen]")) {
            const modal = overlay.querySelector(".compare-chart-popout-modal");
            modal.classList.toggle("is-fullscreen");
            if (modal.classList.contains("is-fullscreen")) {
              modal.style.left = "";
              modal.style.top = "";
              modal.style.width = "";
              modal.style.height = "";
            } else {
              centerCompareMonthlyPopout();
            }
          }
        });
        overlay.addEventListener("mousedown", handleCompareMonthlyPopoutPointerDown);
        return overlay;
      }

      function centerCompareMonthlyPopout() {
        const overlay = document.getElementById("compare-chart-popout-overlay");
        const modal = overlay ? overlay.querySelector(".compare-chart-popout-modal") : null;
        if (!modal || modal.classList.contains("is-fullscreen")) return;
        const rect = modal.getBoundingClientRect();
        const width = Math.min(rect.width || modal.offsetWidth || 640, window.innerWidth);
        const height = Math.min(rect.height || modal.offsetHeight || 420, window.innerHeight);
        modal.style.transform = "none";
        modal.style.left = `${Math.max(0, (window.innerWidth - width) / 2)}px`;
        modal.style.top = `${Math.max(0, (window.innerHeight - height) / 2)}px`;
      }

      function centerCompareMonthlyPopoutGraphic() {
        const overlay = document.getElementById("compare-chart-popout-overlay");
        const stage = overlay ? overlay.querySelector(".compare-chart-popout-stage") : null;
        if (!stage) return;
        requestAnimationFrame(() => {
          const maxLeft = Math.max(0, stage.scrollWidth - stage.clientWidth);
          const maxTop = Math.max(0, stage.scrollHeight - stage.clientHeight);
          stage.scrollTo({
            left: maxLeft / 2,
            top: maxTop / 2,
            behavior: "auto",
          });
        });
      }

      function openCompareMonthlyPopout(key) {
        if (!compareCurrentViewModel) return;
        compareMonthlyPopoutState.key = key || "total";
        compareMonthlyPopoutState.zoom = 1;
        const overlay = ensureCompareMonthlyPopout();
        const modal = overlay.querySelector(".compare-chart-popout-modal");
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        modal.classList.remove("is-fullscreen");
        modal.style.width = "";
        modal.style.height = "";
        centerCompareMonthlyPopout();
        renderCompareMonthlyPopoutChart();
      }

      function closeCompareMonthlyPopout() {
        const overlay = document.getElementById("compare-chart-popout-overlay");
        if (!overlay) return;
        hideCompareMonthlyTooltip();
        if (overlay.contains(document.activeElement)) document.activeElement.blur();
        overlay.classList.remove("show");
        overlay.setAttribute("aria-hidden", "true");
        compareMonthlyPopoutState.key = null;
        compareMonthlyPopoutState.dragging = null;
        compareMonthlyPopoutState.resizing = null;
        compareMonthlyPopoutState.panning = null;
      }

      function handleCompareMonthlyPopoutPointerDown(event) {
        const overlay = document.getElementById("compare-chart-popout-overlay");
        const modal = overlay ? overlay.querySelector(".compare-chart-popout-modal") : null;
        if (!modal || modal.classList.contains("is-fullscreen")) return;
        const resizeHandle = event.target.closest("[data-compare-popout-resize]");
        if (resizeHandle) {
          event.preventDefault();
          const rect = modal.getBoundingClientRect();
          compareMonthlyPopoutState.resizing = {
            dir: resizeHandle.getAttribute("data-compare-popout-resize"),
            startX: event.clientX,
            startY: event.clientY,
            left: rect.left,
            top: rect.top,
            width: rect.width,
            height: rect.height,
          };
          document.addEventListener("mousemove", handleCompareMonthlyPopoutPointerMove);
          document.addEventListener("mouseup", stopCompareMonthlyPopoutPointer);
          return;
        }
        if (event.target.closest("[data-compare-popout-drag]") && !event.target.closest("button")) {
          event.preventDefault();
          const rect = modal.getBoundingClientRect();
          compareMonthlyPopoutState.dragging = {
            startX: event.clientX,
            startY: event.clientY,
            left: rect.left,
            top: rect.top,
          };
          document.addEventListener("mousemove", handleCompareMonthlyPopoutPointerMove);
          document.addEventListener("mouseup", stopCompareMonthlyPopoutPointer);
        }
      }

      function handleCompareMonthlyPopoutPointerMove(event) {
        const overlay = document.getElementById("compare-chart-popout-overlay");
        const modal = overlay ? overlay.querySelector(".compare-chart-popout-modal") : null;
        if (!modal) return;
        const drag = compareMonthlyPopoutState.dragging;
        if (drag) {
          modal.style.transform = "none";
          modal.style.left = `${drag.left + event.clientX - drag.startX}px`;
          modal.style.top = `${drag.top + event.clientY - drag.startY}px`;
          return;
        }
        const resize = compareMonthlyPopoutState.resizing;
        if (!resize) return;
        const dx = event.clientX - resize.startX;
        const dy = event.clientY - resize.startY;
        const minWidth = 520;
        const minHeight = 380;
        let nextLeft = resize.left;
        let nextTop = resize.top;
        let nextWidth = resize.width;
        let nextHeight = resize.height;
        if (resize.dir.includes("e")) nextWidth = Math.max(minWidth, resize.width + dx);
        if (resize.dir.includes("s")) nextHeight = Math.max(minHeight, resize.height + dy);
        if (resize.dir.includes("w")) {
          nextWidth = Math.max(minWidth, resize.width - dx);
          nextLeft = resize.left + resize.width - nextWidth;
        }
        if (resize.dir.includes("n")) {
          nextHeight = Math.max(minHeight, resize.height - dy);
          nextTop = resize.top + resize.height - nextHeight;
        }
        modal.style.transform = "none";
        modal.style.left = `${nextLeft}px`;
        modal.style.top = `${nextTop}px`;
        modal.style.width = `${nextWidth}px`;
        modal.style.height = `${nextHeight}px`;
      }

      function stopCompareMonthlyPopoutPointer() {
        compareMonthlyPopoutState.dragging = null;
        compareMonthlyPopoutState.resizing = null;
        document.removeEventListener("mousemove", handleCompareMonthlyPopoutPointerMove);
        document.removeEventListener("mouseup", stopCompareMonthlyPopoutPointer);
      }

      function buildCompareViewModel(rows, years, drilldownRows) {
        const statsByYear = new Map(getCompareStatsByYear(rows));
        const viewYears = years.slice(0, 2);
        const baseYear = viewYears[0];
        const compareYear = viewYears[1] || null;
        const drilldownSourceRows = Array.isArray(drilldownRows) ? drilldownRows : rows;
        const base = statsByYear.get(baseYear) || getCompareEmptyStats();
        const compare = compareYear
          ? statsByYear.get(compareYear) || getCompareEmptyStats()
          : getCompareEmptyStats();
        const totalDelta = compareYear ? base.saving - compare.saving : base.saving;
        const baseCharacterTotal =
          Math.abs(base.construction.saving) + Math.abs(base.maintenance.saving);
        const compareCharacterTotal =
          Math.abs(compare.construction.saving) + Math.abs(compare.maintenance.saving);
        const makeCategoryRow = (key, label, caption, source, color) => {
          const basePart = base[source] || { saving: 0, count: 0, avg: 0 };
          const comparePart = compare[source] || { saving: 0, count: 0, avg: 0 };
          const delta = compareYear
            ? basePart.saving - comparePart.saving
            : basePart.saving;
          const baseShare =
            baseCharacterTotal > 0 ? Math.abs(basePart.saving) / baseCharacterTotal : 0;
          const compareShare =
            compareCharacterTotal > 0
              ? Math.abs(comparePart.saving) / compareCharacterTotal
              : 0;
          return {
            key,
            label,
            caption,
            base: basePart.saving,
            compare: comparePart.saving,
            delta,
            baseCount: basePart.count,
            compareCount: comparePart.count,
            countDelta: basePart.count - comparePart.count,
            baseAvg: basePart.avg,
            compareAvg: comparePart.avg,
            avgDelta: compareYear ? basePart.avg - comparePart.avg : basePart.avg,
            baseShare,
            compareShare,
            shareDelta: compareYear ? baseShare - compareShare : baseShare,
            color,
          };
        };
        const categoryRows = [
          makeCategoryRow(
            "construction",
            "공사성",
            "외주·공사비 적용 대비 절감 구조",
            "construction",
            "#2f80ed",
          ),
          makeCategoryRow(
            "maintenance",
            "영선 전환",
            "관리소 자체 처리로 전환된 절감 구조",
            "maintenance",
            "#27ae60",
          ),
        ];
        const monthlyRows = buildCompareMonthlyRows(rows, viewYears);
        const monthlyConstructionRows = buildCompareMonthlyRows(
          rows.filter((row) => !isCompareMaintenanceType(row.type)),
          viewYears,
        );
        const monthlyMaintenanceRows = buildCompareMonthlyRows(
          rows.filter((row) => isCompareMaintenanceType(row.type)),
          viewYears,
        );
        const typeRows = buildCompareTypeRows(rows, viewYears);
        const typeConstructionRows = buildCompareTypeRows(
          rows.filter((row) => !isCompareMaintenanceType(row.type)),
          viewYears,
        );
        const typeMaintenanceRows = buildCompareTypeRows(
          rows.filter((row) => isCompareMaintenanceType(row.type)),
          viewYears,
        );
        const detailRows = buildCompareDetailRows(rows, viewYears);
        const drilldownTypeRows = buildCompareTypeRows(drilldownSourceRows, viewYears);
        const drilldownDetailRows = buildCompareDetailRows(drilldownSourceRows, viewYears);
        const monthNumbers = getCompareSelectedMonthNumbers();
        const maxDelta = Math.max(
          1,
          Math.abs(totalDelta),
          ...categoryRows.map((row) => Math.abs(row.delta)),
          ...monthlyRows.map((row) => Math.abs(row.delta)),
          ...monthlyConstructionRows.map((row) => Math.abs(row.delta)),
          ...monthlyMaintenanceRows.map((row) => Math.abs(row.delta)),
          ...typeRows.map((row) => Math.abs(row.delta)),
          ...typeConstructionRows.map((row) => Math.abs(row.delta)),
          ...typeMaintenanceRows.map((row) => Math.abs(row.delta)),
          ...detailRows.map((row) => Math.abs(row.delta)),
          ...drilldownTypeRows.map((row) => Math.abs(row.delta)),
          ...drilldownDetailRows.map((row) => Math.abs(row.delta)),
        );

        return {
          rows,
          years,
          viewYears,
          baseYear,
          compareYear,
          monthNumbers,
          base,
          compare,
          totalDelta,
          categoryRows,
          monthlyRows,
          monthlyConstructionRows,
          monthlyMaintenanceRows,
          typeRows,
          typeConstructionRows,
          typeMaintenanceRows,
          detailRows,
          drilldownTypeRows,
          drilldownDetailRows,
          maxDelta,
        };
      }

      function getCompareMeterStyle(delta, maxDelta) {
        const width = Math.max(8, Math.min(50, (Math.abs(delta) / maxDelta) * 50));
        return `--meter-width:${width}%; --meter-shift:${delta < 0 ? "-100%" : "0"};`;
      }

        const exportTooltip = isTypeMode
          ? "작업유형 상세 보고서를 엑셀로 다운로드합니다. 엑셀에는 화면상의 작업유형 상세 요약표와 원천 증빙 데이터 워크시트가 함께 포함됩니다."
          : "절감항목 상세 보고서를 엑셀로 다운로드합니다. 엑셀에는 화면상의 절감항목 상세 요약표와 원천 증빙 데이터 워크시트가 함께 포함됩니다.";
        const rows = isTypeMode
          ? typeRows.map((row) => ({
              name: row.type,
              type: `${row.category === "maintenance" ? "영선 전환" : "공사성"} · ${row.segment || "작업유형"}`,
              baseSaving: row.base.saving,

          : detailRows.map((row) => ({

              baseAvg: row.base.count > 0 ? row.base.saving / row.base.count : 0,

        const bodyRows = rows.length
          ? rows

              <span class="compare-micro-meta">${vm.base.count}건 · 평균 <span class="compare-micro-amount">${formatCompareVal(vm.base.avg)}</span></span>
            </div>
            <div class="compare-micro-card compare-micro-compare">
              <span class="compare-micro-title">${vm.compareYear ? `${escapeCompareHtml(vm.compareYear)}년 비교` : "비교 대상"}</span>
              <strong class="compare-micro-total">${vm.compareYear ? formatCompareVal(vm.compare.saving) : "-"}</strong>
              <span class="compare-micro-meta">${vm.compareYear ? `${vm.compare.count}건 · 평균 <span class="compare-micro-amount">${formatCompareVal(vm.compare.avg)}</span>` : "연도를 하나 더 선택"}</span>
            </div>
